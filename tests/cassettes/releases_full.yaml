        charset=utf-8\",\"state\":\"uploaded\",\"size\":66484304,\"digest\":null,\"download_count\":7,\"created_at\":\"2023-08-16T16:27:40Z\",\"updated_at\":\"2023-08-16T16:27:42Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.16.0-beta2/kolibri_0.16.0b2-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.16.0-beta2\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.16.0-beta2\",\"body\":\"###
        What's Changed\\r\\n* Adds error handling for badly formed UUIDs sent to API
        endpoints by @rtibbles in https://github.com/learningequality/kolibri/pull/11009\\r\\n*
        Upload TAR file to releases by @rtibbles in https://github.com/learningequality/kolibri/pull/11060\\r\\n*
        Layout tweaks for Learn by @rtibbles in https://github.com/learningequality/kolibri/pull/11062\\r\\n*
        setup_wizard: only set firstImportedLodUser if task starts without errors
        by @nucleogenesis in https://github.com/learningequality/kolibri/pull/11057\\r\\n*
        Feature metered connection capability by @nucleogenesis in https://github.com/learningequality/kolibri/pull/10624\\r\\n*
        Add download button to BrowseResourceMetadata by @rtibbles in https://github.com/learningequality/kolibri/pull/11055\\r\\n*
        Attempt to reduce query times and memory usage during channel deletion operations
        by @rtibbles in https://github.com/learningequality/kolibri/pull/10460\\r\\n*
        Prevent learner only imported superadmins from seeing studio. by @rtibbles
        in https://github.com/learningequality/kolibri/pull/11063\\r\\n* Consolidate
        logic to prevent polling for non learner only imports. by @rtibbles in https://github.com/learningequality/kolibri/pull/11071\\r\\n*
        Add loader to YourClasses component by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/11061\\r\\n*
        Upgrade pyzeroconf to version unpatched for Android. by @rtibbles in https://github.com/learningequality/kolibri/pull/11073\\r\\n*
        Make import metadata tests more robust for mptt fields. by @rtibbles in https://github.com/learningequality/kolibri/pull/11084\\r\\n*
        Update SQLAlchemy to latest Python 2.7 compatible version by @rtibbles in
        https://github.com/learningequality/kolibri/pull/11091\\r\\n* Fix device setting
        saving in a plugin antagonistic environment (like PyInstaller) by @rtibbles
        in https://github.com/learningequality/kolibri/pull/11099\\r\\n* Channel import
        progress by @dbnicholson in https://github.com/learningequality/kolibri/pull/11103\\r\\n*
        Automatic content syncing: preferred instance tracking and fixes by @bjester
        in https://github.com/learningequality/kolibri/pull/11083\\r\\n* MyDownloads
        bug fixes by @marcellamaki in https://github.com/learningequality/kolibri/pull/11092\\r\\n*
        Catch errors that can happen when a network location is announced on more
        than one network. by @rtibbles in https://github.com/learningequality/kolibri/pull/11104\\r\\n*
        Do a more robust check that peer_id does not correspond to the CENTRAL_CONTENT_BASE_INSTANCE_ID.
        by @rtibbles in https://github.com/learningequality/kolibri/pull/11106\\r\\n####
        Dependency updates\\r\\n* Plugin machinery tweaks by @rtibbles in https://github.com/learningequality/kolibri/pull/11098\\r\\n*
        Bump @vue/composition-api from 1.7.1 to 1.7.2 by @dependabot in https://github.com/learningequality/kolibri/pull/11107\\r\\n*
        Bump @testing-library/jest-dom from 5.17.0 to 6.0.0 by @dependabot in https://github.com/learningequality/kolibri/pull/11093\\r\\n*
        Bump autoprefixer from 10.4.14 to 10.4.15 by @dependabot in https://github.com/learningequality/kolibri/pull/11094\\r\\n*
        Bump recast from 0.23.3 to 0.23.4 by @dependabot in https://github.com/learningequality/kolibri/pull/11089\\r\\n*
        Bump stylelint-scss from 5.0.1 to 5.1.0 by @dependabot in https://github.com/learningequality/kolibri/pull/11075\\r\\n*
        Bump @babel/preset-env from 7.22.9 to 7.22.10 by @dependabot in https://github.com/learningequality/kolibri/pull/11066\\r\\n*
        Bump @babel/core from 7.22.9 to 7.22.10 by @dependabot in https://github.com/learningequality/kolibri/pull/11067\\r\\n*
        Bump @babel/plugin-transform-runtime from 7.22.9 to 7.22.10 by @dependabot
