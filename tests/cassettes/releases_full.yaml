        charset=utf-8\",\"state\":\"uploaded\",\"size\":97053050,\"digest\":\"sha256:f4169111f2c3976f94017ee50ca5b8f863279a547fb4adcf98f7d8503d7c0b48\",\"download_count\":5,\"created_at\":\"2025-09-23T23:31:05Z\",\"updated_at\":\"2025-09-23T23:31:08Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.19.0-beta0/kolibri_0.19.0b0-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.19.0-beta0\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.19.0-beta0\",\"body\":\"<!--
        Release notes generated using configuration in .github/release.yml at develop
        -->\\r\\n\\r\\n## What's Changed\\r\\n\\r\\n## QA review list\\r\\n\\r\\n###
        New or updated workflows/UX - not in alpha releases\\r\\n\\r\\n- (**NEW**)
        Copy a class can also be done within the page of a class, via the *options*
        button\\r\\n- Updates to user table: wider format on browser; \\\"shorter\\\"
        header space, sticky-columns mean first/first two and last column display
        always in the view when there is enough content for the table to need a horizontal
        scroll (testing on tablet and mobile size is especially relevant)\\r\\n\\r\\n####
        Copying and deleting a class from the class edit page ([PR](https://github.com/learningequality/kolibri/pull/13771))\\r\\n\\r\\n1.
        From Facility > Users, click a class's name to go to that class's edit page\\r\\n2.
        Using the Options button dropdown menu I can Copy, Rename or Delete the current
        class\\r\\n3. After deletion, I am redirected to the Facility > Classes page\\r\\n4.
        After copying a class, I am redirected to the Facility > Classes page\\r\\n\\r\\n<summary>\\r\\n\\r\\n###
        Previously reviewed core workflows\\r\\n\\r\\n<details>\\r\\n\\r\\n#### All
        bulk actions\\r\\n\\r\\n[Figma specs](https://www.figma.com/design/2aE0zEXmyysxMZ6qO0ufh8/Bulk-User-Management?node-id=2728-5095&t=ygtopi05ShSogi6L-4)\\r\\n\\r\\n-
        All actions have been updated to have consistent behavior for handling user
        actions.\\r\\n- The \\\"You can undo this\\\" KModal has become a snackbar
        for all cases and should be tested in all cases.\\r\\n\\r\\n#### Copying a
        class\\r\\n\\r\\n- From Facility > Classes page, I can copy a class without
        it's learners and coaches\\r\\n- From Facility > Classes page, I can copy
        a class including both of it's learners and coaches\\r\\n- From Facility >
        Classes page, I can copy a class without one of either learners and coaches\\r\\n-
        Class names input with more than one consecutive space should be treated as
        if there is only one space. So \\\"My Class\\\" should be treated as a duplicate
        of \\\"   My     Class    \\\"\\r\\n\\r\\n#### Removed users page\\r\\n\\r\\n[Figma](https://www.figma.com/design/2aE0zEXmyysxMZ6qO0ufh8/Bulk-User-Management?node-id=147-3750&t=ygtopi05ShSogi6L-4)
        _Note that some copy changes are not reflected in the Figma_\\r\\n\\r\\n-
        [Setup]: Facility > Users page: Select and delete some users\\r\\n- Facility
        > Users page: Click the Options dropdown and select \\\"View removed users\\\"
        - see a page listing users you've deleted\\r\\n- Check that you can \\\"un-delete\\\"
        them\\r\\n- Check that un-deleted users have their relationships to classes
        restored (ie, they're still a coach or learner in a class they were in before
        they were deleted)\\r\\n- Test that you can permanently delete users\\r\\n-
        Verify that the table's basic capabilities work as expected (sorting, pagination)\\r\\n\\r\\n**LOD
        User management** ([Figma specs](https://www.figma.com/design/sDAy0DayJEAlWhz0rLLqD6/LOD-user-management?node-id=0-1&t=GKLGZWl7TyAdN35P-0),
        [PR](https://github.com/learningequality/kolibri/pull/12228#issuecomment-3052826012))\\r\\n\\r\\n1.\\r\\n\\r\\n**Copying
        a class** ([Figma specs](https://www.figma.com/design/85JijqOnl86LVIdpIVZ0SY/Make-a-copy-of-a-class?node-id=215-261&p=f&t=txEMXjEzQ99WVkVP-0),
        [PR](https://github.com/learningequality/kolibri/pull/13517)) _This did not
        have QA review before merge_\\r\\n\\r\\n1. Navigate to class in the table
        and click the vertical ellipsis icon in the final column.\\r\\n2. Verify the
        dropdown menu contains \\\"Copy Class\\\", \\\"Rename Class\\\", and \\\"Delete\\\"
        options.\\r\\n3. Test \\\"Rename Class\\\": 1. Select \\\"Rename Class\\\".
        2. Verify the KModal appears with a textbox. 3. Enter a new name and confirm
        the rename.\\r\\n4. Test \\\"Delete\\\": 1. Select \\\"Delete\\\". 2. Verify
        the ClassDeleteModal appears.\\r\\n5. Test \\\"Copy Class\\\": 1. Select \\\"Copy
        Class\\\". 2. Verify the SidePanelModal appears.\\r\\n6. Check that the class
        name textbox is pre-filled with \\\"Copy of {original class name}\\\".\\r\\n7.
        Verify the coach dropdown lists available coaches and pre-selects existing
        ones. and Test selecting and deselecting coaches\\r\\n8. Click the \\\"Copy
        Class\\\" button within the side panel. and confirm the if the copy of the
        class appears in the class table.\\r\\n\\r\\n**\\\"Save and add another\\\"
        - improved user creation**  ([Figma spec](https://www.figma.com/design/2aE0zEXmyysxMZ6qO0ufh8/Bulk-User-Management?node-id=98-11799&t=meRsMzupzSeDbvjt-0),
        [PR](https://github.com/learningequality/kolibri/pull/13538))\\r\\n\\r\\n1.
        Go to facilities > users.\\r\\n2. Click on add user button.\\r\\n3. Add users
        using both save and add another and save and continue actions\\r\\n4. Check
        that users have been created correctly with their roles and classes.\\r\\n\\r\\n\\r\\n**Bulk
        enrollment of users as learner to a class** ([Figma spec](https://www.figma.com/design/2aE0zEXmyysxMZ6qO0ufh8/Bulk-User-Management?node-id=348-6052&t=meRsMzupzSeDbvjt-0),
        [PR](https://github.com/learningequality/kolibri/pull/13544))\\r\\n\\r\\n1.
        On the Facility > Users page, select one or most users and click the enroll
        icon button.\\r\\n2. Once the side panel opens, confirm that the correct warnings
        apply based on if the selected users are coaches, learners, and not enrolled
        in any classes.\\r\\n3. Select a class to enroll the users into and undo the
        enrollment to confirm that the functionality works as intended. Note: Users
        that are already enrolled into the selected class(es) will not be affected
        by selecting ENROLL or UNDO.\\r\\n\\r\\n</details>\\r\\n</summary>\\r\\n\\r\\n###
