        Release notes generated using configuration in .github/release.yml at develop
        -->\\r\\n\\r\\n## Overview \\r\\n\\r\\nThis is an **UNSTABLE** pre-release
        for preliminary testing of initial workflows. Core aspects of the admin user
        management workflow have not yet been implemented. \\r\\n\\r\\n## What's Changed\\r\\n\\r\\n-
        Updates to the `KTable` on the Facility users page to allow column sorting
        and multi-select of users with checkboxes\\r\\n- Foundational backend work
        to support bulk actions on multiple users at once \\r\\n- Foundational routing
        and side panel work\\r\\n- [Introduction of the \\\"manage LOD users\\\" workflow](https://github.com/learningequality/kolibri/pull/12228)\\r\\n-
        [Introduction of the \\\"copying a class\\\" workflow](https://github.com/learningequality/kolibri/pull/13517)\\r\\n-
        [Introduction of the \\\"save and add another user creation\\\" workflow](https://github.com/learningequality/kolibri/pull/13538)
        \\r\\n- [Introduction of the \\\"bulk enrollment of users as learners to classes\\\"
        workflow](https://github.com/learningequality/kolibri/pull/13544)\\r\\n\\r\\n###
        QA review list\\r\\n\\r\\n**LOD User management** ([Figma specs](https://www.figma.com/design/sDAy0DayJEAlWhz0rLLqD6/LOD-user-management?node-id=0-1&t=GKLGZWl7TyAdN35P-0),
        [PR](https://github.com/learningequality/kolibri/pull/12228#issuecomment-3052826012))\\r\\n\\r\\n1.
        \ From the Device > Users page, you can remove a user via admin credentials
        \\r\\n2. From the Device > Users page, you can import a new user via that
        user's credentials\\r\\n3. From the Device > Users page, you can import a
        new user via admin credentials\\r\\n\\r\\n**Copying a class** ([Figma specs](https://www.figma.com/design/85JijqOnl86LVIdpIVZ0SY/Make-a-copy-of-a-class?node-id=215-261&p=f&t=txEMXjEzQ99WVkVP-0),
        [PR](https://github.com/learningequality/kolibri/pull/13517)) _This did not
        have QA review before merge_\\r\\n\\r\\n1. Navigate to class in the table
        and click the vertical ellipsis icon in the final column.\\r\\n2. Verify the
        dropdown menu contains \\\"Copy Class\\\", \\\"Rename Class\\\", and \\\"Delete\\\"
        options.\\r\\n3. Test \\\"Rename Class\\\": 1. Select \\\"Rename Class\\\".
        2. Verify the KModal appears with a textbox. 3. Enter a new name and confirm
        the rename.\\r\\n4. Test \\\"Delete\\\": 1. Select \\\"Delete\\\". 2. Verify
        the ClassDeleteModal appears.\\r\\n5. Test \\\"Copy Class\\\": 1. Select \\\"Copy
        Class\\\". 2. Verify the SidePanelModal appears.\\r\\n6. Check that the class
        name textbox is pre-filled with \\\"Copy of {original class name}\\\".\\r\\n7.
        Verify the coach dropdown lists available coaches and pre-selects existing
        ones. and Test selecting and deselecting coaches\\r\\n8. Click the \\\"Copy
        Class\\\" button within the side panel. and confirm the if the copy of the
        class appears in the class table.\\r\\n\\r\\n**\\\"Save and add another\\\"
        - improved user creation**  ([Figma spec](https://www.figma.com/design/2aE0zEXmyysxMZ6qO0ufh8/Bulk-User-Management?node-id=98-11799&t=meRsMzupzSeDbvjt-0),
        [PR](https://github.com/learningequality/kolibri/pull/13538))\\r\\n\\r\\n1.
        Go to facilities > users.\\r\\n2. Click on add user button.\\r\\n3. Add users
        using both save and add another and save and continue actions\\r\\n4. Check
        that users have been created correctly with their roles and classes.\\r\\n\\r\\n[Known
        follow up issues](https://github.com/learningequality/kolibri/pull/13538#pullrequestreview-3010283280)\\r\\n\\r\\n**Bulk
        enrollment of users as learner to a class** ([Figma spec](https://www.figma.com/design/2aE0zEXmyysxMZ6qO0ufh8/Bulk-User-Management?node-id=348-6052&t=meRsMzupzSeDbvjt-0),
        [PR](https://github.com/learningequality/kolibri/pull/13544))\\r\\n\\r\\n1.
        On the Facility > Users page, select one or most users and click the enroll
        icon button.\\r\\n2. Once the side panel opens, confirm that the correct warnings
        apply based on if the selected users are coaches, learners, and not enrolled
        in any classes.\\r\\n3. Select a class to enroll the users into and undo the
        enrollment to confirm that the functionality works as intended. Note: Users
        that are already enrolled into the selected class(es) will not be affected
        by selecting ENROLL or UNDO.\\r\\n\\r\\nKnown follow up issues: \\r\\n- icons
        are currently when there are no users selected (this work is assigned, but
        not merged) \\r\\n- table scrolling on narrower/mobile screens (this work
        is assigned but not merged) \\r\\n- need design inputs on: updating icon for
        assigning coaches, text/warnings/info at top of panel\\r\\n\\r\\n<hr> \\r\\n\\r\\n\\r\\n<details>\\r\\n
        \ <summary>List of supporting PRs</summary>\\r\\n\\r\\n* [WIP] Added Sorting
        facility to Users KTable by @BabyElias in https://github.com/learningequality/kolibri/pull/13393\\r\\n*
        Learn > Library - Loading state improvements by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13341\\r\\n*
        handles errors at editing quiz when there are no resources by @AllanOXDi in
        https://github.com/learningequality/kolibri/pull/13288\\r\\n* Implement all_objects
        manager class in FacilityUser by @ozer550 in https://github.com/learningequality/kolibri/pull/13433\\r\\n*
        Bulk User Management strings by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13424\\r\\n*
        Using the new ariaLabelledBy prop in KSwitch by @RONAK-AI647 in https://github.com/learningequality/kolibri/pull/12918\\r\\n*
        Selectable list by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13460\\r\\n*
        Remove custom issue templates and turn on issue header automation by @MisRob
        in https://github.com/learningequality/kolibri/pull/13480\\r\\n* Implement
        soft delete users in bulk by @ozer550 in https://github.com/learningequality/kolibri/pull/13483\\r\\n*
