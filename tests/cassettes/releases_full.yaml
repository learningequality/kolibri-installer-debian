:\"https://api.github.com/users/jredrejo/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/jredrejo/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/jredrejo/subscriptions\",\"organizations_url\":\"https://api.github.com/users/jredrejo/orgs\",\"repos_url\":\"https://api.github.com/users/jredrejo/repos\",\"events_url\":\"https://api.github.com/users/jredrejo/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/jredrejo/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"content_type\":\"application/vnd.debian.binary-package\",\"state\":\"uploaded\",\"size\":33542432,\"digest\":null,\"download_count\":15,\"created_at\":\"2020-08-19T10:32:31Z\",\"updated_at\":\"2020-08-19T10:32:36Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.14.3/kolibri_0.14.3-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.14.3\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.14.3\",\"body\":\"(Note:
        0.14.0-2 contained regressions and were superseded by 0.14.3)\\r\\n\\r\\n##
        Internationalization and localization\\r\\n\\r\\n- Added German\\r\\n- Added
        Khmer\\r\\n- CSV data files have localized headers and filenames\\r\\n\\r\\n##
        Added\\r\\n\\r\\n- In the Setup Wizard, users can import an existing facility
        from peer Kolibri devices on the network\\r\\n- Facility admins can sync facility
        data with peer Kolibri devices on the network or Kolibri Data Portal\\r\\n-
        Facility admins can import and export user accounts to and from a CSV file\\r\\n-
        Channels can display a learner-facing \\\"tagline\\\" on Learn channel list\\r\\n-
        Device and facility names can now be edited by admins\\r\\n- Super admins
        can delete facilities from a device\\r\\n- Quizzes and lessons can be assigned
        to individual learners in addition to whole groups or classes\\r\\n- Super
        admins can view the Facility and Coach pages for all facilities\\r\\n- Pingbacks
        to the telemetry server can now be disabled\\r\\n\\r\\n## Changed\\r\\n\\r\\n-
        New card layout for channels on Learn Page is more efficient and displays
        new taglines\\r\\n- Simplified setup process when using Kolibri for personal
        use\\r\\n- Improved sign-in flow, especially for devices with multiple facilities\\r\\n-
        The experience for upgrading channels has been improved with resource highlighting,
        improved statistics, and more efficient navigation\\r\\n- Improved icons for
        facilities, classrooms, quizzes, and other items\\r\\n- More consistent wording
        of notifications in the application\\r\\n- Quizzes and lessons with missing
        resources are more gracefully handled\\r\\n- Shut-down times are faster and
        more consistent\\r\\n\\r\\n## Fixed\\r\\n\\r\\n- Many visual and user experience
        issues\\r\\n- Language filter not working when viewing channels for import/export\\r\\n-
        A variety of mobile responsiveness issues have been addressed\\r\\n\\r\\n([0.14.3
        Github milestone](https://github.com/learningequality/kolibri/issues?q=label%3Achangelog+milestone%3A0.14.3))\\r\\n\\r\\n([0.14.2
        Github milestone](https://github.com/learningequality/kolibri/issues?q=label%3Achangelog+milestone%3A0.14.2))\\r\\n\\r\\n([0.14.1
        Github milestone](https://github.com/learningequality/kolibri/issues?q=label%3Achangelog+milestone%3A0.14.1))\\r\\n\\r\\n([0.14.0
        Github milestone](https://github.com/learningequality/kolibri/issues?q=label%3Achangelog+milestone%3A0.14.0))\"},{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/27146164\",\"assets_url\":\"https://api.github.com/repos/learningequality/kolibri/releases/27146164/assets\",\"upload_url\":\"https://uploads.github.com/repos/learningequality/kolibri/releases/27146164/assets{?name,label}\",\"html_url\":\"https://github.com/learningequality/kolibri/releases/tag/v0.13.3\",\"id\":27146164,\"author\":{\"login\":\"jonboiser\",\"id\":10248067,\"node_id\":\"MDQ6VXNlcjEwMjQ4MDY3\",\"avatar_url\":\"https://avatars.githubusercontent.com/u/10248067?v=4\",\"gravatar_id\":\"\",\"url\":\"https://api.github.com/users/jonboiser\",\"html_url\":\"https://github.com/jonboiser\",\"followers_url\":\"https://api.github.com/users/jonboiser/followers\",\"following_url\":\"https://api.github.com/users/jonboiser/following{/other_user}\",\"gists_url\":\"https://api.github.com/users/jonboiser/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/jonboiser/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/jonboiser/subscriptions\",\"organizations_url\":\"https://api.github.com/users/jonboiser/orgs\",\"repos_url\":\"https://api.github.com/users/jonboiser/repos\",\"events_url\":\"https://api.github.com/users/jonboiser/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/jonboiser/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"node_id\":\"MDc6UmVsZWFzZTI3MTQ2MTY0\",\"tag_name\":\"v0.13.3\",\"target_commitish\":\"release-v0.13.x\",\"name\":\"v0.13.3\",\"draft\":false,\"immutable\":false,\"prerelease\":false,\"created_at\":\"2020-06-02T19:34:31Z\",\"updated_at\":\"2020-06-02T20:14:53Z\",\"published_at\":\"2020-06-02T20:14:53Z\",\"assets\":[{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/assets/21304516\",\"id\":21304516,\"node_id\":\"MDEyOlJlbGVhc