        charset=utf-8\",\"state\":\"uploaded\",\"size\":94929208,\"digest\":null,\"download_count\":47,\"created_at\":\"2024-08-06T18:50:29Z\",\"updated_at\":\"2024-08-06T18:50:31Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.17.0/kolibri_0.17.0-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.17.0\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.17.0\",\"body\":\"##
        What's Changed\\r\\n\\r\\n### High level overview \\r\\n\\r\\nRelease 0.17.0
        introduces updates to our quizzes to provide coaches with more flexibility
        in customizing quizzes. With 0.17.0, Kolibri is now available in Punjabi.\\r\\n\\r\\n###
        Added \\r\\n\\r\\n#### New Feature: Updates to quiz workflow with new sections
        and question replacement functionality \\r\\n\\r\\nUpdates to our quizzes
        provide coaches more flexibility in creating quizzes by swapping out questions
        or removing questions to create the quiz they want. Coaches choose resources
        from which questions are selected. They can then review individual questions,
        and replace or remove individual questions, customising the quiz to learner
        needs. Coaches can also divide the quiz into sections of up to 25 questions
        each, allowing for longer quizzes.\\r\\n\\r\\nNoteworthy technical updates
        include updating to a third version of our Exam model data schema, the addtion
        of a new draft exam model to allow editing of quizzes before they are made
        active/syncable, introducing a new accordion component, and changing the quiz
        creation routing structure to use nested routes and a side-panel style UX.\\r\\n\\r\\n<details>\\r\\n
        \ <summary>List of supporting PRs</summary>\\r\\n\\r\\n  - Restore exam/utils.spec.js
        to previous version; tests pass by @nucleogenesis in https://github.com/learningequality/kolibri/pull/11155\\r\\n
        \ - Enhanced Quizzes: Initial frontend state management API by @nucleogenesis
        in https://github.com/learningequality/kolibri/pull/11088\\r\\n  - adds the
        new Quiz Creation Component  by @AllanOXDi in https://github.com/learningequality/kolibri/pull/11077\\r\\n
        \ - Enhanced Quiz Management: Side panel and routing foundations by @nucleogenesis
        in https://github.com/learningequality/kolibri/pull/11132\\r\\n  - Build flexible
        and accessible accordion component by @AllanOXDi in https://github.com/learningequality/kolibri/pull/11087\\r\\n
        \ - Update Exam model with V3 question_sources, update relevant JS utils by
        @nucleogenesis in https://github.com/learningequality/kolibri/pull/11025\\r\\n
        \ - Quiz creation DEBUG data improvements by @nucleogenesis in https://github.com/learningequality/kolibri/pull/11662\\r\\n
        \ - Quiz rebase regression fixes by @nucleogenesis in https://github.com/learningequality/kolibri/pull/11661\\r\\n
        \ - Quiz foundations & data connection by @nucleogenesis in https://github.com/learningequality/kolibri/pull/11277\\r\\n
        \ - Section settings side panel by @AllanOXDi in https://github.com/learningequality/kolibri/pull/11314\\r\\n
        \ - Feature  quiz section tabs with overflow by @nucleogenesis in https://github.com/learningequality/kolibri/pull/11382\\r\\n
        \ - Finishing up the Quiz Root Page by @nucleogenesis in https://github.com/learningequality/kolibri/pull/11434\\r\\n
        \ - [Accordion] Add \\\"collapse all\\\"/ \\\"expand all\\\" logic into AccordionContainer
        by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/11565\\r\\n
        \ - Migrate quizForge object references to composition API standard by @ozer550
        in https://github.com/learningequality/kolibri/pull/11562\\r\\n  - Remove
        stray references to quizForge by @marcellamaki in https://github.com/learningequality/kolibri/pull/11633\\r\\n
        \ - Fix title validation error bug in quizSection by @ozer550 in https://github.com/learningequality/kolibri/pull/11642\\r\\n
        \ - Coach Quiz Exercise Resources by @nucleogenesis in https://github.com/learningequality/kolibri/pull/11682\\r\\n
        \ - Question sources by @AllanOXDi in https://github.com/learningequality/kolibri/pull/11658\\r\\n
        \ - Update ExamSerializers according to v3 model by @ozer550 in https://github.com/learningequality/kolibri/pull/11674\\r\\n
        \ - useFetchTree specs by @nucleogenesis in https://github.com/learningequality/kolibri/pull/11766\\r\\n
        \ - Synchronise user selections with Quiz Creation State  by @ozer550 in https://github.com/learningequality/kolibri/pull/11783\\r\\n
        \ - EQM clean up resouce selection by @AllanOXDi in https://github.com/learningequality/kolibri/pull/11764\\r\\n
        \ - Conditionalizes the loading action for quiz routes by @akolson in https://github.com/learningequality/kolibri/pull/11822\\r\\n
        \ - Quiz creation bookmark selection by @ozer550 in https://github.com/learningequality/kolibri/pull/11835\\r\\n
        \ - Questions randomly selected from resource pool by @nucleogenesis in https://github.com/learningequality/kolibri/pull/11823\\r\\n
        \ - number of resources updates on selection by @AllanOXDi in https://github.com/learningequality/kolibri/pull/11825\\r\\n
        \ - Resource selection UX- Improvement  by @AllanOXDi in https://github.com/learningequality/kolibri/pull/11815\\r\\n
        \ - Quiz Creation Select Resources - Keyword search by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/11887\\r\\n
        \ - Quiz creation resource selection: Topic selection & \\\"Select all\\\"
        \ by @nucleogenesis in https://github.com/learningequality/kolibri/pull/11864\\r\\n
        \ - Fix: Side panel closing confirmation & logic in child component by @nucleogenesis
        in https://github.com/learningequality/kolibri/pull/11862\\r\\n  - Quiz creation:
        Question replacement & a bevy of misc fixes and polish by @nucleogenesis in
        https://github.com/learningequality/kolibri/pull/11937\\r\\n  - Move handleReplacement
