        What's Changed\\r\\n\\r\\n### Added \\r\\n* Check node being available on
        filtered queryset to prevent index error. by @rtibbles in https://github.com/learningequality/kolibri/pull/9539\\r\\n*
        Force translations in bulk export/import of user data by @jredrejo in https://github.com/learningequality/kolibri/pull/9557\\r\\n*
        Ensure peer import and sync tasks for data and content work with servers using
        a prefix path by @rtibbles in https://github.com/learningequality/kolibri/pull/9533\\r\\n\\r\\n###
        Changed \\r\\n* Changes in 0.15.x to use kolibri with external plugins by
        @jredrejo in https://github.com/learningequality/kolibri/pull/9543\\r\\n*
        Don't use multiprocessing for downloads. by @rtibbles in https://github.com/learningequality/kolibri/pull/9560\\r\\n\\r\\n###
        Fixed\\r\\n* Update morango and stop locking sync when db backend is postgres
        by @bjester in https://github.com/learningequality/kolibri/pull/9556\\r\\n*
        Improve facility sync status reporting to users by @MisRob in https://github.com/learningequality/kolibri/pull/9541\\r\\n*
        Fix show more of top level resources by @marcellamaki in https://github.com/learningequality/kolibri/pull/9555\\r\\n*
