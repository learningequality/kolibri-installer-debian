        Coach Dashboard - added regularly updating notifications and new information
        architecture for the coach interface, to provide actionable feedback for coaches
        about learner progress\\r\\n- New capability for sandboxed HTML5 app content
        to utilize sessionStorage, localStorage and cookies, with the latter two restored
        between user sessions\\r\\n- Support for enrolling learners in multiple groups
        in a class\\r\\n- Management command to reorder channels to provide more customized
        display in learn\\r\\n\\r\\n\\r\\nChanged or fixed\\r\\n----------------\\r\\n\\r\\n-
        Exams are now known as Quizzes\\r\\n- Quizzes with content from deleted channels
        will now show an error message when a learner or coach is viewing the problems
        in the quiz or quiz report\\r\\n- Lessons with content from deleted channels
        will have those contents automatically removed. If you have created lessons
        with deleted content prior to 0.12, learner playlists and coach reports for
        those lessons will be broken. To fix the lesson, simply view it as a coach
        under Coach > Plan, and it will be fixed and updated automatically\\r\\n-
        Changes the sub-navigation to a Material Design tabs-like experience\\r\\n-
        Make facility log exporting a background process for a better user experience
        when downloading large logs\\r\\n- Allow appbar to move off screen when scrolling
        on mobile, to increase screen real estate\\r\\n- Kolibri now supports for
        iOS Safari 9.3+\\r\\n- Validation is now done in the 'provisiondevice' command
        for the username of the super admin user being created\\r\\n- Disable import
        and export buttons while a channel is being downloaded to prevent accidental
        clicks\\r\\n- Prevent quizzes and lessons in the same class from being created
        with the same name\\r\\n- Update quiz and lesson progress for learners without
        refreshing the page\\r\\n- Improved focus rings for keyboard navigation\\r\\n-
        Coach content no longer appears in recommendations for non-coach users\\r\\n-
        The Kolibri loading animation is now beautiful, and much quicker to load\\r\\n-
        Icons and tables are now more standardized across Kolibri, to give a more
        consistent user experience\\r\\n- Enable two high contrast themes for EPUB
        rendering for better accessibility\\r\\n- Supports accessing Kolibri through
        uwsgi\\r\\n\\r\\n\\r\\nInternationalization and localization\\r\\n-------------------------------------\\r\\n\\r\\n-
        Languages: English, Arabic, Bengali, Bulgarian, Chinyanja, Farsi, French,
        Fulfulde Mbororoore, Hindi, Marathi, Portuguese (Brazilian), Spanish, Swahili,
