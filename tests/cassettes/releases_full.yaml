        charset=utf-8\",\"state\":\"uploaded\",\"size\":96641754,\"digest\":\"sha256:ccb86c527a85c5e5470018028056d7114cdbfaabdfb28c688663f3154521d23d\",\"download_count\":12,\"created_at\":\"2025-08-06T20:33:36Z\",\"updated_at\":\"2025-08-06T20:33:38Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.18.2/kolibri_0.18.2-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.18.2\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.18.2\",\"body\":\"##
        What's Changed\\r\\n\\r\\nThis release contains MVP functionality for the
        use of short-form survey responses as a type of exercise, which introduces
        the first pieces of QTI into Kolibri. The release contains foundational technical
        pieces for HTML5 article rendering, although not the feature. Finally, it
        contains bug fixes. \\r\\n\\r\\n### Added \\r\\nQTI and HTML5 Article Rendering
        \\r\\n* MVP Implementation of QTI Multiple Choice and Text Entry by @rtibbles
        in https://github.com/learningequality/kolibri/pull/8070\\r\\n* Content viewer
        composable by @rtibbles in https://github.com/learningequality/kolibri/pull/13533\\r\\n*
        Fix answer saving for quizzes, practice quizzes, and surveys by @rtibbles
        in https://github.com/learningequality/kolibri/pull/13602\\r\\n* [HTML5 Article
        Renderer] Apply text styling by @WinnyChang in https://github.com/learningequality/kolibri/pull/13503\\r\\n*
        [HTML5 Article Renderer] Apply image styling by @WinnyChang in https://github.com/learningequality/kolibri/pull/13567\\r\\n*
        [HTML5 Article Renderer] Apply table styling by @WinnyChang in https://github.com/learningequality/kolibri/pull/13523\\r\\n\\r\\n###
        Changed \\r\\n* Create task for initial device provisioning by @AlexVelezLl
        in https://github.com/learningequality/kolibri/pull/13102\\r\\n\\r\\n### Fixed\\r\\n*
        Remove unnecessary max-width on the Kolibri logo by @rtibbles in https://github.com/learningequality/kolibri/pull/13547\\r\\n*
        Tweak content queue polling to prevent overloading the server by @rtibbles
        in https://github.com/learningequality/kolibri/pull/13500\\r\\n* Fix build
        failures by @rtibbles in https://github.com/learningequality/kolibri/pull/13553\\r\\n*
        Allow bloompubs with undefined distribution files to be rendered by @rtibbles
        in https://github.com/learningequality/kolibri/pull/13576\\r\\n* Fix urls.js
        module regression by @rtibbles in https://github.com/learningequality/kolibri/pull/13568\\r\\n*
        Remove unnecessary menu items displaying along with the \\\"Sync all facility
        data\\\" by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13582\\r\\n*
        invokes translated string variables by @akolson in https://github.com/learningequality/kolibri/pull/13545\\r\\n*
        Fix lesson completed number to be filtered by user by @marcellamaki in https://github.com/learningequality/kolibri/pull/13601\\r\\n\\r\\n\\r\\n##
        New Contributors\\r\\n* @WinnyChang made their first contribution in https://github.com/learningequality/kolibri/pull/13503\\r\\n\\r\\n\\r\\n**Full
