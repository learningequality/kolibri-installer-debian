        What's Changed\\r\\n* Warning fixes by @dbnicholson in https://github.com/learningequality/kolibri/pull/11520\\r\\n*
        Fix learning facility setup window's Continue button action by @KshitijThareja
        in https://github.com/learningequality/kolibri/pull/11499\\r\\n* Hardcode
        user model to avoid conflict with other kolibri usages by @jredrejo in https://github.com/learningequality/kolibri/pull/11531\\r\\n*
        limit number of cards visible in \\\"Recent\\\" by @thanksameeelian in https://github.com/learningequality/kolibri/pull/11515\\r\\n*
        Fix Welcome Modal for different browser sessions by @ozer550 in https://github.com/learningequality/kolibri/pull/11492\\r\\n*
        Misc fixes for LOD syncing and upgrade Morango by @bjester in https://github.com/learningequality/kolibri/pull/11525\\r\\n*
        Raise errors with expected format by @bjester in https://github.com/learningequality/kolibri/pull/11541\\r\\n*
        There can be more than one network location for an instance ID by @bjester
        in https://github.com/learningequality/kolibri/pull/11542\\r\\n* Handle weird
        edge case where the extra_settings key does not exist yet. by @rtibbles in
        https://github.com/learningequality/kolibri/pull/11545\\r\\n* Fix issues with
        insufficient storage status handling by @bjester in https://github.com/learningequality/kolibri/pull/11552\\r\\n*
        Don't display LOD sync or cleanup sync tasks on the Facility Tasks page by
        @marcellamaki in https://github.com/learningequality/kolibri/pull/11553\\r\\n*
        Bump @babel/preset-env from 7.23.2 to 7.23.3 by @dependabot in https://github.com/learningequality/kolibri/pull/11522\\r\\n*
        Bump actions/github-script from 6 to 7 by @dependabot in https://github.com/learningequality/kolibri/pull/11526\\r\\n*
        Bump @types/jest from 29.5.7 to 29.5.8 by @dependabot in https://github.com/learningequality/kolibri/pull/11527\\r\\n*
        Bump @babel/core from 7.23.2 to 7.23.3 by @dependabot in https://github.com/learningequality/kolibri/pull/11532\\r\\n*
