        Release notes generated using configuration in .github/release.yml at release-v0.16.x
        -->\\r\\n\\r\\n### What's Changed\\r\\n* Pressing enter to submit the Super
        Admin creation form in the Setup Wizard and show form validation error #11465
        by @a6ar55 in https://github.com/learningequality/kolibri/pull/11500\\r\\n*
        Fix setup wizard selection of network devices for sign up or import by @bjester
        in https://github.com/learningequality/kolibri/pull/11510\\r\\n* Development
        and contributing guidelines updates by @MisRob in https://github.com/learningequality/kolibri/pull/11560\\r\\n*
        Moves setting current_channel to init by @marcellamaki in https://github.com/learningequality/kolibri/pull/11567\\r\\n*
        Support content renderable_only option in tasks API by @dbnicholson in https://github.com/learningequality/kolibri/pull/11519\\r\\n*
        Fix - Video player height by @iskipu in https://github.com/learningequality/kolibri/pull/11566\\r\\n*
        Fixes hitherto unnoticed bug that meant time_updated was never set. by @rtibbles
        in https://github.com/learningequality/kolibri/pull/11590\\r\\n* Handle suspicious
        file operations and return a 404. by @rtibbles in https://github.com/learningequality/kolibri/pull/11596\\r\\n*
        Handle no config being present for kolibri-tools CLI by @rtibbles in https://github.com/learningequality/kolibri/pull/11589\\r\\n*
        Solve the out of frame bug of quiz images by @nikkuAg in https://github.com/learningequality/kolibri/pull/11568\\r\\n*
        GH contributor slack action for release branch by @vkWeb in https://github.com/learningequality/kolibri/pull/11624\\r\\n*
        Trying to fix a small issue with our slack notif by @vkWeb in https://github.com/learningequality/kolibri/pull/11625\\r\\n*
        Add fields for tracking where jobs are executed by @bjester in https://github.com/learningequality/kolibri/pull/11597\\r\\n*
        Fixing github actor by @vkWeb in https://github.com/learningequality/kolibri/pull/11631\\r\\n*
        Upgrade morango, cryptography and dependency versions. by @rtibbles in https://github.com/learningequality/kolibri/pull/10824\\r\\n*
        Bump google-github-actions/auth from 1 to 2 by @dependabot in https://github.com/learningequality/kolibri/pull/11569\\r\\n*
        Bump @adobe/css-tools from 4.3.1 to 4.3.2 by @dependabot in https://github.com/learningequality/kolibri/pull/11572\\r\\n*
