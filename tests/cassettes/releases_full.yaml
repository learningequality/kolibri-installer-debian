        What's Changed\\r\\n\\r\\n### High level summary\\r\\nThis release makes improvements
        to the learn interface, updates supported python versions, and ensures proper
        display of new metadata labeling on Learn content.\\r\\n\\r\\n### Added\\r\\n\\r\\n-
        Specify pre-commit hook python version to 3.10 by @akolson in https://github.com/learningequality/kolibri/pull/9810\\r\\n-
        Add Python3.11 to supported python versions. by @rtibbles in https://github.com/learningequality/kolibri/pull/9799\\r\\n\\r\\n###
        Fixed\\r\\n\\r\\n- Fix PDF completion issues by @rtibbles in https://github.com/learningequality/kolibri/pull/9776\\r\\n-
        Fix learner-facing metadata display of content duration by @marcellamaki in
        https://github.com/learningequality/kolibri/pull/9811, @marcellamaki in https://github.com/learningequality/kolibri/pull/9838\\r\\n-
        Fix \\\"Mark as complete\\\" functionality to allow learners to mark resources
        as complete when allowed by the resource @nucleogenesis in https://github.com/learningequality/kolibri/pull/9808,
        https://github.com/learningequality/kolibri/pull/9837\\r\\n- Disable forward/back
        buttons until locations are properly loaded. by @rtibbles in https://github.com/learningequality/kolibri/pull/9813\\r\\n-
        Fix issue that causes learners to skip every other question in an exercise
        by @rtibbles in https://github.com/learningequality/kolibri/pull/9819\\r\\n-
        Fix searchbox outline and update KDS to new release version by @thanksameeelian
        in https://github.com/learningequality/kolibri/pull/9806\\r\\n- Backport changes
        from to fix title spacing in app bar by @marcellamaki in https://github.com/learningequality/kolibri/pull/9817\\r\\n-
        Fix bookmark data loading issues that caused inaccurate bookmark display by
        @rtibbles in https://github.com/learningequality/kolibri/pull/9865\\r\\n\\r\\n###
        Changed\\r\\n\\r\\n- Change init.py from 5 tuple to 3. by @AllanOXDi in https://github.com/learningequality/kolibri/pull/9740\\r\\n-
        Set a max width on Library main content grid to display properly on extra
        large monitors by @marcellamaki in https://github.com/learningequality/kolibri/pull/9774\\r\\n-
        Remove \\\"All options\\\" from filters in Learn search/filtering side panel
        by @jredrejo in https://github.com/learningequality/kolibri/pull/9797\\r\\n-
        Switch display of the completion modal to require both completed progress
        and the resource to be finished by @rtibbles in https://github.com/learningequality/kolibri/pull/9814\\r\\n-
        Add tests to assert totalattempts behaviour. by @rtibbles in https://github.com/learningequality/kolibri/pull/9827\\r\\n-
        Backport fix from develop to resolve isTopicReference failures by @marcellamaki
        in https://github.com/learningequality/kolibri/pull/9841\\r\\n- Display completion
        modals only on first completion, and allow user to reopen the modal if needed
        by @rtibbles in https://github.com/learningequality/kolibri/pull/9830\\r\\n-
        Update KDS to 1.4.1 by @marcellamaki in https://github.com/learningequality/kolibri/pull/9866\\r\\n-
        Update category search for each level to be searchable by @marcellamaki in
        https://github.com/learningequality/kolibri/pull/9839\\r\\n\\r\\n\\r\\n##
