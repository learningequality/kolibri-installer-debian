        Breaking Changes\\r\\n\\r\\n[Support for Python 2.7, deprecated in 0.16, has
        been dropped](https://github.com/learningequality/kolibri/pull/11654). Support
        for Internet Explorer 11, deprecated in 0.16, has been dropped.\\r\\n\\r\\n\\r\\n###
        Changed\\r\\n\\r\\n#### Dependencies and support\\r\\n\\r\\nImportant technical
        changes include adding Python 3.12 support, upgrading Django to version 3.2,
        upgrading KDS to v4.4.0, and upgrading the Perseus exercise library to a recently
        released version, and changes to our linting tools to simplify and improve
        our developer experience. Support for Python 2.7, deprecated in 0.16, has
        been dropped. Support for Internet Explorer 11, deprecated in 0.16, has been
        dropped.\\r\\n\\r\\n<details>\\r\\n  <summary>List of supporting PRs</summary>\\r\\n
