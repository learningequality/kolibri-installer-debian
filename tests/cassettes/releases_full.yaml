        What's Changed\\r\\n* Improve Coach tabs accessibility for quiz report page
        by @KshitijThareja in https://github.com/learningequality/kolibri/pull/11588\\r\\n*
        Link KDS to Kolibri via webpack aliases by @Jaspreet-singh-1032 in https://github.com/learningequality/kolibri/pull/11446\\r\\n*
        Bump google-github-actions/upload-cloud-storage from 1 to 2 by @dependabot
        in https://github.com/learningequality/kolibri/pull/11638\\r\\n* Prevent display
        of welcome modal in LOD's by @ozer550 in https://github.com/learningequality/kolibri/pull/11587\\r\\n*
        Bump the github group with 3 updates by @dependabot in https://github.com/learningequality/kolibri/pull/11640\\r\\n*
        Changed KResponsiveWindow to useKResponsivewindow in Slidehow Viewer \u2026
        by @moweiss in https://github.com/learningequality/kolibri/pull/11534\\r\\n*
        Fix notification updates in Coach by @rtibbles in https://github.com/learningequality/kolibri/pull/11621\\r\\n*
        Reduce whl size, bundle C extensions for all Python 3 versions on Windows
        by @rtibbles in https://github.com/learningequality/kolibri/pull/11636\\r\\n*
        trying to make all of the card layouts be in sync with one another by @marcellamaki
        in https://github.com/learningequality/kolibri/pull/11573\\r\\n* Include nodes
        for import that are missing supplementary files by @dbnicholson in https://github.com/learningequality/kolibri/pull/11651\\r\\n*
        Sanitize inputs to handle NULL characters when parsing a string literal by
        @KshitijThareja in https://github.com/learningequality/kolibri/pull/11660\\r\\n*
        Hides app bars on scroll down and show on scroll up by @akolson in https://github.com/learningequality/kolibri/pull/11551\\r\\n*
        Fix card widths on ultra wide screen by @iskipu in https://github.com/learningequality/kolibri/pull/11665\\r\\n*
        Add a meaningful error warning when KDS path is not provided when running
        yarn run devserver-with-kds by @KshitijThareja in https://github.com/learningequality/kolibri/pull/11657\\r\\n*
        Bump the babel group with 1 update by @dependabot in https://github.com/learningequality/kolibri/pull/11668\\r\\n*
        Bump eslint-plugin-import from 2.29.0 to 2.29.1 by @dependabot in https://github.com/learningequality/kolibri/pull/11670\\r\\n*
        Bump @testing-library/jest-dom from 6.1.5 to 6.1.6 by @dependabot in https://github.com/learningequality/kolibri/pull/11677\\r\\n*
        Linting rule to check formatting of translation strings by @KshitijThareja
        in https://github.com/learningequality/kolibri/pull/11681\\r\\n* fixing scroll
        issue at save changes button by @iskipu in https://github.com/learningequality/kolibri/pull/11645\\r\\n*
        Contributors welcome to our authors.md! by @vkWeb in https://github.com/learningequality/kolibri/pull/11688\\r\\n*
        Authors are pilots of kolibri by @vkWeb in https://github.com/learningequality/kolibri/pull/11691\\r\\n*
        Fixing action's push to PR branch by @vkWeb in https://github.com/learningequality/kolibri/pull/11693\\r\\n*
        Hide modal when a token has multiple channels by @jredrejo in https://github.com/learningequality/kolibri/pull/11686\\r\\n*
        Update to nodejs 18. by @rtibbles in https://github.com/learningequality/kolibri/pull/11684\\r\\n*
        Remove mostly useless warning against using npm by @rtibbles in https://github.com/learningequality/kolibri/pull/11697\\r\\n*
        Bump the babel group with 3 updates by @dependabot in https://github.com/learningequality/kolibri/pull/11701\\r\\n*
        Bump html-webpack-plugin from 5.5.4 to 5.6.0 by @dependabot in https://github.com/learningequality/kolibri/pull/11703\\r\\n*
        Add command line deprecation warning for Python 2.7 by @rtibbles in https://github.com/learningequality/kolibri/pull/11700\\r\\n*
        Update package versions. by @rtibbles in https://github.com/learningequality/kolibri/pull/11698\\r\\n*
        move MeteredConnectionNotificationModal to Library Page & conditionally render
        \\\"Other Libraries\\\"  by @rtibbles in https://github.com/learningequality/kolibri/pull/11683\\r\\n*
        Better setup wizard errors by @rtibbles in https://github.com/learningequality/kolibri/pull/11655\\r\\n*
        Fix to new badge being shown on channel delete by @thesujai in https://github.com/learningequality/kolibri/pull/11676\\r\\n*
        Delete previously committed message files with outdated naming scheme update
        all translations by @rtibbles in https://github.com/learningequality/kolibri/pull/11705\\r\\n*
        Remove CACHES override in dev settings by @thesujai in https://github.com/learningequality/kolibri/pull/11706\\r\\n*
        Enque_lifo_job by @nick2432 in https://github.com/learningequality/kolibri/pull/11687\\r\\n*
        Pin alabaster theme to version that is compatible with our version of sphinx.
        by @rtibbles in https://github.com/learningequality/kolibri/pull/11709\\r\\n*
        Bump follow-redirects from 1.15.2 to 1.15.4 by @dependabot in https://github.com/learningequality/kolibri/pull/11710\\r\\n*
        Better handling of validation errors when remote facility does not require
        passwords by @jredrejo in https://github.com/learningequality/kolibri/pull/11704\\r\\n*
        Handle metadata import failure. by @rtibbles in https://github.com/learningequality/kolibri/pull/11690\\r\\n*
        Remove inaccessible language switcher modal. by @rtibbles in https://github.com/learningequality/kolibri/pull/11718\\r\\n*
        Bump stylelint-scss from 5.3.1 to 5.3.2 by @dependabot in https://github.com/learningequality/kolibri/pull/11721\\r\\n*
        Bump the babel group with 1 update by @dependabot in https://github.com/learningequality/kolibri/pull/11720\\r\\n*
        Linting issue in no-console by @thesujai in https://github.com/learningequality/kolibri/pull/11707\\r\\n*
        Fixed intermittent KeyError when handling a finished future in the task worker
        #11350 by @adviti-mishra in https://github.com/learningequality/kolibri/pull/11591\\r\\n*
        Catch badly formed UUIDs passed to facility parameter by @rtibbles in https://github.com/learningequality/kolibri/pull/11735\\r\\n*
        Unpin docs requirements and tweak docs to fix build by @rtibbles in https://github.com/learningequality/kolibri/pull/11736\\r\\n*
        Swap on-my-own const for using the existing Personal const by @marcellamaki
        in https://github.com/learningequality/kolibri/pull/11514\\r\\n* Fix welcome
        modal appearing after deleting channels by @ozer550 in https://github.com/learningequality/kolibri/pull/11708\\r\\n*
        Username case error by @nick2432 in https://github.com/learningequality/kolibri/pull/11716\\r\\n*
        No download buttons in app context by @rtibbles in https://github.com/learningequality/kolibri/pull/11740\\r\\n*
        Fix to Env Var and Config persisting in options.ini in KOLIBRI_HOME by @thesujai
        in https://github.com/learningequality/kolibri/pull/11737\\r\\n* Bump css-minimizer-webpack-plugin
        from 5.0.1 to 6.0.0 by @dependabot in https://github.com/learningequality/kolibri/pull/11747\\r\\n*
        Bump the github group with 1 update by @dependabot in https://github.com/learningequality/kolibri/pull/11748\\r\\n*
        Remove coach page specific sub nav toggling. by @rtibbles in https://github.com/learningequality/kolibri/pull/11744\\r\\n*
        Removes uncleaned up reference to isAndroidWebview. by @rtibbles in https://github.com/learningequality/kolibri/pull/11750\\r\\n*
        Turn on learner resource download by default for on my own setup. by @rtibbles
        in https://github.com/learningequality/kolibri/pull/11752\\r\\n* Prevent learner
        only devices from being shown as an import source when creating one. by @rtibbles
        in https://github.com/learningequality/kolibri/pull/11756\\r\\n\\r\\n## New
