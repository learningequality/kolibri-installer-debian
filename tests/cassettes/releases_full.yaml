        charset=utf-8\",\"state\":\"uploaded\",\"size\":97142654,\"digest\":\"sha256:c2bcd74951f237b1cc14d5d4142a16732a2aa1ca4ad0a5c0ef3d67eadffa881c\",\"download_count\":9,\"created_at\":\"2025-11-06T23:16:40Z\",\"updated_at\":\"2025-11-06T23:16:44Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.19.0-beta2/kolibri_0.19.0b2-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.19.0-beta2\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.19.0-beta2\",\"body\":\"##
        QA List \\r\\n\\r\\n \U0001F389 At this point, we are ready to begin critical
        workflows and integration testing! \U0001F389 \\r\\n \\r\\n As we've done
        recent years, we'll be using our somewhat-consolidated testing matrix that
        includes critical workflows on each OS version, but full integration only
        once per browser as a whole for each OS.\\r\\n\\r\\nAs an example:\\r\\n-
        critical workflows on Windows 7, 10 and 11.\\r\\n- full integration once each
        on Firefox, Chrome and Edge \\r\\n\\r\\nSo, in other words, no need to do
        full integration on Firefox on Windows 7, Firefox on Windows 10, Firefox on
        Windows 11, and then repeat on Chrome and Edge. \\r\\n\\r\\nThis allows us
        to confirm that our most essential tasks work on all of our supported OS versions,
        but not spend too much time worrying about browser-specific bug, which tend
        to be frontend bugs in the browser _itself_, not in Kolibri, that we wouldn't
        be able to easily address.\\r\\n\\r\\n## What's Changed\\r\\n* Add always
        on support for Django-silk in development. by @rtibbles in https://github.com/learningequality/kolibri/pull/13807\\r\\n*
        [Copy a class]: Use vuex getter for facility-aware redirection by @nucleogenesis
        in https://github.com/learningequality/kolibri/pull/13858\\r\\n* Check unusable
        device on user_auth plugin by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13759\\r\\n*
        [BUM Side Panel]: Fix hidden android side panels by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13855\\r\\n*
        have copy learners in copy class workflow set to true by default by @marcellamaki
        in https://github.com/learningequality/kolibri/pull/13864\\r\\n* Refactor
        UsersTableToolbar by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13862\\r\\n*
        Gherkin scenarios updates for Kolibri 0.19 by @pcenov in https://github.com/learningequality/kolibri/pull/13647\\r\\n*
        Updates empty filter state messaging by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13762\\r\\n*
        Manually cherry-picked rebasing of @AllanOXDi 's `filtersupdate` branch #13830
        by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13860\\r\\n*
        shows error message immediately the token entered fails by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13870\\r\\n*
        options button remain active after selection by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13838\\r\\n*
        Add load testing framework for learner lesson interactions. by @rtibbles in
        https://github.com/learningequality/kolibri/pull/13856\\r\\n* Fixes Bulk User
        Creation Failed prop console error by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13830\\r\\n*
        Finalize the renaming and migration of JS packages in the packages directory
        by @rtibbles in https://github.com/learningequality/kolibri/pull/13869\\r\\n*
        Robustly clear sessions on user deletion to cause immediate logout by @rtibbles
        in https://github.com/learningequality/kolibri/pull/13757\\r\\n* Fix CopyClassModal
        handle removed coaches by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13879\\r\\n*
        Remove vestigial is_facility_user flag in favour of standard Django user properties
        by @rtibbles in https://github.com/learningequality/kolibri/pull/13857\\r\\n*
        Use BEGIN IMMEDIATE for all SQLite transactions by default by @rtibbles in
        https://github.com/learningequality/kolibri/pull/13878\\r\\n* Cleanup unused
        dependencies for kolibri-tools by @rtibbles in https://github.com/learningequality/kolibri/pull/13877\\r\\n\\r\\n###
        Dependencies\\r\\n* Bump @testing-library/jest-dom from 6.6.4 to 6.9.1 by
        @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13815\\r\\n*
        Bump core-js from 3.45.1 to 3.46.0 by @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13835\\r\\n*
        Bump dompurify from 3.2.7 to 3.3.0 by @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13836\\r\\n*
        Bump katex from 0.16.22 to 0.16.25 by @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13831\\r\\n*
        Bump webpack from 5.102.0 to 5.102.1 by @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13814\\r\\n*
        Bump min-document from 2.19.0 to 2.19.1 by @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13881\\r\\n*
        Bump the github group across 1 directory with 4 updates by @dependabot[bot]
        in https://github.com/learningequality/kolibri/pull/13876\\r\\n\\r\\n\\r\\n\\r\\n**Full
        Changelog**: https://github.com/learningequality/kolibri/compare/v0.19.0-beta1...v0.19.0-beta2\",\"mentions_count\":7},{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/255887487\",\"assets_url\":\"https://api.github.com/repos/learningequality/kolibri/releases/255887487/assets\",\"upload_url\":\"https://uploads.github.com/repos/learningequality/kolibri/releases/255887487/assets{?name,label}\",\"html_url\":\"https://github.com/learningequality/kolibri/releases/tag/v0.19.0-beta1\",\"id\":255887487,\"author\":{\"login\":\"nucleogenesis\",\"id\":6356129,\"node_id\":\"MDQ6VXNlcjYzNTYxMjk=\",\"avatar_url\":\"https://avatars.githubusercontent.com/u/6356129?v=4\",\"gravatar_id\":\"\",\"url\":\"https://api.github.com/users/nucleogenesis\",\"html_url\":\"https://github.com/nucleogenesis\",\"followers_url\":\"https://api.github.com/users/nucleogenesis/followers\",\"following_url\":\"https://api.github.com/users/nucleogenesis/following{/other_user}\",\"gists_url\":\"https://api.github.com/users/nucleogenesis/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/nucleogenesis/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/nucleogenesis/subscriptions\",\"organizations_url\":\"https://api.github.com/users/nucleogenesis/orgs\",\"repos_url\":\"https://api.github.com/users/nucleogenesis/repos\",\"events_url\":\"https://api.github.com/users/nucleogenesis/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/nucleogenesis/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"node_id\":\"RE_kwDOAvqWa84PQIh_\",\"tag_name\":\"v0.19.0-beta1\",\"target_commitish\":\"develop\",\"name\":\"v0.19.0-beta1\",\"draft\":false,\"immutable\":false,\"prerelease\":true,\"created_at\":\"2025-10-20T23:56:48Z\",\"updated_at\":\"2025-10-21T03:58:45Z\",\"published_at\":\"2025-10-21T03:20:49Z\",\"assets\":[{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/a