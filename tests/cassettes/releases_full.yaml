        \ What's Changed \\r\\n \\r\\nThis release includes HTML5 Article Renderer
        improvements, performance optimizations including a ~25% reduction in JS bundle
        size, and foundational work for upcoming features. We also addressed some
        tech debt and continued cleaning up Python 2.7 compatibility code with great
        help from the community. \\r\\n\\r\\n##  Added \\r\\n \\r\\n####  Content
        & Rendering \\r\\n  - Adds polyfill for <dialog> to ensure browser compatibility
        in HTML5 Article Renderer by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13951
        \\r\\n  - [HTML5 Article Renderer] Refactor Table Implementation by @AllanOXDi
        in https://github.com/learningequality/kolibri/pull/14002 \\r\\n  - Implements
        simple scroll progress tracking for safe html5 renderer by @akolson in https://github.com/learningequality/kolibri/pull/13983
        \\r\\n  - Add modality field to ContentNode by @AlexVelezLl in  https://github.com/learningequality/kolibri/pull/14042
        \\r\\n  - Add modality filter query param in Content API by @nucleogenesis
        in https://github.com/learningequality/kolibri/pull/14058 \\r\\n \\r\\n####
        \ Courses Feature (Foundational) \\r\\n  - Add initial core courses Django
        app files by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/14066
        \\r\\n  - Add courses_exist to the coach's plugin_data by @AlexVelezLl in
        https://github.com/learningequality/kolibri/pull/14068 \\r\\n \\r\\n####  Developer
        Tooling \\r\\n  - Add ESLint rule to validate translator key destructuring
        by @rtibbles in https://github.com/learningequality/kolibri/pull/13932 \\r\\n
        \ - LFS File pre-commit check by @rtibbles in https://github.com/learningequality/kolibri/pull/13947
        \\r\\n  - Add comprehensive documentation for URL namespacing by @rtibbles
        in https://github.com/learningequality/kolibri/pull/13863 \\r\\n  - Add documentation
        about plugin enabling on pex by @rtibbles in https://github.com/learningequality/kolibri/pull/13948
        \\r\\n \\r\\n##  Changed \\r\\n \\r\\n####  Performance & Build \\r\\n  -
        Reduce JS production build size by ~25% by @rtibbles in https://github.com/learningequality/kolibri/pull/13912
        \\r\\n  - Update KDS to 5.5.0 by @MisRob in https://github.com/learningequality/kolibri/pull/13999
        \\r\\n  - Update H5P JavaScript library by @learning-equality-bot[bot] in
        https://github.com/learningequality/kolibri/pull/13993 \\r\\n  - remove varchar_pattern_ops
        index by @ozer550 in https://github.com/learningequality/kolibri/pull/14076\\r\\n\\r\\n####
        \ Tech debt / refactors\\r\\n  - Removes the paginatedListContainerWithBackend
        by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13871 \\r\\n
        \ - Migrate from assets/src to frontend by @rtibbles in https://github.com/learningequality/kolibri/pull/14009
        \ \\r\\n  - Update .git-blame-ignore-revs for frontend migration changes by
        @rtibbles in https://github.com/learningequality/kolibri/pull/14011 \\r\\n
        \\r\\n####  Python 2.7 Cleanup \\r\\n  - Remove Python 2.7 legacy: hasattr(output,
        'decode') runtime checks by @AadarshM07 in https://github.com/learningequality/kolibri/pull/13915
        \\r\\n  - Remove Python 2.7: Replace mkdirp() with os.makedirs() by @AadarshM07
        in https://github.com/learningequality/kolibri/pull/13927 \\r\\n  - Remove
        Python 2.7 legacy: Simplify OSError/IOError exception by @AadarshM07 in https://github.com/learningequality/kolibri/pull/13943
        \\r\\n  - Refactor replace replace() with os.replace() by @AadarshM07 in https://github.com/learningequality/kolibri/pull/13949
        \\r\\n  - Remove Python 2.7 legacy: Remove lru_cache backport by @Prashant-thakur77
        in https://github.com/learningequality/kolibri/pull/13952 \\r\\n  - Remove
        Python 2.7 legacy: Update JSONDecodeError exception handling by @Prashant-thakur77
        in https://github.com/learningequality/kolibri/pull/13950 \\r\\n  - Remove
        Python 2.7: Simple syntax and import cleanups by @AadarshM07 in https://github.com/learningequality/kolibri/pull/13955
        \\r\\n  - Update super calls python3 by @Prashant-thakur77 in https://github.com/learningequality/kolibri/pull/13984
        \\r\\n  - Remove Python 2.7 FileNotFoundError compatibility shims by @rtibbles
        in https://github.com/learningequality/kolibri/pull/13985 \\r\\n  \\r\\n \\r\\n#
        \ New Contributors \\r\\n \\r\\n  - @AadarshM07 made their first contribution
        in https://github.com/learningequality/kolibri/pull/13915 \\r\\n  - @Prashant-thakur77
        made their first contribution in https://github.com/learningequality/kolibri/pull/13952
        \\r\\n \\r\\n  Full Changelog: \\r\\n  https://github.com/learningequality/kolibri/compare/v0.19.0...v0.19.1-rc0
