        Final token updates by @marcellamaki in https://github.com/learningequality/kolibri/pull/12754\\r\\n\\r\\n###
        Added\\r\\n- Add Fulfulde translations by @radinamatic in https://github.com/learningequality/kolibri/pull/12738\\r\\n-
        Update morango for conditional indexes on store to improve deserialization
        performance. by @rtibbles in https://github.com/learningequality/kolibri/pull/12747\\r\\n\\r\\n###
        Fixed\\r\\n- Settings is not correct after tzlocal update by @jredrejo in
        https://github.com/learningequality/kolibri/pull/12683\\r\\n- Add missing
        `indeterminate` states on Select All checkboxes by @nucleogenesis in https://github.com/learningequality/kolibri/pull/12587\\r\\n-
        Fix import channel in Postgresql  by @jredrejo in https://github.com/learningequality/kolibri/pull/12709\\r\\n-
        Branding tweaks by @rtibbles in https://github.com/learningequality/kolibri/pull/12736\\r\\n-
        Tweaks to CLI and message extraction utility function by @rtibbles in https://github.com/learningequality/kolibri/pull/12320\\r\\n-
        Delete resource from everywhere when force_delete is selected by @thesujai
        in https://github.com/learningequality/kolibri/pull/12680\\r\\n- Dont delete
        the entire channel when deleting a single content by @thesujai in https://github.com/learningequality/kolibri/pull/12740\\r\\n-
        Prevent access to undefined AttemptLogs while looking at reports by @LianaHarris360
