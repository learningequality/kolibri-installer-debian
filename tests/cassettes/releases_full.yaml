        What's Changed\\r\\n\\r\\n### High level summary\\r\\nThe goals of this release
        were to fix a bug preventing proper syncing of an individual user's data across
        multiple devices and to make some small frontend improvements\\r\\n\\r\\n**Added**\\r\\n\\r\\n
        \ - Deprecation warnings for Python 3.4 and 3.5\\r\\n  - Added auto-alignment
        property for text display in cards, based on the language\\r\\n  - Allow untranslated
        headers in csv imports and correct serialization into json\\r\\n\\r\\n**Changed**\\r\\n\\r\\n
        \ - Updated morango to v0.6.8 to support syncing fixes\\r\\n  - Bump zeroconf
        for fix to properly trigger service update events\\r\\n  - Bump KDS version
        to v1.3.0\\r\\n  - Updated translations to support minor translation fixes\\r\\n
        \ - Updated gherkin scenarios for new features\\r\\n  - Content API: Change
        default ordering to combination of \\\"lft\\\" and \\\"id\\\"\\r\\n\\r\\n**Fixed**\\r\\n\\r\\n
        \ - Keyboard accessibility/tab navigation focusing for searching and filtering\\r\\n
        \ - Allow for scrolling in side panel, and have side panel always take up
        full height of page even with 0 results\\r\\n  - Small UI improvements including
        focus ring spacing, button alignment\\r\\n  - Hide hints column in Perseus
        renderer when it could not be displayed to improve display on smaller screens\\r\\n
        \ - Handle no xAPI statements existing when calculating H5P and HTML5 progress\\r\\n
        \ - Don't package core node_modules dir\\r\\n  - Refactor card components
        for consistency and comprehensibility\\r\\n  - Address tech debt around KDS
        theming colors\\r\\n  - Fixed several front end console errors\\r\\n  - Ensure
        that we filter by subset_of_users_device on network location API\\r\\n\\r\\n\\r\\n##
        Details: Complete list of PRs and link to full changelog\\r\\n<details>\\r\\n
        \ <summary>Complete list of PRs</summary>\\r\\n\\r\\n* rebuild kolibri tools
        for 0.14.7 by @indirectlylit in https://github.com/learningequality/kolibri/pull/8524\\r\\n*
        Bump morango to latest version 0.6.6 by @bjester in https://github.com/learningequality/kolibri/pull/8877\\r\\n*
        Add 0.15.0 changelog notes by @marcellamaki in https://github.com/learningequality/kolibri/pull/8966\\r\\n*
        Minor feature corrections by @pcenov in https://github.com/learningequality/kolibri/pull/8968\\r\\n*
        Don't package core node_modules dir by @rtibbles in https://github.com/learningequality/kolibri/pull/8957\\r\\n*
        Various UI fixes and improvements by @MisRob in https://github.com/learningequality/kolibri/pull/8973\\r\\n*
        Don't use git:// protocol for unauthenticated github access. by @rtibbles
        in https://github.com/learningequality/kolibri/pull/8987\\r\\n* Handle no
        xAPI statements existing. by @rtibbles in https://github.com/learningequality/kolibri/pull/8990\\r\\n*
        Bump morango to v0.6.7 by @bjester in https://github.com/learningequality/kolibri/pull/8995\\r\\n*
        Updates to several feature files for the 0.15 release by @pcenov in https://github.com/learningequality/kolibri/pull/8974\\r\\n*
        Content API: Change default ordering to \\\"lft\\\" by @manuq in https://github.com/learningequality/kolibri/pull/9002\\r\\n*
        Merge up morango bump to v0.6.7 by @bjester in https://github.com/learningequality/kolibri/pull/8998\\r\\n*
        Fix `isTopic` error on Topics page by @sairina in https://github.com/learningequality/kolibri/pull/8996\\r\\n*
        Move close button logic to `FullScreenSidePanel` by @sairina in https://github.com/learningequality/kolibri/pull/9018\\r\\n*
        Fix Library and Topics pages side panel scrolling by @sairina in https://github.com/learningequality/kolibri/pull/8986\\r\\n*
        Bump to 0.15.1 alpha by @rtibbles in https://github.com/learningequality/kolibri/pull/9040\\r\\n*
        Update KDS to v1.3.0 by @MisRob in https://github.com/learningequality/kolibri/pull/9036\\r\\n*
        Use url utilities to format urls by @bjester in https://github.com/learningequality/kolibri/pull/9026\\r\\n*
        Additional scenarios for manually adding the URL address of an existing Kolibri
        instance by @pcenov in https://github.com/learningequality/kolibri/pull/9045\\r\\n*
        Theming fixes + couple UI fixes by @MisRob in https://github.com/learningequality/kolibri/pull/9011\\r\\n*
        Fix formatting issues in CHANGELOG.md that is breaking docs build by @rtibbles
        in https://github.com/learningequality/kolibri/pull/9048\\r\\n* Fix range
        requests where 'end' is specified. by @rtibbles in https://github.com/learningequality/kolibri/pull/9047\\r\\n*
        Latest from Crowdin for 0.15.1 patch release by @radinamatic in https://github.com/learningequality/kolibri/pull/9049\\r\\n*
        reduce and fix migrations by @jredrejo in https://github.com/learningequality/kolibri/pull/8999\\r\\n*
        Release v0.14.x into Release v0.15.x by @rtibbles in https://github.com/learningequality/kolibri/pull/9054\\r\\n*
        Update ChangeLog bulleting by @rtibbles in https://github.com/learningequality/kolibri/pull/9055\\r\\n*
        frontend architecture docs correction re: default sass import by @nucleogenesis
        in https://github.com/learningequality/kolibri/pull/8976\\r\\n* Card refactor
        by @marcellamaki in https://github.com/learningequality/kolibri/pull/9038\\r\\n*
        Allow untranslated headers in csv + correct serialization into json by @jredrejo
        in https://github.com/learningequality/kolibri/pull/9039\\r\\n* Ensure that
        we filter by subset_of_users_device on network location API by @rtibbles in
        https://github.com/learningequality/kolibri/pull/9079\\r\\n* Fix morango 144:
        integrate new version of morango to address single-user syncing issue by @jamalex
        in https://github.com/learningequality/kolibri/pull/9073\\r\\n* Tweak implementation
        of SlicedFile to match tested version from whitenoise by @rtibbles in https://github.com/learningequality/kolibri/pull/9066\\r\\n*
        Use os.path.abspath to ensure path resolution. by @rtibbles in https://github.com/learningequality/kolibri/pull/9081\\r\\n*
        API: Remove duplicates for tag filtering by @danigm in https://github.com/learningequality/kolibri/pull/9059\\r\\n*
        Add regression test for latest sync issue, and bump morango to 0.6.8 by @jamalex
        in https://github.com/learningequality/kolibri/pull/9084\\r\\n* Fix the side
        panel not taking the full height on a page with no content when browsing a
        channel  by @MisRob in https://github.com/learningequality/kolibri/pull/9089\\r\\n*
        Bump zeroconf for fix to properly trigger service update events by @bjester
        in https://github.com/learningequality/kolibri/pull/9092\\r\\n* Make database
        preseeding sensitive to custom build options. by @rtibbles in https://github.com/learningequality/kolibri/pull/9076\\r\\n*
        Add padding to <th> and <td> elements on device permission page table by @marcellamaki
        in https://github.com/learningequality/kolibri/pull/9087\\r\\n* Fix alignment
        and improve visibility of navigation buttons in a quiz by @MisRob in https://github.com/learningequality/kolibri/pull/9085\\r\\n*
        Fixes for buttons on resource cards by @MisRob in https://github.com/learningequality/kolibri/pull/9083\\r\\n*
        Fix focus for mobile full screen side panel; update `CoreMenu`, `CompletionModal`,
        and `FocusTrap` API by @sairina in https://github.com/learningequality/kolibri/pull/9029\\r\\n*
        Perseus to only show hints when allowHints or interactive is true  by @nucleogenesis
        in https://github.com/learningequality/kolibri/pull/9098\\r\\n* Fix typo in
