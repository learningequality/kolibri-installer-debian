        charset=utf-8\",\"state\":\"uploaded\",\"size\":97883746,\"digest\":null,\"download_count\":13,\"created_at\":\"2025-04-28T15:03:29Z\",\"updated_at\":\"2025-04-28T15:03:32Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.18.0/kolibri_0.18.0-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.18.0\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.18.0\",\"body\":\"##
        0.18.0\\r\\n\\r\\n### High level overview\\r\\nRelease 0.18.0 introduces improvements
        and new features in the **Coach** experience to make it easier to find materials
        when creating a lesson or quiz.\\r\\n\\r\\n### Added\\r\\n**New Feature: Coaches
        can now use metadata filtering when creating lessons and quizzes**\\r\\n\\r\\nUpdates
        to lessons and quizzes help coaches find what they need faster. Coaches can
        use filters like **activity type** (video, audio, reading materials), **language**,
        **level**, **category** (school subjects, vocational materials), and more.
        By combining a variety of filters, coaches can quickly locate specific and
        relevant materials they need.\\r\\n\\r\\n**Additional new workflows**\\r\\n-
        The navigation in coach is updated and simplified. Pages are now organized
        around \\\"Lessons\\\" and \\\"Quizzes\\\", rather than \\\"Reports\\\" and
        \\\"Plan\\\", making it easier to quickly find the relevant lesson and quiz
        pages. Some pages also have additional information and interactions added.\\r\\n-
        Coaches have updated quiz creation options. They can choose to have Kolibri
        create a quiz for them from selected exercises, or they can choose specific
        questions from their available resources.\\r\\n- Bloom player is now supported
        in Kolibri.\\r\\n- Coaches can choose when to make quiz reports available
        to learners.\\r\\n\\r\\nNoteworthy technical updates include rearchitecting
        our Coach plugin pages to support the navigation updates, extending the routing
        structure in coach to use nested routes and a side-panel style UX in lessons,
        and upgrading KDS to provide a variety of bug fixes and introduce the new
        `KCard` component.\\r\\n\\r\\n\\r\\n<details>\\r\\n  <summary>List of supporting
        PRs</summary>\\r\\n\\r\\n- 0.18: Groups view updates by @nucleogenesis in
        https://github.com/learningequality/kolibri/pull/12696\\r\\n- 0.18: Plan Quizzes
        view updates by @ozer550 in https://github.com/learningequality/kolibri/pull/12704\\r\\n-
        Add checks for exam groups and learner_ids to fix empty quiz page display
        by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/13264\\r\\n-
