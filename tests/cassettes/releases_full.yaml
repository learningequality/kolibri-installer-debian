        charset=utf-8\",\"state\":\"uploaded\",\"size\":97717860,\"digest\":\"sha256:9c85c5f72e367f79e1aa823d19117a434c3f19d6ac8383922863bbf8ab37160b\",\"download_count\":3,\"created_at\":\"2026-01-16T00:18:41Z\",\"updated_at\":\"2026-01-16T00:18:44Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.19.1-beta0/kolibri_0.19.1b0-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.19.1-beta0\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.19.1-beta0\",\"body\":\"##
        QA Guidance\\r\\n\\r\\n#### 1. All Content Viewers\\r\\n\\r\\nWhat to test:
        Every content type renderer (HTML5, H5P, BloomPUB, video, audio, PDF, ePub,
        Perseus, slideshow, QTI)\\r\\n\\r\\nWhat to look for: JavaScript errors, broken
        interactions, content failing to load, performance differences\\r\\n\\r\\nWhy:
        Webpack bundling changes re-enabled Terser mangling and changed how core-js
        polyfills are loaded in the sandbox. These affect all compiled JavaScript.\\r\\n\\r\\n-
        6a4c0c4621 - Webpack bundle size optimizations (mangling re-enabled)\\r\\n-
        de9ac92470 - Fix core-js duplication in viewer bundles\\r\\n- 54eb476011 -
        H5P JavaScript library update\\r\\n\\r\\n#### 2. Application Startup & Navigation\\r\\n\\r\\nWhat
        to test: Initial page load, navigation menu population\\r\\n\\r\\nWhat to
        look for: Delayed or missing navigation items, flash of untranslated content,
        race conditions on slow connections\\r\\n\\r\\nWhy: i18n setup is now async
        with lazy-loaded locale data. Navigation component registration is deferred
        until i18n completes. This changes the timing of when the app becomes fully
        interactive.\\r\\n\\r\\n- 2eb1fbab96 - Lazy load all intl and vue-intl locale
        files, defer nav component registration\\r\\n\\r\\n#### 3. Internationalization
        Across the App\\r\\n\\r\\nWhat to test: Non-English languages, RTL languages,
        language switching\\r\\n\\r\\nWhat to look for: Missing translations, layout
        breaks in RTL, errors when switching languages\\r\\n\\r\\nWhy: The entire
        i18n initialization flow was refactored from synchronous to asynchronous.
        Any code that assumed translations were immediately available could break.\\r\\n\\r\\n-
        2eb1fbab96 - Lazy load all intl and vue-intl locale files\\r\\n\\r\\n####
        4. Channel Import\\r\\n\\r\\nWhat to test: Import channels from various sources\\r\\n\\r\\nWhat
        to look for: Import failures, missing metadata post-import\\r\\n\\r\\nWhy:
        Channel import now includes modality annotation step. The annotation uses
        options__contains JSON string matching.\\r\\n\\r\\n- 3458d8fcf2 - Annotate
        modality field on upgrade and channel import flows\\r\\n\\r\\n\"},{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/269284563\",\"assets_url\":\"https://api.github.com/repos/learningequality/kolibri/releases/269284563/assets\",\"upload_url\":\"https://uploads.github.com/repos/learningequality/kolibri/releases/269284563/assets{?name,label}\",\"html_url\":\"https://github.com/learningequality/kolibri/releases/tag/v0.19.0\",\"id\":269284563,\"author\":{\"login\":\"marcellamaki\",\"id\":17235236,\"node_id\":\"MDQ6VXNlcjE3MjM1MjM2\",\"avatar_url\":\"https://avatars.githubusercontent.com/u/17235236?v=4\",\"gravatar_id\":\"\",\"url\":\"https://api.github.com/users/marcellamaki\",\"html_url\":\"https://github.com/marcellamaki\",\"followers_url\":\"https://api.github.com/users/marcellamaki/followers\",\"following_url\":\"https://api.github.com/users/marcellamaki/following{/other_user}\",\"gists_url\":\"https://api.github.com/users/marcellamaki/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/marcellamaki/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/marcellamaki/subscriptions\",\"organizations_url\":\"https://api.github.com/users/marcellamaki/orgs\",\"repos_url\":\"https://api.github.com/users/marcellamaki/repos\",\"events_url\":\"https://api.github.com/users/marcellamaki/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/marcellamaki/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"node_id\":\"RE_kwDOAvqWa84QDPTT\",\"tag_name\":\"v0.19.0\",\"target_commitish\":\"release-v0.19.0\",\"name\":\"v0.19.0\",\"draft\":false,\"immutable\":false,\"prerelease\":false,\"created_at\":\"2025-12-10T20:58:23Z\",\"updated_at\":\"2025-12-11T16:15:22Z\",\"published_at\":\"2025-12-10T21:03:32Z\",\"assets\":[{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/assets/327063573\",\"id\":327063573,\"node_id\":\"RA_kwDOAvqWa84TfpgV\",\