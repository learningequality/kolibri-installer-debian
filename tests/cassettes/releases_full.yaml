        Release notes generated using configuration in .github/release.yml at develop
        -->\\r\\n\\r\\n## What's Changed\\r\\n### QA Review List\\r\\n#### Regression
        testing bulk user behavior\\r\\n\\r\\nThe following has made substantial changes
        to the look & feel of the bulk user management table. Please test all bulk
        action workflows on:\\r\\n\\r\\n- Android app\\r\\n- Mobile screens (portrait
        orientation)\\r\\n- Tablet screens & larger\\r\\n\\r\\n* Prototyping User
        Table Design Updates by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13808\\r\\n\\r\\n###
        Fixes & updates\\r\\n\\r\\n* Allow class search to match text anywhere in
        the string by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/13773\\r\\n*
        Remove unused modal by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13788\\r\\n*
        Add empty messages on classes lists by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13785\\r\\n*
        [HTML5 Article Renderer] Add lightbox functionality for images by @WinnyChang
        in https://github.com/learningequality/kolibri/pull/13639\\r\\n* Morango upgrade
        and sync queue tweaks by @rtibbles in https://github.com/learningequality/kolibri/pull/13774\\r\\n*
        Unwrapped strings rule by @rtibbles in https://github.com/learningequality/kolibri/pull/13787\\r\\n*
        QTI Survey fixes by @rtibbles in https://github.com/learningequality/kolibri/pull/13791\\r\\n*
        bump version by @marcellamaki in https://github.com/learningequality/kolibri/pull/13796\\r\\n*
        Add funding.json manifest to Kolibri for submission to FLOSS fund by @bjester
        in https://github.com/learningequality/kolibri/pull/13805\\r\\n* Update changelog
        by @marcellamaki in https://github.com/learningequality/kolibri/pull/13809\\r\\n*
        0.18 into develop by @rtibbles in https://github.com/learningequality/kolibri/pull/13811\\r\\n*
        Update from target repository commit by @learning-equality-bot[bot] in https://github.com/learningequality/kolibri/pull/13837\\r\\n*
        [Bulk User]: Handle bad-data errors w/ `handleApiError` (+ better side panel
        refresh handling) by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13769\\r\\n*
        Update build docs by @rtibbles in https://github.com/learningequality/kolibri/pull/13789\\r\\n*
        Filter out soft deleted users from lessons, quizzes and groups by @AlexVelezLl
        in https://github.com/learningequality/kolibri/pull/13806\\r\\n\\r\\n### Dependency
        updates\\r\\n* Bump dompurify from 3.2.6 to 3.2.7 by @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13776\\r\\n*
        Bump iso8601-duration from 2.1.2 to 2.1.3 by @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13775\\r\\n*
        Bump jest-environment-jsdom from 30.1.2 to 30.2.0 by @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13797\\r\\n*
        Bump babel-jest from 30.1.2 to 30.2.0 by @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13798\\r\\n*
        Bump webpack from 5.101.3 to 5.102.0 by @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13800\\r\\n*
        Bump typescript from 5.9.2 to 5.9.3 by @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13802\\r\\n*
        Bump jest from 30.1.3 to 30.2.0 by @dependabot[bot] in https://github.com/learningequality/kolibri/pull/13801\\r\\n\\r\\n\\r\\n**Full
