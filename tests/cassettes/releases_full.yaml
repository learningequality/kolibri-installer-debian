        What's Changed\\r\\n\\r\\n- Improvements to the \\\"undo\\\" workflow to reduce
        potential mistakes and confusion\\r\\n- Copying a class is now done in a KModal
        and allows the option to include coaches and learners in the new copy\\r\\n-
        Introduction of the [\\\"bulk assignment of coaches to classes\\\" workflow](https://github.com/learningequality/kolibri/pull/13614)\\r\\n-
        Introduction of the [\\\"bulk deletion of users workflow\\\"](https://github.com/learningequality/kolibri/pull/13651)\\r\\n-
        Introduction of the [\\\"deleted users management page\\\"](https://github.com/learningequality/kolibri/pull/13650)\\r\\n-
        Updated scroll bar and size handling for Users table. [Known follow-up issue](https://github.com/learningequality/kolibri/issues/13687)\\r\\n\\r\\n##
        QA review list\\r\\n\\r\\n#### All bulk actions\\r\\n\\r\\n[Figma specs](https://www.figma.com/design/2aE0zEXmyysxMZ6qO0ufh8/Bulk-User-Management?node-id=2728-5095&t=ygtopi05ShSogi6L-4)\\r\\n\\r\\n-
        All actions have been updated to have consistent behavior for handling user
        actions.\\r\\n- The \\\"You can undo this\\\" KModal has become a snackbar
        for all cases and should be tested in all cases.\\r\\n\\r\\n#### Copying a
        class\\r\\n\\r\\n- From Device > Classes page, I can copy a class without
        it's learners and coaches\\r\\n- From Device > Classes page, I can copy a
        class including both of it's learners and coaches\\r\\n- From Device > Classes
        page, I can copy a class without one of either learners and coaches\\r\\n-
        Class names input with more than one consecutive space should be treated as
        if there is only one space. So \\\"My Class\\\" should be treated as a duplicate
        of \\\"   My     Class    \\\"\\r\\n\\r\\n#### Removed users page\\r\\n\\r\\n[Figma](https://www.figma.com/design/2aE0zEXmyysxMZ6qO0ufh8/Bulk-User-Management?node-id=147-3750&t=ygtopi05ShSogi6L-4)
        _Note that some copy changes are not reflected in the Figma_\\r\\n\\r\\n-
        [Setup]: Device > Users page: Select and delete some users\\r\\n- Device >
        Users page: Click the Options dropdown and select \\\"View removed users\\\"
        - see a page listing users you've deleted\\r\\n- Check that you can \\\"un-delete\\\"
        them\\r\\n- Check that un-deleted users have their relationships to classes
        restored (ie, they're still a coach or learner in a class they were in before
        they were deleted)\\r\\n- Test that you can permanently delete users\\r\\n-
        Verify that the table's basic capabilities work as expected (sorting, pagination)\\r\\n\\r\\n<details>\\r\\n
        \ <summary>List of supporting PRs</summary>\\r\\n\\r\\n* [HTML5 Article Renderer]
