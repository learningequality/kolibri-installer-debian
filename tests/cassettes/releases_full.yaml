        charset=utf-8\",\"state\":\"uploaded\",\"size\":96414162,\"digest\":\"sha256:d3fb544b1d39f36b41e73df42baf036732abfeb1e1e920ee48dafbf6df2bf5e5\",\"download_count\":10,\"created_at\":\"2025-06-18T18:20:50Z\",\"updated_at\":\"2025-06-18T18:20:53Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.18.1/kolibri_0.18.1-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.18.1\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.18.1\",\"body\":\"##
        High level overview\\r\\nThis release includes bug fixes and improvements,
        including resolving a longstanding bug where quizzes were not syncing when
        assigned to individual learners or learner groups when those learners were
        using learner-only devices. It also updates quizzes so that sections now have
        fixed question order by default, based on feedback we heard from our community.\\r\\n\\r\\nFinally,
        it contains some non-breaking technical pre-work for upcoming projects.\\r\\n\\r\\n###
        Added\\r\\n* Add scopedLabelsLoading to useBaseSearch to handle loading states
        for non-search displaying label fetching  by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/13329\\r\\n*
        Use SQLAlchemy URL.create to better handle special characters in passwords
        by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/13374\\r\\n*
        Add questions url prop to Bloom player by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13384\\r\\n*
        Add a date_deleted field to FacilityUser and add Django migration file by
        @LianaHarris360 in https://github.com/learningequality/kolibri/pull/13420\\r\\n*
        Add SoftDeletedFacilityUserModelManager by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/13439\\r\\n*
        Initial setup for HTML Article Renderer plugin by @rtibbles in https://github.com/learningequality/kolibri/pull/13274\\r\\n\\r\\n\\r\\n###
        Changed\\r\\n* Cleans up no longer used component. by @rtibbles in https://github.com/learningequality/kolibri/pull/13349\\r\\n*
        Merge all commits from unmerged release branches but prefer all current changes
        by @rtibbles in https://github.com/learningequality/kolibri/pull/13362\\r\\n*
        cleans up learning activity imports from the learn plugin by @AllanOXDi in
        https://github.com/learningequality/kolibri/pull/13233\\r\\n* Limit job update
        DB writes to significant events by @rtibbles in https://github.com/learningequality/kolibri/pull/13403\\r\\n*
        Reference new contributing guidelines by @MisRob in https://github.com/learningequality/kolibri/pull/13389\\r\\n*
        Quiz Creation: Sections have fixed question order by default by @nucleogenesis
        in https://github.com/learningequality/kolibri/pull/13427\\r\\n* Remove deep
        KTextTruncator styles from AccessibleResourceCard by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13392\\r\\n*
        Upgrade version to 0.18.1 by @marcellamaki in https://github.com/learningequality/kolibri/pull/13444\\r\\n*
        Upgrade Kolibri windows installer for new signing workflow. by @rtibbles in
        https://github.com/learningequality/kolibri/pull/13487\\r\\n* Reduce size
        of built whl file by stripping unused Django locale files by @rtibbles in
        https://github.com/learningequality/kolibri/pull/13465\\r\\n\\r\\n\\r\\n###
        Fixed\\r\\n* Drag widget and lesson cleanup by @rtibbles in https://github.com/learningequality/kolibri/pull/13297\\r\\n*
        Resolve long standing issue which prevents proper refresh of stats file data.
        by @rtibbles in https://github.com/learningequality/kolibri/pull/13348\\r\\n*
        Fix LearnerSummaryPage lesson count discrepency by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13338\\r\\n*
        RTL fixes in Quiz Creation by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13340\\r\\n*
        Fix broken links in developer documentation by @vagrdev in https://github.com/learningequality/kolibri/pull/13343\\r\\n*
        Fix design issue in Facility > Class tables on Mac app and Safari by @LianaHarris360
        in https://github.com/learningequality/kolibri/pull/13369\\r\\n* Fix coach
        filtering by @akolson in https://github.com/learningequality/kolibri/pull/13413\\r\\n*
        Fix blank issue template by @MisRob in https://github.com/learningequality/kolibri/pull/13432\\r\\n*
        Override get_queryset to exclude soft deleted users by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13423\\r\\n*
        Upgrade KDS version by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13441\\r\\n*
        Fix truncated learn filters select options by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13404\\r\\n*
        Remove empty div in favor of cards sync metrics by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13320\\r\\n*
        Set min-width: 0 to fix always truncated titles in Safari and Mac app by @LianaHarris360
        in https://github.com/learningequality/kolibri/pull/13438\\r\\n* Restore the
        demo banner by @rtibbles in https://github.com/learningequality/kolibri/pull/13442\\r\\n*
        Don't override the adHoc learner assignments with the whole class by @marcellamaki
        in https://github.com/learningequality/kolibri/pull/13448\\r\\n* fix inadvertently
