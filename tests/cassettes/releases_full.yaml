        charset=utf-8\",\"state\":\"uploaded\",\"size\":75306662,\"digest\":null,\"download_count\":7,\"created_at\":\"2024-02-13T23:27:00Z\",\"updated_at\":\"2024-02-13T23:27:02Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.16.0-rc0/kolibri_0.16.0rc0-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.16.0-rc0\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.16.0-rc0\",\"body\":\"##
        What's Changed\\r\\n\\r\\n\\r\\n\\r\\n\\r\\n\\r\\n\\r\\n\\r\\n### Features\\r\\n\\r\\n####
        Robust syncing of user data and resources\\r\\n##### Support for quick learner
        setup and independent learners\\r\\n- Kolibri has a new onboarding experience
        which allows joining a facility, and streamlines getting started as an independent
        learner with a rapid \u201Con my own setup\u201D option\\r\\n- Independent
        learners can transfer their existing data and learning progress to a facility.\\r\\n#####
        Resource discovery\\r\\n- Assigned lesson and quiz resources are now automatically
        transferred to learner devices, allowing coaches to dynamically manage learner
        content, rather than an administrator needing to import all content devices
        before distribution.\\r\\n- Administrators and independent learners are now
        able to view other Kolibri Libraries on their local network and browse their
        resources, without having to import content. If they are connected to the
        internet, they will be able to browse resources on the Kolibri Content Library
        (hosted on Kolibri Studio).\\r\\n- Administrators can allow learners to download
        resources from other Kolibri Libraries to their device to view within Kolibri,
        even when they are no longer on the same network.\\r\\n##### Support for administrators\\r\\n-
        Administrators have a new option to add a PIN on learner-only devices, which
        allows an administrator easy access to the Device page while preventing learners
        from inadvertently making changes.\\r\\n- Administrators are now able to schedule
        syncing of facility data on a recurring basis at custom intervals.\\r\\n-
        When exporting log files, administrators are able to select the date range
        for the logs.\\r\\n##### Practice quizzes\\r\\n- This release supports practice
        quizzes, which are resources in the format of quizzes that learners can take
        in preparation for an assessment. They are able to see their score, and retry
        as many times as they would like, independently. Practice quiz resources are
        available through the Library, or can be assigned as part of a lesson. The
        same questions can also be assigned as a coach assigned quiz as a standardized
        assessment.\\r\\n\\r\\n### Changes\\r\\n\\r\\n#### Dev documentation/dev updates\\r\\n-
        Updated node version to 18\\r\\n- Getting started documentation updated\\r\\n-
        Updated to Webpack 5\\r\\n- Created Github actions for build pipeline\\r\\n-
        Created Github action to add assets to PRs\\r\\n- Task API changes have been
        finalized after initial work in 0.15. Documentation is now updated to describe
        how to interact with the API and define tasks in plugins.\\r\\n\\r\\n####
        Architectural changes\\r\\n- There is a new page architecture that is used
        across all Kolibri plugins, and the component has been removed. (Selected
        relevant high level issues and PRs: #9102, #9128, 9134.)\\r\\n- The Kolibri
        Process Bus has been updated to support easier composability for custom deployment
        architectures.\\r\\n- Conditional promises have been removed.\\r\\n- To support
        the new onboarding process for Kolibri, Kolibri apps can now access a capability
        to provide access controls based on the currently active operating system
        user.\\r\\n\\r\\n#### API Breaking Changes\\r\\n- Tasks API has now been finalized,
        previous methods for interacting with tasks that do not use the pluggable
        Tasks API have been removed.\\r\\n- The drive info endpoint has been moved
        the into the device app but functionality remains the same\\r\\n- The API
        for coordinating learner only device synchronization within a local area network
        has been updated to ensure robust and reliable syncing. Any users wishing
        to use learner only device synchronization must update all Kolibri devices
        to this newer version\\r\\n\\r\\n#### API Additions (non-breaking changes)\\r\\n-
        REST API for enabling and disabling plugins\\r\\n- Add API endpoint and hook
        driven capability for UI initiated device restart\\r\\n- Public signup viewset\\r\\n-
        Public content metadata endpoints to support granular resource import\\r\\n\\r\\n####
        Accessibility improvements\\r\\n- Landmarks have been added and refined across
        the Library page and its related subpages, for better accessibility. This
        is a first step in support of more robust accessibility support, particularly
        in terms of page navigation for screen reader users.\\r\\n\\r\\n### Deprecations\\r\\n-
        Support for Python 2.7 will be dropped in the upcoming version, 0.17. Upgrade
        your Python version to Python 3.6+ to continue working with Kolibri. More
        recent versions of Python 3 are recommended.\\r\\n- Support for this Internet
        Explorer 11 will be dropped in the upcoming version, 0.17. We recommend installing
        other browsers, such as Mozilla Firefox or Google Chrome, in order to continue
        working with Kolibri.\\r\\n\\r\\n### Kolibry Design System upgrades\\r\\n-
        Kolibri is now using kolibri-design-system v2.0.0 (a major version upgrade!).
        Please see the KDS release's Github page for documentation and full details
        about breaking changes and new features.\\r\\n\\r\\n\\r\\n\\r\\n## RC Diff\\r\\n*
        Use responsive composable instead of mixin to fix errors from the mixin. by
        @rtibbles in https://github.com/learningequality/kolibri/pull/11791\\r\\n*
        Capture more errors from the backend and show error messages for them by @jredrejo
        in https://github.com/learningequality/kolibri/pull/11807\\r\\n* Prevent user
        sign up on LOD imports by @rtibbles in https://github.com/learningequality/kolibri/pull/11827\\r\\n*
        Remove redundant mastery label masking exercise card thumbnail by @LianaHarris360
        in https://github.com/learningequality/kolibri/pull/11840\\r\\n* Ensure facility
        id is properly sent to public signup viewset. by @rtibbles in https://github.com/learningequality/kolibri/pull/11846\\r\\n*
        Fix 500 errors when using django redis cache for response caching by @rtibbles
        in https://github.com/learningequality/kolibri/pull/11849\\r\\n* Add conditional
        check to ensure resource exists before rendering report page by @marcellamaki
        in https://github.com/learningequality/kolibri/pull/11843\\r\\n* Pass the
        correct kwargs to the cleanupsyncs management command. by @rtibbles in https://github.com/learningequality/kolibri/pull/11854\\r\\n*
        LOD Syncing: create canonical set of assignments when learner is assigned
