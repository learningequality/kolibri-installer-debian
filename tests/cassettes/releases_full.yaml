        charset=utf-8\",\"state\":\"uploaded\",\"size\":75357650,\"digest\":null,\"download_count\":27,\"created_at\":\"2024-04-08T15:47:11Z\",\"updated_at\":\"2024-04-08T15:47:13Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.16.1/kolibri_0.16.1-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.16.1\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.16.1\",\"body\":\"<!--
        Release notes generated using configuration in .github/release.yml at release-v0.16.x
        -->\\r\\n\\r\\n## What's Changed\\r\\n\\r\\n### Added\\r\\n* Add customizable
        demographic field entry to facility admin interface by @rtibbles in https://github.com/learningequality/kolibri/pull/12032\\r\\n*
        Add check to call render on the response if it has a render method by @KshitijThareja
        in https://github.com/learningequality/kolibri/pull/11762\\r\\n* Add `devserver-with-kds`
        to watch core for changes if KDS option is provided by @thesujai in https://github.com/learningequality/kolibri/pull/11785\\r\\n*
        Add IsAuthenticated permission class in api/content/contentrequest by @thesujai
        in https://github.com/learningequality/kolibri/pull/11995\\r\\n* Add pre-commit
        hook and documentation to prevent swappable model dependencies by @rtibbles
        in https://github.com/learningequality/kolibri/pull/11989\\r\\n\\r\\n### Fixed
        \\r\\n* Fixes bug with case insensitive username matches during facility user
        bulk import  by @nick2432 in https://github.com/learningequality/kolibri/pull/11779\\r\\n*
        Fix screen flickering in Library page by @iskipu in https://github.com/learningequality/kolibri/pull/11853\\r\\n*
        Fix issues with Logging module ('kolibri.lib.logging') that blocks Library
        page access with a non-closable modal by @iskipu in https://github.com/learningequality/kolibri/pull/11820\\r\\n*
        Fix responsive onboarding setup wizard by @FidalMathew in https://github.com/learningequality/kolibri/pull/11847\\r\\n*
        Prevent errors for exact duplicate usernames by @rtibbles in https://github.com/learningequality/kolibri/pull/11755\\r\\n*
        Fix import duplicate usernames by @nick2432 in https://github.com/learningequality/kolibri/pull/11899\\r\\n*
        fix: os_user unnecessary password field by @ThEditor in https://github.com/learningequality/kolibri/pull/11814\\r\\n*
        Fix NO_FILE_BASED_LOGGING environment variable behavior by @KshitijThareja
        in \\r\\n* Fix Loader Misallignment and Flickering  by @iskipu in https://github.com/learningequality/kolibri/pull/11921\\r\\n*
        Fix side navigation scrolling by @poju3185 in https://github.com/learningequality/kolibri/pull/11992\\r\\n*
        Fix 'missing resource' alert not showing on Home page for missing quiz resources
        by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/12008\\r\\n*
        Fix inputs on devices that use both touchscreen and keyboard inputs by @poju3185
        in https://github.com/learningequality/kolibri/pull/11998\\r\\n* Fix inaccurate
        duplicate username reporting in bulk import by @rtibbles in https://github.com/learningequality/kolibri/pull/12040\\r\\n*
        Fix URL handling regression by @rtibbles in https://github.com/learningequality/kolibri/pull/12049\\r\\n*
        Fix release upload bug by @rtibbles in https://github.com/learningequality/kolibri/pull/12050\\r\\n*
        Fix asset naming in windows installer by updating windows installer version.
        by @rtibbles in https://github.com/learningequality/kolibri/pull/12055\\r\\n*
        \ Fix signed asset naming in windows installer by updating windows installer
        version. by @rtibbles in https://github.com/learningequality/kolibri/pull/12058\\r\\n\\r\\n###
        Changed \\r\\n* Delete coreAPI PageRoot component in favour of a default component
        in kolibri_app by @rtibbles in https://github.com/learningequality/kolibri/pull/11730\\r\\n*
        Use FacilityUser instead of AUTH_USER_MODEL in migrations by @jredrejo in
        https://github.com/learningequality/kolibri/pull/11984\\r\\n* Upgrade KDS
        from v2.0.0 to v3.0.1 on the release branch by @MisRob in https://github.com/learningequality/kolibri/pull/11929\\r\\n*
        bump version number by @marcellamaki in https://github.com/learningequality/kolibri/pull/11912\\r\\n*
        feat: update to vue-virtual-scroller 1.1.2 by @ThEditor in https://github.com/learningequality/kolibri/pull/11671\\r\\n*
        Refactor error handling in CustomDjangoCache by @thesujai in https://github.com/learningequality/kolibri/pull/11808\\r\\n*
        Update packages versions for latest release. by @rtibbles in https://github.com/learningequality/kolibri/pull/11919\\r\\n*
        Pin vue and vue-template-compiler to ensure correct version is used in kolibri-tools.
        by @rtibbles in https://github.com/learningequality/kolibri/pull/11930\\r\\n*
        Update version of all Android actions. by @rtibbles in https://github.com/learningequality/kolibri/pull/12007\\r\\n*
        Use a different glob lib for now by @bjester in https://github.com/learningequality/kolibri/pull/11913\\r\\n*
        Update README.md by @poju3185 in https://github.com/learningequality/kolibri/pull/12009\\r\\n*
        Update Mac tests to run on Python 3.10 by @rtibbles in https://github.com/learningequality/kolibri/pull/11753\\r\\n*
        Reuse URL validator for remote URL access. by @rtibbles in https://github.com/learningequality/kolibri/pull/12028\\r\\n*
        Remove any order_by to ensure values_list is properly unique. by @rtibbles
        in https://github.com/learningequality/kolibri/pull/12044\\r\\n* Removes inconsistently
