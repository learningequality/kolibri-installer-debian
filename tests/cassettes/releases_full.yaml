        Implement task polling composable by @ozer550 in https://github.com/learningequality/kolibri/pull/13158\\r\\n\\r\\n\\r\\n</details>\\r\\n\\r\\n###
        Changed\\r\\n\\r\\n**Kolibri JS Public API - BREAKING CHANGES**\\r\\n- **BREAKING
        CHANGE** - Large parts of the JS Public API have now been removed. For a complete
        specification of the current public API see the kolibri npm package.\\r\\n-
        **BREAKING CHANGE** - Only the TaskResource is now available as a public resource
        within the JS API. All other API endpoints, aside from those namespaced as
        'public' are considered internal and using them is not supported.\\r\\n- All
        previously public code has either been deleted, or is in the unpublished kolibri-common
        package in the repository. If you need to continue using any of this code,
        it is recommended to vendor and modify.\\r\\n\\r\\n\\r\\n<details>\\r\\n  <summary>List
