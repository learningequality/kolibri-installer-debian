        What's Changed\\r\\n* Actually cancel running jobs on worker shutdown to prevent
        blocking shutdown by @rtibbles in https://github.com/learningequality/kolibri/pull/11120\\r\\n*
        Fix links to issues in the contributing guidelines by @MisRob in https://github.com/learningequality/kolibri/pull/11126\\r\\n*
        Fix resource viewing wasted vertical spacing for smaller devices by @LianaHarris360
        in https://github.com/learningequality/kolibri/pull/11122\\r\\n* Fix sync
        progress tracking overflow by @bjester in https://github.com/learningequality/kolibri/pull/10561\\r\\n*
        Better handling of disconnected errors for API calls by @rtibbles in https://github.com/learningequality/kolibri/pull/11109\\r\\n*
        ui error resolved related to library by @GarvitSinghal47 in https://github.com/learningequality/kolibri/pull/11090\\r\\n*
        Updates AppBar styles to be consistent on desktop by @marcellamaki in https://github.com/learningequality/kolibri/pull/11008\\r\\n*
        Remove secrets as unusable for PR builds by @rtibbles in https://github.com/learningequality/kolibri/pull/11136\\r\\n*
        objectSpec sub-spec on arrays fix; themeSpec fix by @nucleogenesis in https://github.com/learningequality/kolibri/pull/11133\\r\\n*
        Bump jest from 29.6.2 to 29.6.3 by @dependabot in https://github.com/learningequality/kolibri/pull/11128\\r\\n*
