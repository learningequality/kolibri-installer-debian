        charset=utf-8\",\"state\":\"uploaded\",\"size\":97335666,\"digest\":\"sha256:ef8e004be2117f2dfb4986fac8ec274983587be345119e19a2ed2fe4387f4fa1\",\"download_count\":7,\"created_at\":\"2025-12-10T21:17:04Z\",\"updated_at\":\"2025-12-10T21:17:08Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.19.0/kolibri_0.19.0-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.19.0\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.19.0\",\"body\":\"###
        High level overview\\r\\nRelease 0.19.0 updates user management capabilities
        to make it easier for administrators to manage user accounts. The changes
        reduce the number of repetitive tasks required for class enrollment and unenrollment
        of learners, and general account management. This makes both setting up new
        programs and and year-over-year user management simpler and more efficient.
        \\r\\n\\r\\n### Added\\r\\n\\r\\n**New Feature: User Management**\\r\\n\\r\\nAdministrators
        can now perform actions on multiple users at once, reducing the time needed
        to manage users at scale. Key workflows include:\\r\\n\\r\\n- **Bulk user
        selection and actions**: Allows admins to select multiple users and apply
        actions to all of them at once, including enrollment, removal from classes,
        and deletion\\r\\n- **Copy classes**: Admins can now copy classes of learners
        and coaches\\r\\n- **Learner-only device management**: Allow admins to remove
        learner-only devices users from a device and import them outside of the setup
        wizard workflow\\r\\n- **Improved user creation workflow** Admins can now
        enroll a user in one or more classes during user account creation\\r\\n\\r\\n<details>\\r\\n
        \ <summary>List of supporting PRs</summary>\\r\\n\\r\\n- [WIP] Added Sorting
        facility to Users KTable by @BabyElias in https://github.com/learningequality/kolibri/pull/13393\\r\\n-
        Implement all_objects manager class in FacilityUser by @ozer550 in https://github.com/learningequality/kolibri/pull/13433\\r\\n-
        Bulk User Management strings by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13424\\r\\n-
        Selectable list by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13460\\r\\n-
        Implement soft delete users in bulk by @ozer550 in https://github.com/learningequality/kolibri/pull/13483\\r\\n-
        Bulk User: Strings fixes w/ ICU + add Class copy strings by @nucleogenesis
        in https://github.com/learningequality/kolibri/pull/13466\\r\\n- Insert checkbox
        column in Facility > Users KTable to allow user selection by @AllanOXDi in
        https://github.com/learningequality/kolibri/pull/13479\\r\\n- Improved Object
        Validations with New ValidateObject by @Abhishek-Punhani in https://github.com/learningequality/kolibri/pull/13301\\r\\n-
        Deleted facilityuser viewset by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13502\\r\\n-
        Update Fundamental routing & data architecture for users page by @LianaHarris360
        in https://github.com/learningequality/kolibri/pull/13515\\r\\n- Manage users
        in LOD by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/12228\\r\\n-
        BUM SidePanel: Implement Enroll (learners) to classes functionality by @LianaHarris360
        in https://github.com/learningequality/kolibri/pull/13544\\r\\n- Introduce
        copy class functionality by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13517\\r\\n-
        BUM: Improved user creation by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13538\\r\\n-
        Setup bulk user action buttons on the Facility Users page by @AllanOXDi in
        https://github.com/learningequality/kolibri/pull/13513\\r\\n- Implement repeating
        cleanup task for hard-deleting expired soft-deleted FacilityUsers by @ozer550
        in https://github.com/learningequality/kolibri/pull/13591\\r\\n- Disable class
        copy submission if class name is empty by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/13607\\r\\n-
        Remove class title in favour of class name in class copy form by @AllanOXDi
        in https://github.com/learningequality/kolibri/pull/13617\\r\\n- sorts class
        names in the dropdown menu alphabetically by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13616\\r\\n-
        Add user type column to csv logs export by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13624\\r\\n-
        [BUM] Add filters side panel by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13608\\r\\n-
        Implement move to trash side panel by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13600\\r\\n-
        BUM SidePanel: Implement remove users from classes side panel functionality
        by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/13651\\r\\n-
        Add removed users page by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13650\\r\\n-
        Fix error when deleting a single user in UsersTable by @LianaHarris360 in
        https://github.com/learningequality/kolibri/pull/13655\\r\\n- BUM SidePanel:
        Implement Assign (coaches) to classes functionality by @ozer550 in https://github.com/learningequality/kolibri/pull/13614\\r\\n-
        Update copy class to include learners and move from SidePanelModal to KModal
        by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/13665\\r\\n-
        Remove white spaces from formfields by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13606\\r\\n-
        Refactor undo actions + consistent go back and close confirmation guards by
        @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13674\\r\\n-
        Fix scroll users page by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13671\\r\\n-
        Fix LOD user management server sync interruptions by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/13695\\r\\n-
        Move auth methods to the useUser composable by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13704\\r\\n-
        Fixes the remove icon enabled when a super admin is selected by @AllanOXDi
        in https://github.com/learningequality/kolibri/pull/13700\\r\\n- Resolve error
        when re-enrolling the same user in multiple classes by @LianaHarris360 in
        https://github.com/learningequality/kolibri/pull/13681\\r\\n- Fixes the deletion
        of super admin by admin user. by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13666\\r\\n-
        Uncenter dropdown options within Users Table by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/13741\\r\\n-
        Fix users reload after soft-deleting a user by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13739\\r\\n-
        Update bulk action icons to need only one TAB press for keyboard navigation
        by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/13755\\r\\n-
        Standarize side panels styles by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13763\\r\\n-
        Handle deletion of coach from the assigned classes by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13652\\r\\n-
        Fixes selected users clearing before an action is completed by @AllanOXDi
        in https://github.com/learningequality/kolibri/pull/13701\\r\\n- Can copy
        (or rename or delete) on ClassEditPage as well by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13771\\r\\n-
        User Table Style Updates by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13743\\r\\n-
        Allow class search to match text anywhere in the string by @LianaHarris360
        in https://github.com/learningequality/kolibri/pull/13773\\r\\n- Remove unused
        modal by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13788\\r\\n-
        Add empty messages on classes lists by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13785\\r\\n-
        [Bulk User]: Handle bad-data errors w/ `handleApiError` (+ better side panel
        refresh handling) by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13769\\r\\n-
        Filter out soft deleted users from lessons, quizzes and groups by @AlexVelezLl
        in https://github.com/learningequality/kolibri/pull/13806\\r\\n- Prototyping
        User Table Design Updates by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13808\\r\\n-
        [Copy a class]: Use vuex getter for facility-aware redirection by @nucleogenesis
        in https://github.com/learningequality/kolibri/pull/13858\\r\\n- [BUM Side
        Panel]: Fix hidden android side panels by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13855\\r\\n-
        have copy learners in copy class workflow set to true by default by @marcellamaki
        in https://github.com/learningequality/kolibri/pull/13864\\r\\n- Refactor
        UsersTableToolbar by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13862\\r\\n-
        Updates empty filter state messaging by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13762\\r\\n-
        Manually cherry-picked rebasing of @AllanOXDi 's `filtersupdate` branch #13830
        by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13860\\r\\n-
        Fixes Bulk User Creation Failed prop console error by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13830\\r\\n-
        Fix CopyClassModal handle removed coaches by @nucleogenesis in https://github.com/learningequality/kolibri/pull/13879\\r\\n-
        Robustly clear sessions on user deletion to cause immediate logout by @rtibbles
        in https://github.com/learningequality/kolibri/pull/13757\\r\\n\\r\\n</details>\\r\\n\\r\\n\\r\\nNoteworthy
        technical updates include upgrading to Node.js v20, upgrading to Morango for
        improved sync reliability, implementing SQLite transaction improvements for
        better performance, and adding Django-silk support for development performance
        profiling.\\r\\n\\r\\nOther technical additions include upgrading Morango
        for improved sync performance, implementing load testing framework for learner
        interactions, and finalizing JS package renaming and migration in the packages
        directory.\\r\\n\\r\\n<details>\\r\\n  <summary>List of supporting PRs</summary>\\r\\n\\r\\n-
        Morango upgrade and sync queue tweaks by @rtibbles in https://github.com/learningequality/kolibri/pull/13774\\r\\n-
        Add load testing framework for learner lesson interactions by @rtibbles in
        https://github.com/learningequality/kolibri/pull/13856\\r\\n- Use BEGIN IMMEDIATE
        for all SQLite transactions by default by @rtibbles in https://github.com/learningequality/kolibri/pull/13878\\r\\n\\r\\n</details>\\r\\n\\r\\n###
        Changed\\r\\n\\r\\nCode cleanup and refactoring.\\r\\n\\r\\n<details>\\r\\n
        \ <summary>Supporting PRs</summary>\\r\\n\\r\\n- Upgrade Node.js from v18
        to v20 by @rtibbles in https://github.com/learningequality/kolibri/pull/13531\\r\\n-
        Remove vestigial is_facility_user flag in favour of standard Django user properties
        by @rtibbles in https://github.com/learningequality/kolibri/pull/13857\\r\\n-
        Cleanup unused dependencies for kolibri-tools by @rtibbles in https://github.com/learningequality/kolibri/pull/13877\\r\\n-
        Complete removal of content renderer mixin. by @rtibbles in https://github.com/learningequality/kolibri/pull/13628\\r\\n-
        Finalize the renaming and migration of JS packages in the packages directory
        by @rtibbles in https://github.com/learningequality/kolibri/pull/13869\\r\\n-
        Unwrapped strings rule by @rtibbles in https://github.com/learningequality/kolibri/pull/13787\\r\\n\\r\\n\\r\\n</details>\\r\\n\\r\\n\\r\\n###
        Fixed\\r\\n\\r\\n#### Miscellaneous UX improvements and fixes\\r\\n\\r\\n<details>\\r\\n
        \ <summary>List of supporting PRs</summary>\\r\\n\\r\\n- handles errors at
        editing quiz when there are no resources by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13288\\r\\n-
        Learn > Library - Loading state improvements by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13341\\r\\n-
        Ensure lesson resources load correctly across users and roles by @ozer550
        in https://github.com/learningequality/kolibri/pull/13714\\r\\n- [Bugfix]:
        Remove breaking h1 w/ previously removed string in quiz section editor by
        @nucleogenesis in https://github.com/learningequality/kolibri/pull/13768\\r\\n-
        Console error cleanup by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13772\\r\\n-
        Check unusable device on user_auth plugin by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/13759\\r\\n-
        shows error message immediately the token entered fails by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13870\\r\\n-
        options button remain active after selection by @AllanOXDi in https://github.com/learningequality/kolibri/pull/13838\\r\\n-
        Fix createsuperuser command failing due to email parameter by @rtibbles in
        https://github.com/learningequality/kolibri/pull/13898\\r\\n- Fix copy pasta
        error in management command argument help string by @rtibbles in https://github.com/learningequality/kolibri/pull/13679\\r\\n-
        Fix morango integration tests by @rtibbles in https://github.com/learningequality/kolibri/pull/13930\\r\\n-
        Mask sensitive fields in error reports and console logging by @rtibbles in
        https://github.com/learningequality/kolibri/pull/13981\\r\\n- Remove component
        for redirect only route. by @rtibbles in https://github.com/learningequality/kolibri/pull/13980\\r\\n\\r\\n</details>\\r\\n\\r\\n###
        Developer-facing improvements\\r\\n\\r\\nThis release includes improvements
        to developer tooling and documentation.\\r\\n\\r\\n<details>\\r\\n  <summary>List
        of supporting PRs</summary>\\r\\n\\r\\n- Remove custom issue templates and
        turn on issue header automation by @MisRob in https://github.com/learningequality/kolibri/pull/13480\\r\\n-
        Update workflow that handles contributor comments to the latest version by
        @MisRob in https://github.com/learningequality/kolibri/pull/13580\\r\\n- Update
        manage issue header workflow events by @MisRob in https://github.com/learningequality/kolibri/pull/13554\\r\\n-
        Remove flake8 requirements, unpin other dev dependencies for ease of use by
        @rtibbles in https://github.com/learningequality/kolibri/pull/13594\\r\\n-
        Add Python 3.9 requirement and WSL note to setup docs by @NihalShinde4933
        in https://github.com/learningequality/kolibri/pull/13463\\r\\n- Update build
        docs by @rtibbles in https://github.com/learningequality/kolibri/pull/13789\\r\\n-
        Add always on support for Django-silk in development by @rtibbles in https://github.com/learningequality/kolibri/pull/13807\\r\\n-
        Update macOS runner versions to avoid deprecation and removal by @rtibbles
        in https://github.com/learningequality/kolibri/pull/13908\\r\\n- Install dependencies
