        Release notes generated using configuration in .github/release.yml at develop
        -->\\r\\n\\r\\n## What's Changed\\r\\n\\r\\nThis is an unstable release for
        the new Enhanced Quiz Management feature, the flagship feature of 0.17. The
        new workflow will allow coaches to add sections to quizzes, enabling quizzes/assessments
        longer than 50 questions. Coaches will also be able to replace questions within
        a quiz, a long requested feature. \\r\\n\\r\\n### Feature and bugs PR list\\r\\n<details>\\r\\n\\r\\n*
        Composable translators by @rtibbles in https://github.com/learningequality/kolibri/pull/10960\\r\\n*
