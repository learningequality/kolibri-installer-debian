        Bump fflate from 0.8.0 to 0.8.1 by @dependabot in https://github.com/learningequality/kolibri/pull/11281\\r\\n*
        Bump glob from 10.3.4 to 10.3.5 by @dependabot in https://github.com/learningequality/kolibri/pull/11284\\r\\n*
