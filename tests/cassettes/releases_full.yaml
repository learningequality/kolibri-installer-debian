        What's Changed\\r\\n\\r\\n### High level summary\\r\\nThis release makes accessibility
        improvements across Kolibri including an [all new PDF accessibility feature
        for screen readers](https://blog.learningequality.org/google-summer-of-code-2022-improve-accessibility-of-pdf-renderer-alex-velez-b87abf46a355?gi=c8f5e596d604)!
        It also adds support for captions and transcript for audio files, and it improves
        the positioning of audio transcripts for languages that are read from right
        to left. \\r\\n\\r\\n### Added\\r\\n* Add PDF accessibility support for screen
        readers by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/9959
        and https://github.com/learningequality/kolibri/pull/10001\\r\\n* Add support
        for captions for audio by @rtibbles in https://github.com/learningequality/kolibri/pull/9912\\r\\n\\r\\n###
        Fixed\\r\\n* Fixed overflowing title alignment on content cards by @AllanOXDi
        in https://github.com/learningequality/kolibri/pull/9868\\r\\n* Improved visible
        focus outline fixed by @AllanOXDi in https://github.com/learningequality/kolibri/pull/9897\\r\\n*
        Fixed positioning of transcript layout when language is set to a right-to-left
        language by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/9963\\r\\n*
        Fixed calculation for number of users displayed on the User Tables. Original
        fix by @Kej-r03 in https://github.com/learningequality/kolibri/pull/9942.
        Ported from `develop` into this release by @rtibbles in https://github.com/learningequality/kolibri/pull/9995\\r\\n\\r\\n###
        Changed\\r\\n* Only display the completion modal on the finish event when
        the resource is also complete by @rtibbles in https://github.com/learningequality/kolibri/pull/9985\\r\\n\\r\\n##
        New Contributors\\r\\n@Kej-r03 made their first contribution\\r\\n\\r\\n**Full
