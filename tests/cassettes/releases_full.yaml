:\"https://api.github.com/users/jredrejo/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/jredrejo/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/jredrejo/subscriptions\",\"organizations_url\":\"https://api.github.com/users/jredrejo/orgs\",\"repos_url\":\"https://api.github.com/users/jredrejo/repos\",\"events_url\":\"https://api.github.com/users/jredrejo/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/jredrejo/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"content_type\":\"application/vnd.debian.binary-package\",\"state\":\"uploaded\",\"size\":29533626,\"digest\":null,\"download_count\":33,\"created_at\":\"2020-12-02T19:45:10Z\",\"updated_at\":\"2020-12-02T19:45:16Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.14.5/kolibri_0.14.5-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.14.5\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.14.5\",\"body\":\"Note:
        Kolibri 0.14.4 contained a critical issue (#7701) and is superseded by 0.14.5
        as the last stable release after 0.14.3.\\r\\n\\r\\n## Changelog\\r\\n\\r\\n###
        Changed\\r\\n\\r\\n* File downloads now run concurrently, taking better advantage
        of a device's bandwidth and reducing the time needed to import resources from
        Kolibri Studio or other content sources\\r\\n* When setting up a new device
        using the [Setup Wizard's \\\"Quick Start\\\" option](https://kolibri.readthedocs.io/en/latest/install/initial_setup.html#quick-start),
        the [\\\"Allow learners to create accounts\\\" setting](https://kolibri.readthedocs.io/en/latest/install/initial_setup.html#quick-start)
        is enabled by default.\\r\\n* The `provisiondevice` management command no
        longer converts the user-provided facility name to all lower-case\\r\\n* Markdown
        descriptions for resources now preserve line breaks from the original source\\r\\n\\r\\n###
        Fixed\\r\\n\\r\\n* Multiple bugs when creating, editing, and copying quizzes
        and lessons\\r\\n* Multiple bugs when navigating through out the Coach page\\r\\n*
        On Safari, sections of the Facility > Data page would disappear unexpectedly
        after syncing a facility\\r\\n* Missing thumbnails on resource cards when
        searching/browsing in channels\\r\\n* Numerous visual and accessibility issues\\r\\n*
        Facilities could not be renamed if the only changes were to the casing of
        the name (e.g. changing \\\"Facility\\\" to \\\"FACILITY\\\")\\r\\n* On IE11,
        it was not possible to setup a new device by importing a facility\\r\\n* Multiple
        bugs specific to Kolibri servers using PostgreSQL\\r\\n\\r\\n([0.14.5 Github
        milestone](https://github.com/learningequality/kolibri/issues?q=label%3Achangelog+milestone%3A0.14.5))\\r\\n\\r\\n##
        Detailed pre-release changelogs\\r\\n\\r\\n<details>\\r\\n\\r\\n### `0.14.5-rc1`\\r\\n\\r\\n*
        (Fixed) #6650 In the Device page, \\\"Info\\\" and \\\"Settings\\\" tabs are
        not shown for users who only have \\\"Can manage content\\\" permissions\\r\\n\\r\\n###
        `0.14.5-alpha0`\\r\\n\\r\\n* (Fixed) #7701 Subquery for determining time of
        last sync could crash Kolibri for devices using PostgreSQL\\r\\n\\r\\n###
        `0.14.4-rc2`\\r\\n\\r\\n* (Fixed) On \\\"Select Network Address\\\" modal,
        the \\\"Continue\\\" button is not enabled unless an online server is selected.\\r\\n\\r\\n###
        `0.14.4-rc1`\\r\\n\\r\\n* (Fixed) #6560 Custom ordering of channels would
        be undone when importing new content on postgesql-backed servers (@paulbusse)\\r\\n*
        (Fixed) Regression where selecting very large topics for import or export
        would cause a SQL error\\r\\n* (Fixed) Regression where deleting channels
        would cause database locks\\r\\n* (Fixed) #6916 Copies of Lessons would not
        reflect recent changes to the lesson (@paulbusse)\\r\\n* (Changed) #7363 Workflow
        for importing users via CSV file is blocked if the CSV introduces no new changes\\r\\n*
        (Changed) Github Actions now only conditionally depending on the files changed
        in a push or pull request\\r\\n* (Added) #7262 Labels for facilities are decorated
        with \\\"facility\\\" icon\\r\\n\\r\\n \\r\\n### `0.14.4-weekly7`\\r\\n\\r\\n*
        (Added) #7629 Error handling when reading virtual filesystems that are not
        usable in Kolibri (@dylanmccall)\\r\\n* (Changed) Repository checks now use
        GitHub actions, instead of Travis CI\\r\\n* (Changed) #7580 Checkbox and radio
        button controls in Quiz/Lesson Assignment UI\\r\\n* (Fixed) #7608 Quizzes
        assigned to individual learners, then copied to another class, would break
        coach tools for the latter class\\r\\n* (Fixed) #7399 Various visual inconsistencies
        in Coach Tools\\r\\n* (Fixed) #7415 Facilities would not be recognized as
        synced, when syncing between sqlite- and Postgres-backed servers\\r\\n* (Fixed)
        #7595 Unable to import facilities in setup wizard on IE11\\r\\n* (Fixed) #7651
        Missing keyboard focus outline on cards in Learn Page (@alexMet)\\r\\n\\r\\n###
        `0.14.4-weekly6`\\r\\n* (Fixed) Formatting of ContentNode MD descriptions
        when they have line breaks\\r\\n* (Fixed) #7611 Class coaches (aka 'classroom
        assignable coaches') were redirected to `/learn/` of `/coach` after logging
        in (@alexMet)\\r\\n* (Fixed) #7627 \U0001F50D icon in EPUB renderer would
        be shown twice when viewing search results\\r\\n* (Changed) #7347 Coach and
        Learner enrollment forms are disabled during pending API calls (@alexMet)\\r\\n*
        (Changed) `drf-yasg` dev dependency is pegged to a specific version (lack
        of pinning caused issues depending on version of Python used)\\r\\n* (Changed)
        Redis has default TTL of 30 seconds for keys\\r\\n\\r\\n### `0.14.4-weekly5`\\r\\n*
        (Changed) Files are downloaded concurrently when importing content from an
        external source\\r\\n* (Changed) #7549 Vuex module plugins must use factory
        functions to define `state` to avoid numerous warning messages in test suite.\\r\\n*
        (Fixed) #7584 Users would be unable to exit or add/remove resources from within
        a lesson resource preview\\r\\n* (Fixed) #7562 Users would see notification
        when pressing cancel on the profile edit page if they had previously updated
        their profile\\r\\n* (Fixed) #7586 Thumbnails would not appear on resource
        cards when searching for lesson resources\\r\\n* (Fixed) All-whitespace strings
        were being accepted as Device or Facility names in the Setup Wizard (@alexMet)\\r\\n*
        (Fixed) #7564 Facility names were being converted to all lower-case when using
        `provisiondevice` command in interactive mode\\r\\n\\r\\n### `0.14.4-weekly4`\\r\\n\\r\\n*
        (Changed) #7505 Facilities with the \\\"informal\\\" (personal use) preset
        have the \\\"Learner can sign up\\\" setting turned on by default (@AdamStasiw)\\r\\n*
        (Fixed) #7556, #6593 Misleading \\\"duplicate name\\\" error messages in \\\"Create
        class\\\" and \\\"Create lesson\\\" forms (@alexMet)\\r\\n* (Fixed) #7493
        Facilities could not be renamed with different casings (@alexMet)\\r\\n* (Fixed)
        #7439 Prop validation errors in Lesson Search (@alexMet)\\r\\n* (Fixed) #7523
        Importing partial topics did not automatically import the topic-level thumbnails
        (@alexMet)\\r\\n\\r\\n### `0.14.4-weekly3`\\r\\n\\r\\n* (Changed) #7448 Update
        layout of Setup Wizard > Facility Name + Preset page (@alexMet)\\r\\n* (Removed)
        Vuex schema validation in `KolibriApp` class\\r\\n* (Fixed) #7536 Resources
        not correctly being added to lessons and quizzes (@alexMet) \\r\\n* (Fixed)
        #7538 Bug in `isAndroidWebView` boolean expression, leading to possible issue
        on Safari, and missing sections on Facility > Data page\\r\\n\\r\\n### `0.14.4-weekly2`\\r\\n\\r\\n*
        (Changed) #7298 Add horizontal offset to CoreMenu (@alexMet)\\r\\n* (Changed)
        #7134, #6339 Show Facility and Device settings updates in a snackbar widget
        instead of in-page notification (@alexMet)\\r\\n* (Changed) Use `setUpTestData`
        class method instead of `setUp` for most unit tests, reducing run times by
        50% or more for many `TestCase` classes\\r\\n* (Fixed) #7283 Nested facility
        setting not unchecked when parent is unchecked (@mdctleo)\\r\\n\\r\\n### `0.14.4-weekly1`\\r\\n*
        (Added) #7132 Full Device ID shown in advanced section of Device Info Page
        (@Ali-Kazmi)\\r\\n* (Changed) Gherkin stories for import workflow to reflect
        scroll history updates\\r\\n* (Changed) #7491 Padding values for Sign-In page\\r\\n*
        (Changed) #7474 Layout of AUTHORS.md document\\r\\n* (Changed) pre-commit
        `black` hook uses v20 of black.\\r\\n* (Removed) `fmt-black` npm scripts (use
        pre-commit or black CLI for format Python code)\\r\\n* (Fixed) #7400 Incorrect
        completion criteria showing in Coach page\\r\\n* (Fixed) #7516 Issue with
        using `setchannelposition` when channel had no initial position\\r\\n* (Fixed)
        #7515 Incorrect \\\"classes\\\" icon (@alexMet)\\r\\n* (Fixed) #7111 SideNav
        and CoreMenu not closing on ESC keypress (@alexMet)\\r\\n* (Fixed) Focus trap
        code for SideNav using a removed `$ref`\\r\\n\\r\\n</details>\"},{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/29841014\",\"assets_url\":\"https://api.github.com/repos/learningequality/kolibri/releases/29841014/assets\",\"upload_url\":\"https://uploads.github.com/repos/learningequality/kolibri/releases/29841014/assets{?name,label}\",\"html_url\":\"https://github.com/learningequality/kolibri/releases/tag/v0.14.3\",\"id\":29841014,\"author\":{\"login\":\"jonboiser\",\"id\":10248067,\"node_id\":\"MDQ6VXNlcjEwMjQ4MDY3\",\"avatar_url\":\"https://avatars.githubusercontent.com/u/10248067?v=4\",\"gravatar_id\":\"\",\"url\":\"https://api.github.com/users/jonboiser\",\"html_url\":\"https://github.com/jonboiser\",\"followers_url\":\"https://api.github.com/users/jonboiser/followers\",\"following_url\":\"https://api.github.com/users/jonboiser/following{/other_user}\",\"gists_url\":\"https://api.github.com/users/jonboiser/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/jonboiser/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/jonboiser/subscriptions\",\"organizations_url\":\"https://api.github.com/users/jonboiser/orgs\",\"repos_url\":\"https://api.github.com/users/jonboiser/repos\",\"events_url\":\"https://api.github.com/users/jonboiser/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/jonboiser/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"node_id\":\"MDc6UmVsZWFzZTI5ODQxMDE0\",\"tag_name\":\"v0.14.3\",\"target_commitish\":\"release-v0.14.x\",\"name\":\"v0.14.3\",\"draft\":false,\"immutable\":false,\"prerelease\":false,\"created_at\":\"2020-08-18T23:28:20Z\",\"updated_at\":\"2020-08-19T00:12:05Z\",\"published_at\":\"2020-08-19T00:04:22Z\",\"assets\":[{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/assets/24064662\",\"id\":24064662,\"node_id\":\"MDEyOlJlbGVhc2VBc3NldDI0MDY0NjYy\",\"name\":\"image_Kolibri-l