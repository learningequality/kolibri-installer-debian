        charset=utf-8\",\"state\":\"uploaded\",\"size\":94621990,\"digest\":null,\"download_count\":14,\"created_at\":\"2024-07-04T03:11:08Z\",\"updated_at\":\"2024-07-04T03:11:12Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.17.0-beta0/kolibri_0.17.0b0-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.17.0-beta0\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.17.0-beta0\",\"body\":\"##
        What's Changed\\r\\n\\r\\nThis is an unstable release for the new Enhanced
        Quiz Management feature, the flagship feature of 0.17. The new workflow will
        allow coaches to add sections to quizzes, enabling quizzes/assessments longer
        than 50 questions. Coaches will also be able to replace questions within a
        quiz, a long requested feature. \\r\\n\\r\\n### Feature and bugs PR list\\r\\n<details>\\r\\n\\r\\n*
        Fix single quiz selection flow by @rtibbles in https://github.com/learningequality/kolibri/pull/12274\\r\\n*
        trying to fix integrity errors before migrating tables by @jredrejo in https://github.com/learningequality/kolibri/pull/12279\\r\\n*
        Replace `TextTruncatorCss` with `KTextTruncator` by @jasonmokk in https://github.com/learningequality/kolibri/pull/12215\\r\\n*
        Add notification for downloaded content completion by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/12295\\r\\n*
        Bump ws from 8.16.0 to 8.17.1 by @dependabot in https://github.com/learningequality/kolibri/pull/12313\\r\\n*
        Bump kolibri-design-system from 4.3.0 to 4.3.1 by @dependabot in https://github.com/learningequality/kolibri/pull/12316\\r\\n*
        Bump espree from 10.0.1 to 10.1.0 by @dependabot in https://github.com/learningequality/kolibri/pull/12314\\r\\n*
        Bump launch-editor-middleware from 2.6.1 to 2.7.0 by @dependabot in https://github.com/learningequality/kolibri/pull/12315\\r\\n*
        Update LOD description in FullOrLearnOnlyDeviceForm component by @LianaHarris360
        in https://github.com/learningequality/kolibri/pull/12285\\r\\n* Move jump
        to question string into enhanced quiz management strings. by @rtibbles in
        https://github.com/learningequality/kolibri/pull/12323\\r\\n* Additional strings
        by @marcellamaki in https://github.com/learningequality/kolibri/pull/12336\\r\\n*
        Upgrade perseus to npm published version. by @rtibbles in https://github.com/learningequality/kolibri/pull/9759\\r\\n*
        Allow quiz level learners see fixed order to be edited after a quiz is opened.
        by @rtibbles in https://github.com/learningequality/kolibri/pull/12307\\r\\n*
        First pass string updates following UX writing and ditto review by @marcellamaki
        in https://github.com/learningequality/kolibri/pull/12312\\r\\n* Linting updates
        by @rtibbles in https://github.com/learningequality/kolibri/pull/9698\\r\\n*
        Bump webpack from 5.92.0 to 5.92.1 by @dependabot in https://github.com/learningequality/kolibri/pull/12339\\r\\n*
        Bump kolibri-constants from 0.2.5 to 0.2.6 by @dependabot in https://github.com/learningequality/kolibri/pull/12344\\r\\n*
        Bump typescript from 5.4.5 to 5.5.2 by @dependabot in https://github.com/learningequality/kolibri/pull/12343\\r\\n*
        Bump launch-editor-middleware from 2.7.0 to 2.8.0 by @dependabot in https://github.com/learningequality/kolibri/pull/12342\\r\\n*
        Bump @phosphor-icons/core from 2.0.8 to 2.1.1 by @dependabot in https://github.com/learningequality/kolibri/pull/12340\\r\\n*
        Correct strings that were manually edited on Crowdin by @radinamatic in https://github.com/learningequality/kolibri/pull/12347\\r\\n*
        Remove browser search cancel button by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/12329\\r\\n*
        Added neeeded values for BaseValuesViewset by @jredrejo in https://github.com/learningequality/kolibri/pull/12346\\r\\n*
        Fix pdf css import by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/12348\\r\\n*
        Fix hitherto unnoticed regression in channel upgrade by @rtibbles in https://github.com/learningequality/kolibri/pull/12251\\r\\n*
        EQM Lesson regression fixes by @nucleogenesis in https://github.com/learningequality/kolibri/pull/12354\\r\\n*
        Bump postcss-html from 1.5.0 to 1.7.0 by @dependabot in https://github.com/learningequality/kolibri/pull/12365\\r\\n*
        Bump @rushstack/eslint-patch from 1.10.2 to 1.10.3 by @dependabot in https://github.com/learningequality/kolibri/pull/12367\\r\\n*
        EQM: Side panel back / close icon UX improvements by @nucleogenesis in https://github.com/learningequality/kolibri/pull/12311\\r\\n*
        Link to new quiz creation properly. by @rtibbles in https://github.com/learningequality/kolibri/pull/12352\\r\\n*
        Display question titles with displayQuestionTitle by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/12369\\r\\n*
        EQM: Bookmarks not linking anywhere in resource selection by @nucleogenesis
        in https://github.com/learningequality/kolibri/pull/12360\\r\\n* Prevents
        errors on section deletion by @rtibbles in https://github.com/learningequality/kolibri/pull/12363\\r\\n*
        EQM: Difficult questions reports fix by @nucleogenesis in https://github.com/learningequality/kolibri/pull/12372\\r\\n*
        Fix mis-match condition in replacement question array by @marcellamaki in
        https://github.com/learningequality/kolibri/pull/12353\\r\\n* Wrap section
