        What's Changed \\r\\n\\r\\n### High level summary\\r\\n\\r\\nThe goal of the
        \\\"v0.15.3: Content and A11y Patch Release\\\" was to make improvements to
        the accessibility of Kolibri and to content display. Fixes include improvements
        to the focus outline that appears for keyboard navigation and fixes to notifications
        used in screen readers, as well as small improvements to content layout. \\r\\n\\r\\n###
        Additions and Fixes: Accessibility\\r\\n* Update firefox bookmarks cards focus
        outline by @marcellamaki in https://github.com/learningequality/kolibri/pull/9409\\r\\n*
        Update side panel focus trapping by @marcellamaki in https://github.com/learningequality/kolibri/pull/9408\\r\\n*
        Adds aria labels to immersive toolbar buttons for back and close by @marcellamaki
        in https://github.com/learningequality/kolibri/pull/9411\\r\\n* Adds aria-live=polite
        to the global snackbar component by @marcellamaki in https://github.com/learningequality/kolibri/pull/9410\\r\\n\\r\\n###
        Additions and Fixes: Accessibility - From KDS Version Bump\\r\\nThese were
        changes made to KDS that are now available within this release\\r\\n* Focus
        outline improvements on video and audio displays on Content page\\r\\n* Keyboard
        navigation and focus outline improvements on dropdown menus and popovers\\r\\n\\r\\n###
        Additions and Fixes: Content Display\\r\\n* Fix pagination issues for facility
        user page by @rtibbles in https://github.com/learningequality/kolibri/pull/9422\\r\\n*
        Push PDF pages rendering below full screen bar by @marcellamaki in https://github.com/learningequality/kolibri/pull/9439\\r\\n*
        Fix X-Axis display for perseus graphs by @rtibbles in https://github.com/learningequality/kolibri/pull/9446\\r\\n*
        Remove shrink ray from TopicsPage content side panel by @nucleogenesis in
        https://github.com/learningequality/kolibri/pull/9449\\r\\n* Improve icon
        size in Cagetgory selection modal by @sharifmaryam in https://github.com/learningequality/kolibri/pull/8938\\r\\n*
        Fix pagination user tables by @marcellamaki in https://github.com/learningequality/kolibri/pull/9450\\r\\n*
        Restrict exclude coach for to assigned coaches only by @rtibbles in https://github.com/learningequality/kolibri/pull/9453\\r\\n*
        Adjust padding for visible focus outline on bottom bar buttons in https://github.com/learningequality/kolibri/pull/9478\\r\\n\\r\\n###
        Changes\\r\\n* Ensure all file handlers use utf-8 encoding. by @rtibbles in
        https://github.com/learningequality/kolibri/pull/9401\\r\\n* Upgrade morango
        to v0.6.13 by @bjester in https://github.com/learningequality/kolibri/pull/9445\\r\\n*
        0.14 into 0.15 by @rtibbles in https://github.com/learningequality/kolibri/pull/9447\\r\\n\\r\\n##
        New Contributors\\r\\n* @sharifmaryam made their first contribution in https://github.com/learningequality/kolibri/pull/8938\\r\\n\\r\\n**Full
