:\"https://api.github.com/users/jredrejo/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/jredrejo/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/jredrejo/subscriptions\",\"organizations_url\":\"https://api.github.com/users/jredrejo/orgs\",\"repos_url\":\"https://api.github.com/users/jredrejo/repos\",\"events_url\":\"https://api.github.com/users/jredrejo/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/jredrejo/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"content_type\":\"application/vnd.debian.binary-package\",\"state\":\"uploaded\",\"size\":32182810,\"digest\":null,\"download_count\":12,\"created_at\":\"2021-01-23T12:53:22Z\",\"updated_at\":\"2021-01-23T12:53:30Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.14.6/kolibri_0.14.6-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.14.6\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.14.6\",\"body\":\"##
        Changelog\\r\\n\\r\\n### Fixed\\r\\n\\r\\n* #7725 On Firefox, text in Khmer,
        Hindi, Marathi, and other languages did not render properly.\\r\\n* #7722,
        #7488 After viewing a restricted page, then signing in, users were not redirected
        back to the restricted page.\\r\\n* #7597, #7612 Quiz creation workflow did
        not properly validate the number of questions\\r\\n\\r\\n([0.14.6 Github milestone](https://github.com/learningequality/kolibri/issues?q=label%3Achangelog+milestone%3A0.14.6))\\r\\n\\r\\n##
        Detailed pre-release changelogs\\r\\n\\r\\n<details>\\r\\n\\r\\n### `v0.14.6-rc1`\\r\\n*
        (Fixed) #7719 In-progress (clock) icon would be shown to unauthenticated users
        viewing content as a guest (@alvinhsu-gal220)\\r\\n* (Changed) Updated links
        and other edits in `getting_started.rst` developer documentation.\\r\\n\\r\\n###
        `v0.14.6-alpha5`\\r\\n\\r\\n* (Added) Cascade merge commits from the 0.12
        release branches for build system purposes (fixes #7725 re: issues rendering
        non-latin fonts in Firefox)\\r\\n* (Fixed) #7722 Users are redirected to original
        Learn page URL after signing-in (and the device does not allow unauthenticated
        access to Learn page).\\r\\n* (Fixed) #7597, #7612 UI bugs when trying to
        create quizzes with invalid numbers of questions\\r\\n* (Fixed) #7397 When
        exiting out of a Channel Upgrade scenario, you always end up back at the Manage
        Content Page\\r\\n\\r\\n### `v0.14.6-alpha4`\\r\\n\\r\\n* (Changed) #6717
        Refactored `CoreTable` by replacing the `thead` slot with a `headers` which
        takes multiple `th` elements as its children. Also changed internal implementation
        to support new slot syntax.\\r\\n* (Changed) #7704 Added a `clearable` property
        to the Tasks API payload and removed the `taskIsClearable` utility from the
        front-end code\\r\\n\\r\\n### `v0.14.6-alpha3`\\r\\n\\r\\n* (Changed) Upgraded
        `eslint-plugin-vue`. Enabled `vue/no-deprecated-slot-scope-attribute` rule.
        Pre-emptively fixed multiple `vue/no-deprecated-slot-attribute` violations.
        Fixed various linting errors.\\r\\n* (Changed) All `v-slot` directives were
        shortened to `#`\\r\\n* (Fixed) #6650 `deviceinfo` endpoint returns sensitive
        device-identifying information only to superusers.\\r\\n\\r\\n### `v0.14.6-alpha2`\\r\\n\\r\\n*
        (Changed) Skip session middleware for cached endpoints that are user independent\\r\\n*
        (Changed) Remove caching for resume and next steps endpoints\\r\\n\\r\\n###
        `v0.14.6-alpha1`\\r\\n\\r\\n* (Changed) Updates to Gherkin stories and dev
        docs\\r\\n* (Changed) Pinned `ubuntu-18.04` in `tox.yml`\\r\\n* (Removed)
        `sphinx-autobuild` dep in `requirements/dev.txt`\\r\\n* (Fixed) #7488 `?redirect`
        URL was ignored in sign-in flow. Also fixes other issue with sign-in flow
        not redirecting to URLs for single sign-on providers.\\r\\n</details>\"},{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/34664776\",\"assets_url\":\"https://api.github.com/repos/learningequality/kolibri/releases/34664776/assets\",\"upload_url\":\"https://uploads.github.com/repos/learningequality/kolibri/releases/34664776/assets{?name,label}\",\"html_url\":\"https://github.com/learningequality/kolibri/releases/tag/v0.14.5\",\"id\":34664776,\"author\":{\"login\":\"jonboiser\",\"id\":10248067,\"node_id\":\"MDQ6VXNlcjEwMjQ4MDY3\",\"avatar_url\":\"https://avatars.githubusercontent.com/u/10248067?v=4\",\"gravatar_id\":\"\",\"url\":\"https://api.github.com/users/jonboiser\",\"html_url\":\"https://github.com/jonboiser\",\"followers_url\":\"https://api.github.com/users/jonboiser/followers\",\"following_url\":\"https://api.github.com/users/jonboiser/following{/other_user}\",\"gists_url\":\"https://api.github.com/users/jonboiser/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/jonboiser/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/jonboiser/subscriptions\",\"organizations_url\":\"https://api.github.com/users/jonboiser/orgs\",\"repos_url\":\"https://api.github.com/users/jonboiser/repos\",\"events_url\":\"https://api.github.com/users/jonboiser/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/jonboiser/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"node_id\":\"MDc6UmVsZWFzZTM0NjY0Nzc2\",\"tag_name\":\"v0.14.5\",\"target_commitish\":\"release-v0.14.x\",\"name\":\"v0.14.5\",\"draft\":false,\"immutable\":false,\"prerelease\":false,\"created_at\":\"2020-12-02T01:25:22Z\",\"updated_at\":\"2020-12-03T17:53:48Z\",\"published_at\":\"2020-12-02T01:33:28Z\",\"assets\":[{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/assets/29013117\",\"id\":29013117,\"node_id\":\"MDEyOlJlbGVhc2VBc3NldDI5MDEzMTE3\",\"name\":\"image_K