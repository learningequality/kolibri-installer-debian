        What's Changed\\r\\n* Pytest upgrade 3.7.1 -> 6.2.5 by @thesujai in https://github.com/learningequality/kolibri/pull/11759\\r\\n*
        Handle edge cases for resource selection in quizzes by @rtibbles in https://github.com/learningequality/kolibri/pull/12444\\r\\n*
        Update release flow for BCK prerelease and final release by @rtibbles in https://github.com/learningequality/kolibri/pull/12453\\r\\n*
        Fix exam report question selection display by @rtibbles in https://github.com/learningequality/kolibri/pull/12467\\r\\n*
        Fix RTL Styles by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/12470\\r\\n*
        Fix KSelect overflow in exam page by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/12484\\r\\n*
        stop infinite reloads by @jredrejo in https://github.com/learningequality/kolibri/pull/12488\\r\\n*
        Bug fixes discovered while investigating issues in change facility workflow
        by @rtibbles in https://github.com/learningequality/kolibri/pull/12491\\r\\n*
        Cherry-pick #12485 by @rtibbles in https://github.com/learningequality/kolibri/pull/12492\\r\\n*
        Fix language switcher errors by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/12448\\r\\n*
        Fix pex filenames by @rtibbles in https://github.com/learningequality/kolibri/pull/12451\\r\\n*
        Update android installer action to latest released version. by @rtibbles in
        https://github.com/learningequality/kolibri/pull/12495\\r\\n* Limit max questions
        per section to 25. by @rtibbles in https://github.com/learningequality/kolibri/pull/12487\\r\\n*
        Restore preseeded database behaviour by @rtibbles in https://github.com/learningequality/kolibri/pull/12494\\r\\n*
        Nav alignment by @marcellamaki in https://github.com/learningequality/kolibri/pull/12496\\r\\n*
        Python 3.12 support by @rtibbles in https://github.com/learningequality/kolibri/pull/12468\\r\\n*
        set_as_super_user is a function param by @jredrejo in https://github.com/learningequality/kolibri/pull/12493\\r\\n*
        Allow management of learner sync on remote content enabled devices. by @rtibbles
        in https://github.com/learningequality/kolibri/pull/12498\\r\\n* Adjust CSS
        for button layout in EQM by @marcellamaki in https://github.com/learningequality/kolibri/pull/12465\\r\\n*
        Translation import from crowdin 29-july-2024 by @marcellamaki in https://github.com/learningequality/kolibri/pull/12497\\r\\n*
        Add more error handling for facility user merging and facility deletion by
        @rtibbles in https://github.com/learningequality/kolibri/pull/12500\\r\\n\\r\\n\\r\\n**Full
