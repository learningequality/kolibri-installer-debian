        Release notes generated using configuration in .github/release.yml at release-v0.18.x
        -->\\r\\n\\r\\n## What's Changed\\r\\n### High level overview\\r\\n\\r\\nThis
        release includes two important performance improvements. It fixes a long standing
        performance issue in our Windows app and it also improves the content import
        speed when downloading content from the Kolibri Library onto the device.\\r\\n\\r\\nThe
        release also makes some small but meaningful updates to the Learner experience,
        including fixing a community-reported bug that prevented listing of all resources
        in the resource side panel for large folders and updating the titles on content
        cards, displaying more words on longer titles.\\r\\n\\r\\nIt contains a variety
        of other bug fixes and small improvements.\\r\\n\\r\\n\\r\\n### Added\\r\\nFor
        forthcoming Windows Installer project support and windows performance fixes\\r\\n*
        Upgrade windows installer action usage to latest version. by @rtibbles in
        https://github.com/learningequality/kolibri/pull/13672\\r\\n* Vendor magicbus
        wait method to fix non-blocking select calls in Windows. by @rtibbles in https://github.com/learningequality/kolibri/pull/13673\\r\\n\\r\\n###
        Changed\\r\\n* Update to latest kolibri-installer-android release. by @rtibbles
        in https://github.com/learningequality/kolibri/pull/13740\\r\\n\\r\\n### Fixed\\r\\n*
        Improve download speeds on Kolibri in [\\\"Streamline download skip chunked
        files\\\"](https://github.com/learningequality/kolibri/pull/13698)  by @rtibbles\\r\\n*
        Fixes stale state in USB content import page [\\\"Reloads channel list after
        import\\\"](https://github.com/learningequality/kolibri/pull/13654) by @akolson\\r\\n*
        Fixes errors with user import via the setup wizard in [\\\"use token generator
        to authenticate just provisioned facility superadmin\\\"](https://github.com/learningequality/kolibri/pull/13732)
        by @AlexVelezLl\\r\\n* [Update Learn > Library Sidepanel show all folder resources](https://github.com/learningequality/kolibri/pull/13717)
        by @LianaHarris360\\r\\n* [Update title truncation on cards to 3 lines](https://github.com/learningequality/kolibri/pull/13615)
        by @AllanOXDi\\r\\n* Fix `KSelect` in quiz reports to reactively update the
        time passed in [\\\"Prevent time desynchronization in survey report dropdowns\\\"](https://github.com/learningequality/kolibri/pull/13719)
        by @ozer550\\r\\n* [Fixes issue where unavailable nodes are not flagged for
        import](https://github.com/learningequality/kolibri/pull/13712) (and adds
        regression test) by @rtibbles\\r\\n* Bug fixes for QTI beta feature in [\\\"fix
        long text input in free response questions\\\"](https://github.com/learningequality/kolibri/pull/13738)
        by @ozer550 and [\\\"render MathML in QTI questions generated by Studio\\\"](https://github.com/learningequality/kolibri/pull/13668)
        by @rtibbles\\r\\n* Make instance_ids from sync sessions unique before passing
        to class constructor by @rtibbles in https://github.com/learningequality/kolibri/pull/13638\\r\\n\\r\\n**Full
        Changelog**: https://github.com/learningequality/kolibri/compare/v0.18.2...v0.18.3\",\"mentions_count\":6},{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/243539582\",\"assets_url\":\"https://api.github.com/repos/learningequality/kolibri/releases/243539582/assets\",\"upload_url\":\"https://uploads.github.com/repos/learningequality/kolibri/releases/243539582/assets{?name,label}\",\"html_url\":\"https://github.com/learningequality/kolibri/releases/tag/v0.19.0-alpha1\",\"id\":243539582,\"author\":{\"login\":\"marcellamaki\",\"id\":17235236,\"node_id\":\"MDQ6VXNlcjE3MjM1MjM2\",\"avatar_url\":\"https://avatars.githubusercontent.com/u/17235236?v=4\",\"gravatar_id\":\"\",\"url\":\"https://api.github.com/users/marcellamaki\",\"html_url\":\"https://github.com/marcellamaki\",\"followers_url\":\"https://api.github.com/users/marcellamaki/followers\",\"following_url\":\"https://api.github.com/users/marcellamaki/following{/other_user}\",\"gists_url\":\"https://api.github.com/users/marcellamaki/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/marcellamaki/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/marcellamaki/subscriptions\",\"organizations_url\":\"https://api.github.com/users/marcellamaki/orgs\",\"repos_url\":\"https://api.github.com/users/marcellamaki/repos\",\"events_url\":\"https://api.github.com/users/marcellamaki/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/marcellamaki/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"node_id\":\"RE_kwDOAvqWa84OhB5-\",\"tag_name\":\"v0.19.0-alpha1\",\"target_commitish\":\"develop\",\"name\":\"v0.19.0-alpha1\",\"draft\":false,\"immutable\":false,\"prerelease\":true,\"created_at\":\"2025-08-29T16:26:26Z\",\"updated_at\":\"2025-08-29T18:40:14Z\",\"published_at\":\"2025-08-29T17:23:13Z\",\"assets\":[{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/assets/287611313\",\