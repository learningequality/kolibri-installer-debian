        What's Changed \\r\\n\\r\\n### High level summary\\r\\n\\r\\nThis release
        of Kolibri includes security fixes to reduce the vulnerability of online Kolibri
        instances to discovery of user credentials and to sanitize exported CSV files.\\r\\n\\r\\nAdditional
        changes include small improvements to coach workflows in quiz and lesson workflows
        and fixing a regression with user search during class assignment.\\r\\n\\r\\n###
        Added \\r\\n* Restrict exclude coach for to assigned coaches only in https://github.com/learningequality/kolibri/pull/9453\\r\\n*
        Content dir argument in https://github.com/learningequality/kolibri/pull/9463\\r\\n\\r\\n###
        Changed \\r\\n* Enable \\\"continue\\\" in quiz creation only once exercises
        selected in https://github.com/learningequality/kolibri/pull/9515\\r\\n* Update
        bottom bar text in lesson resources to say save on changes in https://github.com/learningequality/kolibri/pull/9516\\r\\n\\r\\n###
        Fixed\\r\\n* add .trim to v-model for username in https://github.com/learningequality/kolibri/pull/9514\\r\\n*
        API and CSV fixes in https://github.com/learningequality/kolibri/pull/9523\\r\\n*
        Fix missing search results in coach quiz creation in https://github.com/learningequality/kolibri/pull/9522\\r\\n*
        Fix regression: search functionality for assigning coaches and enrolling learners
        in https://github.com/learningequality/kolibri/pull/9525\\r\\n\\r\\n\\r\\n**Full
