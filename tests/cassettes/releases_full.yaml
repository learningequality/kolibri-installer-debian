        charset=utf-8\",\"state\":\"uploaded\",\"size\":81692650,\"digest\":null,\"download_count\":30,\"created_at\":\"2024-05-28T18:43:12Z\",\"updated_at\":\"2024-05-28T18:43:13Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.16.2/kolibri_0.16.2-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.16.2\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.16.2\",\"body\":\"##
        What's Changed\\r\\n\\r\\n### Important updates\\r\\n\\r\\nKolibri 0.16.2
        is our first product to be released with new colors, logos, and styles to
        make learning in Kolibri a more fun, vibrant, and engaging experience. This
        rebrand will be rolled out across our product ecosystem, website, social media,
        and more, and it will be more widely announced in the coming months. We hope
        you enjoy the new Kolibri!\\r\\n\\r\\nWe received reports of errors when upgrading
        some devices that had previously used learner-only device syncing in 0.15.
        This version will fix these upgrade issues. If you have additional questions
        or need support, please reach out for support on [the community forum](https://community.learningequality.org/).\\r\\n\\r\\n---\\r\\n\\r\\n###
        Fixed\\r\\n* Fix issue with duplicate lesson from join. by @rtibbles in https://github.com/learningequality/kolibri/pull/12068\\r\\n*
        Do a correct check to know if the facility has been imported by @jredrejo
        in https://github.com/learningequality/kolibri/pull/12077\\r\\n* Exam report:
        Avoid loading on question change by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/12082\\r\\n*
        Fix facility sync elapsed time by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/12158\\r\\n*
        Learner devices status update by @rtibbles in https://github.com/learningequality/kolibri/pull/12153\\r\\n*
        Don't let users that are used for os user have their passwords set via the
        not specified password flow. by @rtibbles in https://github.com/learningequality/kolibri/pull/12115\\r\\n*
        Coach loading state reports by @marcellamaki in https://github.com/learningequality/kolibri/pull/12178\\r\\n*
        Fix language preferentiality for duplicate resources by @rtibbles in https://github.com/learningequality/kolibri/pull/12152\\r\\n*
        Align metadata dropdown order to the figma spec by @marcellamaki in https://github.com/learningequality/kolibri/pull/12161\\r\\n*
        Don't deprovision within running Kolibri to create preseeded DBs by @bjester
        in https://github.com/learningequality/kolibri/pull/12184\\r\\n* Truncate
        the syncqueue table before we add the unique constraint. by @rtibbles in https://github.com/learningequality/kolibri/pull/12197\\r\\n*
        Handle case when username doesn't exist on remote and try to create it. by
        @rtibbles in https://github.com/learningequality/kolibri/pull/12193\\r\\n\\r\\n###
        Added \\r\\n* Add --manifest-only option to exportcontent command by @thesujai
        in https://github.com/learningequality/kolibri/pull/12059\\r\\n* Add function
        to unregister a previously registered hook. by @rtibbles in https://github.com/learningequality/kolibri/pull/12100\\r\\n*
        Add form to add address after device import by @jredrejo in https://github.com/learningequality/kolibri/pull/12136\\r\\n*
        Add duplicate log consolidation to sync hooks. by @rtibbles in https://github.com/learningequality/kolibri/pull/12131\\r\\n\\r\\n###
        Changed\\r\\n* Resolve webpack loaders and dependencies relative to kolibri-tools
        by @bjester in https://github.com/learningequality/kolibri/pull/12052\\r\\n*
        bump version number by @marcellamaki in https://github.com/learningequality/kolibri/pull/12125\\r\\n\\r\\n###
        Branding support PRs\\r\\n* Update font tooling to support semi-bold font
        weight by @rtibbles in https://github.com/learningequality/kolibri/pull/11976\\r\\n*
        Audit and fix theme token updates against KDS by @MisRob in https://github.com/learningequality/kolibri/pull/11911\\r\\n*
        Update logos and installer branding by @rtibbles in https://github.com/learningequality/kolibri/pull/12124\\r\\n*
        Always show the background for the Kolibri logo. by @rtibbles in https://github.com/learningequality/kolibri/pull/12129\\r\\n*
        Update now value in SyncStatusDisplay by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/12110\\r\\n*
        Update facility settings link display for Learn Only Device users by @LianaHarris360
        in https://github.com/learningequality/kolibri/pull/12123\\r\\n* Fix some
        missed updates in theming by @rtibbles in https://github.com/learningequality/kolibri/pull/12154\\r\\n*
        upgrade KDS version to latest by @marcellamaki in https://github.com/learningequality/kolibri/pull/12167\\r\\n*
        Update background by @rtibbles in https://github.com/learningequality/kolibri/pull/12208\\r\\n*
        Add transform to ensure proper layering in Safari. by @rtibbles in https://github.com/learningequality/kolibri/pull/12213\\r\\n\\r\\n###
        Build process and release support\\r\\n* Next attempt at fixing GCS upload
        by @rtibbles in https://github.com/learningequality/kolibri/pull/12069\\r\\n*
        Updates mac build to latest. by @rtibbles in https://github.com/learningequality/kolibri/pull/12128\\r\\n*
        Update android build version. by @rtibbles in https://github.com/learningequality/kolibri/pull/12177\\r\\n*
        Zip the whl file before uploading for BCK step. by @rtibbles in https://github.com/learningequality/kolibri/pull/12201\\r\\n\\r\\n\\r\\n**Full
