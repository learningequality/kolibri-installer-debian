        What's Changed\\r\\n\\r\\n### Internationalization and localization\\r\\nNew
        language support for: Hausa, Georgian, Indonesian, Mozambican Portuguese,
        and Greek\\r\\n\\r\\n### Overview of major new features\\r\\nThis release
        includes a new Learn experience featuring:\\r\\n  - An updated Home page with
        new layout and interactions\\r\\n  - A new library page featuring a better
        content browsing, filtering, and search experience\\r\\n  - An update page
        for browsing individual channels, with new layout and browse/search interactions\\r\\n
        \ - A new bookmarks page and ability to bookmark content within the content
        renderer\\r\\n  - Sync capabilities for Subset of Users Devices (SoUDs)\\r\\n\\r\\nSelected
        high-level technical updates:\\r\\n  - Adding API for SoUD devices, allowing
        them to request syncing\\r\\n  - Updates to Zeroconf to support SoUD syncing\\r\\n
        \ - Updates to progress tracking\\r\\n  - Consolidation of exam logging\\r\\n
        \ - Fix dataset mismatch between exams and lessons, to allow for syncing\\r\\n
        \ - Adding content metadata search, API, and fields\\r\\n\\r\\n### Details:
        Complete list of PRs and link to full changelog\\r\\n<details>\\r\\n  <summary>Complete
        list of PRs</summary>\\r\\n\\r\\n* Release v0.14.x -> Develop by @indirectlylit
        in https://github.com/learningequality/kolibri/pull/7057\\r\\n* Removed OIDC
        provider plugin by @jredrejo in https://github.com/learningequality/kolibri/pull/7083\\r\\n*
        Contact name change on the Code of Conduct page by @radinamatic in https://github.com/learningequality/kolibri/pull/7177\\r\\n*
        into -> in to by @indirectlylit in https://github.com/learningequality/kolibri/pull/7170\\r\\n*
        Develop <- v0.14.x by @DXCanas in https://github.com/learningequality/kolibri/pull/7184\\r\\n*
        make staticdeps run on systems where python is 3, and 2.7 is availabl\u2026
        by @cyberorg in https://github.com/learningequality/kolibri/pull/7193\\r\\n*
        remove unused strings in develop by @indirectlylit in https://github.com/learningequality/kolibri/pull/7116\\r\\n*
        Merging release-v0.14.x to develop by @DXCanas in https://github.com/learningequality/kolibri/pull/7351\\r\\n*
        0.14 -> develop by @indirectlylit in https://github.com/learningequality/kolibri/pull/7418\\r\\n*
