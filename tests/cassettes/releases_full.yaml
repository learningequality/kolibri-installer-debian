        What's Changed\\r\\n\\r\\n### Added \\r\\n* Adds job storage sanity check
        to ensure that Kolibri will not fail to start if the asynchronous job storage
        is malformed by @rtibbles in https://github.com/learningequality/kolibri/pull/9722\\r\\n\\r\\n###
        Changed\\r\\n* Logging: remove unused simple formatter, add asctime to color
        formatter by @nucleogenesis in https://github.com/learningequality/kolibri/pull/9659\\r\\n*
        Order resume content display by last interaction by @AllanOXDi in https://github.com/learningequality/kolibri/pull/9666\\r\\n*
        Upgrade morango and lower default sync chunk size through CLI by @bjester
        in https://github.com/learningequality/kolibri/pull/9714\\r\\n*  Make learners
        only appear once in reports when assigned from both groups and individually
        to lessons and quizzes. by @rtibbles in https://github.com/learningequality/kolibri/pull/9728\\r\\n*
        Persist collection tokens when switching between individual and bulk import
        workflows for channels by @rtibbles in https://github.com/learningequality/kolibri/pull/9729\\r\\n\\r\\n###
        Fixed\\r\\n* CSV Endpoint permissions and error handling by @rtibbles in https://github.com/learningequality/kolibri/pull/9657\\r\\n*
        Adds fix for multiple worker processes duplicating jobs.by @rtibbles in https://github.com/learningequality/kolibri/pull/9684\\r\\n*
        Adds translated string for user kind in the user table by @akolson in https://github.com/learningequality/kolibri/pull/9664\\r\\n*
        Check for an array's length to avoid breaking errors by @nucleogenesis in
        https://github.com/learningequality/kolibri/pull/9682\\r\\n* Fixes Version
        logic not handling non-tripartite version strings by @AllanOXDi in https://github.com/learningequality/kolibri/pull/9695\\r\\n*
        Filters out empty nodes, add safety to breaking code by @akolson in https://github.com/learningequality/kolibri/pull/9700\\r\\n*
        Prevent controls for the PDF renderer from overlapping content by @LianaHarris360
        in https://github.com/learningequality/kolibri/pull/9699\\r\\n* Fix quiz completion
        regression which caused the notification to contain the incorrect score by
        @rtibbles in https://github.com/learningequality/kolibri/pull/9721\\r\\n*
        height = width in import cards on thumbnail, fix misaligned text by @nucleogenesis
        in https://github.com/learningequality/kolibri/pull/9658\\r\\n* Update levels
        to display translated strings, not constant ids by @marcellamaki in https://github.com/learningequality/kolibri/pull/9736\\r\\n\\r\\n##
        New Contributors \U0001F389 \\r\\n* @akolson made their first contribution
        in https://github.com/learningequality/kolibri/pull/9664\\r\\n* @AllanOXDi
        made their first contribution in https://github.com/learningequality/kolibri/pull/9666\\r\\n*
        @LianaHarris360 made their first contribution in https://github.com/learningequality/kolibri/pull/9699\\r\\n\\r\\n**Full
