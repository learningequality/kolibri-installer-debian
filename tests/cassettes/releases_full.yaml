        charset=utf-8\",\"state\":\"uploaded\",\"size\":67415276,\"digest\":null,\"download_count\":8,\"created_at\":\"2023-11-01T14:36:17Z\",\"updated_at\":\"2023-11-01T14:36:20Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.16.0-beta7/kolibri_0.16.0b7-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.16.0-beta7\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.16.0-beta7\",\"body\":\"##
        What's Changed\\r\\n* Improve loading UX on some places in Coach by @MisRob
        in https://github.com/learningequality/kolibri/pull/11201\\r\\n* Corrected
        output for filtered Quizzes and Lessons by @radinamatic in https://github.com/learningequality/kolibri/pull/11313\\r\\n*
        Disabling additional user import until multiple user syncing is working by
        @AllanOXDi in https://github.com/learningequality/kolibri/pull/11242\\r\\n*
        Fixes performance regression by @rtibbles in https://github.com/learningequality/kolibri/pull/11317\\r\\n*
        Some minor linting fixes that became apparent after linting updates by @rtibbles
        in https://github.com/learningequality/kolibri/pull/11339\\r\\n* Bugfix- birth
        year selction on profile edit page by @haldaranup in https://github.com/learningequality/kolibri/pull/11337\\r\\n*
        Navigation issue in Channels by @ShivangRawat30 in https://github.com/learningequality/kolibri/pull/11272\\r\\n*
        updated KDS reference & testing after changes to useKResponsiveWindow by @thanksameeelian
        in https://github.com/learningequality/kolibri/pull/11315\\r\\n* Pass dummy
        auth token to testing script. by @rtibbles in https://github.com/learningequality/kolibri/pull/11347\\r\\n*
        Migrates the OSUser associated with a facility user when migrating users.
        by @rtibbles in https://github.com/learningequality/kolibri/pull/11348\\r\\n*
        Fix lesson visibility toggling for single user syncing by @rtibbles in https://github.com/learningequality/kolibri/pull/11359\\r\\n*
        kolibri-tools: Accept multiple --namespace/--searchPath arguments by @pwithnall
        in https://github.com/learningequality/kolibri/pull/11357\\r\\n* Deleted the
        responsiveWindowMixin from kolibri/library/user_auth by @ShivangRawat30 in
        https://github.com/learningequality/kolibri/pull/11354\\r\\n* Replaced KResponsiveWindow
        mixin by useKResponsiveWindow composable - \u2026 by @FireSuperior482 in https://github.com/learningequality/kolibri/pull/11365\\r\\n*
        Fix order in which notification updates are commited to state by @MisRob in
        https://github.com/learningequality/kolibri/pull/11374\\r\\n* Update package
        versions for latest publish. by @rtibbles in https://github.com/learningequality/kolibri/pull/11370\\r\\n*
        My downloads updates - polling and UI by @marcellamaki in https://github.com/learningequality/kolibri/pull/11177\\r\\n*
        Raise when the channel cannot be found on the remote. by @rtibbles in https://github.com/learningequality/kolibri/pull/11340\\r\\n*
        Tweak logic for highlighting current node to use id rather than content_id
        by @rtibbles in https://github.com/learningequality/kolibri/pull/11384\\r\\n*
        Tweak provisioning interaction with OS User capability by @rtibbles in https://github.com/learningequality/kolibri/pull/11352\\r\\n*
        Clean up renderer height styling behaviour by @rtibbles in https://github.com/learningequality/kolibri/pull/11383\\r\\n*
        Change the way we check for Android to use Python internals. by @rtibbles
        in https://github.com/learningequality/kolibri/pull/11072\\r\\n* Update download
        request fetching on topic and topic content pages by @rtibbles in https://github.com/learningequality/kolibri/pull/11391\\r\\n*
        Add z-index to fix display of HybridLearningFooter dropdown menu by @LianaHarris360
        in https://github.com/learningequality/kolibri/pull/11399\\r\\n* Add LRU eviction
        mechanisms for streamed file chunks by @rtibbles in https://github.com/learningequality/kolibri/pull/11304\\r\\n*
        Add connection status filter in useDevices composable by @marcellamaki in
        https://github.com/learningequality/kolibri/pull/11409\\r\\n* Fix bottom bar
        alignment and menu label which was previously offscreen by @marcellamaki in
        https://github.com/learningequality/kolibri/pull/11411\\r\\n* Run cleanup
        for user initiated imports when saving a removal request by @rtibbles in https://github.com/learningequality/kolibri/pull/11402\\r\\n*
        Use ifaddr directly for querying local IPs. by @rtibbles in https://github.com/learningequality/kolibri/pull/11413\\r\\n*
        Delete user initiated ContentDownloadRequests and mark others as pending when
        the associated contentnode is deleted. by @rtibbles in https://github.com/learningequality/kolibri/pull/11372\\r\\n*
        Updated base.dockerfile for all architectures by @a6ar55 in https://github.com/learningequality/kolibri/pull/11408\\r\\n*
        Fix selection behaviour on the My Downloads page by @rtibbles in https://github.com/learningequality/kolibri/pull/11397\\r\\n*
        Attempt to fix issues seemingly caused by global loading state not being observed.
        by @rtibbles in https://github.com/learningequality/kolibri/pull/11392\\r\\n*
        Reset to page 1 of download pagination when a filter is selected. by @rtibbles
        in https://github.com/learningequality/kolibri/pull/11393\\r\\n* Adds a touch
        events check before showing the bottom navigation on touch devices by @akolson
        in https://github.com/learningequality/kolibri/pull/11386\\r\\n* Update touch
        detection in Perseus by @rtibbles in https://github.com/learningequality/kolibri/pull/11424\\r\\n*
        Update device settings page to better handle server reload and force page
        refresh for settings changes by @rtibbles in https://github.com/learningequality/kolibri/pull/11403\\r\\n*
