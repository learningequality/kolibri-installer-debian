"https://api.github.com/users/jredrejo/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/jredrejo/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/jredrejo/subscriptions\",\"organizations_url\":\"https://api.github.com/users/jredrejo/orgs\",\"repos_url\":\"https://api.github.com/users/jredrejo/repos\",\"events_url\":\"https://api.github.com/users/jredrejo/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/jredrejo/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"content_type\":\"application/vnd.debian.binary-package\",\"state\":\"uploaded\",\"size\":32856974,\"digest\":null,\"download_count\":30,\"created_at\":\"2021-04-21T06:42:18Z\",\"updated_at\":\"2021-04-21T06:42:33Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/v0.14.7/kolibri_0.14.7-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/v0.14.7\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/v0.14.7\",\"body\":\"##
        Changelog\\r\\n\\r\\n### Internationalization and localization\\r\\n\\r\\n-
        Updated localizations\\r\\n\\r\\n### Fixed\\r\\n\\r\\n- #7766 Content imported
        by administrators was not immediately available for learners to use\\r\\n-
        #7869 Unlisted channels would not appear in list in channel import workflow
        after providing token\\r\\n- #7810 Learners' new passwords were not being
        validated on the Sign-In page\\r\\n- #7764 Users' progress on resources was
        not being properly logged, making it difficult to complete them\\r\\n- #8003,
        #8004, #8010 Sign-ins could cause the server to crash if database was locked\\r\\n-
        #8003, #7947 Issues downloading CSV files on Windows\\r\\n\\r\\n### Changed\\r\\n\\r\\n-
        #7735 Filtering on lists of users returns ranked and approximate matches\\r\\n-
        #7733 Resetting a facility's settings respects the preset (e.g. formal, informal,
        nonformal) chosen for it during setup\\r\\n- #7823  Improved performance on
        coach pages for facilities with large numbers of classrooms and groups\\r\\n\\r\\n([0.14.7
        Github milestone](https://github.com/learningequality/kolibri/issues?q=label%3Achangelog+milestone%3A0.14.7))\\r\\n\\r\\n##
        Detailed pre-release changelogs\\r\\n\\r\\n<details>\\r\\n\\r\\n### `v0.14.7-rc8`\\r\\n\\r\\n-
        (Fixed) #8018 Perseus exercises did not render on Safari\\r\\n\\r\\n### `v0.14.7-rc7`\\r\\n\\r\\n-
        (Fixed) #8013 Remove `db_lock` from non-Django DB operations (Follow up for
        #8004)\\r\\n\\r\\n### `v0.14.7-rc6`\\r\\n\\r\\n- (Changed) #8010 Use a transacation-level
        advisory lock when using PostgreSQL (follow up from #8004)\\r\\n\\r\\n###
        `0.14.7-rc5`\\r\\n\\r\\n- (Added) #8004 Context manager to apply correct type
        of database locks depending on whether Sqlite or PostgreSQL is used\\r\\n\\r\\n###
        `v0.14.7-rc4`\\r\\n\\r\\n- (Fixed) #7993 Make dataset_id caching thread local
        and only used in sync to avoid locks during sign-in\\r\\n- (Fixed) #8003 Encoding
        issues for CSV exports\\r\\n\\r\\n### `v0.14.7-rc3`\\r\\n\\r\\n- (Fixed) #7981
        \\\"Added\\\" and \\\"Add\\\" labels were not properly localized in Lesson
        Resource Preview pages\\r\\n- (Changed) #7973 Removed admin credentials from
        demo banner, and cherry picked fix from #7932 \\r\\n- (Changed) #7956 In `.editorconfig`,
        `.feature` files now must be indented with tab characters instead of two spaces\\r\\n\\r\\n###
        `v0.14.7-rc2`\\r\\n- (Fixed) #7947 Exporting CSV file that contains Unicode
        text fails on Python 3 on Windows\\r\\n- (Changed) #7949 Dockerfile for Buildkite
        no longer downloads dev dependencies\\r\\n\\r\\n### `v0.14.7-rc1`\\r\\n\\r\\n-
        (Changed) Updated localizations\\r\\n- (Changed) Updated Gherkin stories\\r\\n-
        (Changed) Updated `kolibri-exercise-perseus-plugin` to 1.3.4\\r\\n- (Fixed)
        #7867 App Bar on Learn page was crowded on medium-sized screens (@davidgarg20)\\r\\n-
        (Fixed) #7914, #7915 Long titles on content cards were not readable (@Kalovelo)\\r\\n-
        (Fixed) #7897 Drag-and-drop animations would cause lesson resources container
        to overflow\\r\\n- (Removed) codecov integration from GH Actions\\r\\n- (Fixed)
        #7852 base64 encoding of webfonts would constantly change because of modified
        headers\\r\\n- (Fixed) #7869 Unlisted channels would not appear in list in
        channel import workflow\\r\\n- (Fixed) #7827 Icon layout and color on User
        Permissions Page\\r\\n\\r\\n### `v0.14.7-alpha4`\\r\\n- (Changed) #7822 Revert
        `kolibri-design-system` version changed to `0.2.x`\\r\\n- (Fixed) #7820 Regression
        from #7735, which broke the ability to assign lessons and quizzes to individual
        learners\\r\\n- (Fixed) #6224, #7652 Bugs in `IndividualLearnerSelector.vue`\\r\\n-
        (Changed) #7823 Remove hierarchy relations filtering from facility user permissions
        to reduce performance issues on larger collection hierarchies (> 100 collections)\\r\\n\\r\\n###
        `v0.14.7-alpha3`\\r\\n- (Fixed) #7754 Filters on search results did not work
        if the search keyword text input was cleared\\r\\n- (Fixed) #7810 Learners'
        new passwords were not being validated on the Sign-In page\\r\\n- (Changed)
        #7735 Filtering users by full name or username now uses `fuse.js` to return
        ranked and approximate matches\\r\\n- (Fixed) Release artifacts were not being
        uploaded to GitHub after pre-release builds\\r\\n- (Changed) `kolibri-design-system`
        version changed to `0.2.x`\\r\\n- (Fixed) #7807 Multiple links in the developer
        documentation were outdated or had restricted access\\r\\n\\r\\n### `v0.14.7-alpha2`\\r\\n-
        (Fixed) #7764 Users' progress on resources was not being properly logged,
        making it difficult to complete them.\\r\\n\\r\\n### `v0.14.7-alpha1`\\r\\n-
        (Fixed) #7766 Content imported by administrators was not immediately available
        for learners to use\\r\\n- (Changed) #7733 Resetting a facility's settings
        respects the \\\"preset\\\" (formal, informal, nonformal) chosen for it during
        setup\\r\\n- (Fixed) #7761 Better error handling for `pytz` errors (@dylanmccall)\\r\\n-
        (Fixed) #7777, #7778 Navigation bugs when closing resources and updating user
        profile\\r\\n- (Removed) #7784 codecov integration\\r\\n- (Added) #7789 Python
        3.8 support\\r\\n- (Changed) #7746 Gherkin stories updated and edited\\r\\n\\r\\n</details>\",\"discussion_url\":\"https://github.com/learningequality/kolibri/discussions/8021\"},{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/36786250\",\"assets_url\":\"https://api.github.com/repos/learningequality/kolibri/releases/36786250/assets\",\"upload_url\":\"https://uploads.github.com/repos/learningequality/kolibri/releases/36786250/assets{?name,label}\",\"html_url\":\"https://github.com/learningequality/kolibri/releases/tag/v0.14.6\",\"id\":36786250,\"author\":{\"login\":\"jonboiser\",\"id\":10248067,\"node_id\":\"MDQ6VXNlcjEwMjQ4MDY3\",\"avatar_url\":\"https://avatars.githubusercontent.com/u/10248067?v=4\",\"gravatar_id\":\"\",\"url\":\"https://api.github.com/users/jonboiser\",\"html_url\":\"https://github.com/jonboiser\",\"followers_url\":\"https://api.github.com/users/jonboiser/followers\",\"following_url\":\"https://api.github.com/users/jonboiser/following{/other_user}\",\"gists_url\":\"https://api.github.com/users/jonboiser/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/jonboiser/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/jonboiser/subscriptions\",\"organizations_url\":\"https://api.github.com/users/jonboiser/orgs\",\"repos_url\":\"https://api.github.com/users/jonboiser/repos\",\"events_url\":\"https://api.github.com/users/jonboiser/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/jonboiser/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"node_id\":\"MDc6UmVsZWFzZTM2Nzg2MjUw\",\"tag_name\":\"v0.14.6\",\"target_commitish\":\"release-v0.14.x\",\"name\":\"v0.14.6\",\"draft\":false,\"immutable\":false,\"prerelease\":false,\"created_at\":\"2021-01-22T19:49:21Z\",\"updated_at\":\"2021-01-29T21:40:16Z\",\"published_at\":\"2021-01-22T22:26:03Z\",\"assets\":[{\"url\":\"https://api.github.com/repos/learningequality/kolibri/rele