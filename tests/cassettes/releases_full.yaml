        What's Changed\\r\\n\\r\\n* kolibri cards ui error resolved by @GarvitSinghal47
        in https://github.com/learningequality/kolibri/pull/11097\\r\\n* Do not enable
        continue button if it is not possible to use it by @jredrejo in https://github.com/learningequality/kolibri/pull/11196\\r\\n*
        Add conditional display of device plugin facility tab by @LianaHarris360 in
        https://github.com/learningequality/kolibri/pull/11215\\r\\n* Decrease time-to-sync
        for learn-only devices joining the network by @vkWeb in https://github.com/learningequality/kolibri/pull/11271\\r\\n*
        Properly set admin_imported flag at import and deletion. by @rtibbles in https://github.com/learningequality/kolibri/pull/11254\\r\\n*
        Deal better with stale content API responses by @rtibbles in https://github.com/learningequality/kolibri/pull/11157\\r\\n*
        Syncing fixes for automatic content syncing and regressions by @bjester in
        https://github.com/learningequality/kolibri/pull/11127\\r\\n* Fix global loading
        state on root Coach pages by @MisRob in https://github.com/learningequality/kolibri/pull/11218\\r\\n*
        Add padding to the bottom of the page, to prevent app bar covering links by
        @marcellamaki in https://github.com/learningequality/kolibri/pull/11198\\r\\n*
        Fix tab styles on large and medium-large topics pages by @marcellamaki in
        https://github.com/learningequality/kolibri/pull/11207\\r\\n* kolibri-tools:
        Don\u2019t delete all CSVs in the i18n target directory by @pwithnall in https://github.com/learningequality/kolibri/pull/11226\\r\\n*
        Tweaks to release updated version of kolibri-tools by @rtibbles in https://github.com/learningequality/kolibri/pull/11228\\r\\n*
        utils: Ignore path errors when importing plugins for i18n by @pwithnall in
        https://github.com/learningequality/kolibri/pull/11205\\r\\n* Handle partially
        imported channels in the device plugin by @rtibbles in https://github.com/learningequality/kolibri/pull/11231\\r\\n*
        Better handle simultaneous file downloads. by @rtibbles in https://github.com/learningequality/kolibri/pull/11230\\r\\n*
        Properly conditionalizes the display of the learner sync status in th\u2026
        by @marcellamaki in https://github.com/learningequality/kolibri/pull/11229\\r\\n*
        Do general replacement for str instance checking for string_types. by @rtibbles
        in https://github.com/learningequality/kolibri/pull/11240\\r\\n* update coach
        routing by @thanksameeelian in https://github.com/learningequality/kolibri/pull/11224\\r\\n*
        facility routing naming fix + query param removal by @thanksameeelian in https://github.com/learningequality/kolibri/pull/11247\\r\\n*
        Allow null language_id in provision_from_file by @dylanmccall in https://github.com/learningequality/kolibri/pull/11249\\r\\n*
        Update ReadTheDocs builds configuration by @MisRob in https://github.com/learningequality/kolibri/pull/11179\\r\\n*
        Fix learner sync status reporting on server device by @rtibbles in https://github.com/learningequality/kolibri/pull/11244\\r\\n*
        kolibri-tools: Add support for pyproject.toml by @pwithnall in https://github.com/learningequality/kolibri/pull/11227\\r\\n*
        Only do an update broadcast if relevant info has changed by @rtibbles in https://github.com/learningequality/kolibri/pull/11258\\r\\n*
        Navigation tweaks by @rtibbles in https://github.com/learningequality/kolibri/pull/11256\\r\\n*
        prevented importing of facility from lod by @AllanOXDi in https://github.com/learningequality/kolibri/pull/11278\\r\\n*
        Set insufficient storage DeviceStatus in ContentSyncHook.post_transfer by
        @nucleogenesis in https://github.com/learningequality/kolibri/pull/11255\\r\\n*
        Separate signal attachment between morango core and kolibri sync logic by
        @bjester in https://github.com/learningequality/kolibri/pull/11268\\r\\n*
        Set full name when creating a remote learner account. by @rtibbles in https://github.com/learningequality/kolibri/pull/11257\\r\\n*
        Reaplce TextTruncator with TextTruncatorCss in HybridLearningLessonCard.vue
        by @muditchoudhary in https://github.com/learningequality/kolibri/pull/11263\\r\\n*
        Replace TextTruncator with TextTruncatorCss in TopicsHeader.vue by @muditchoudhary
        in https://github.com/learningequality/kolibri/pull/11264\\r\\n* Issue 8532
        replace text Truncator topics in TopicsMobileHeader.vue by @muditchoudhary
        in https://github.com/learningequality/kolibri/pull/11265\\r\\n* TextTruncator.vue
        is totally removed from the entire codebase by @yash1378 in https://github.com/learningequality/kolibri/pull/11288\\r\\n*
        Disable scroll on main page if side panel is open by @nikkuAg in https://github.com/learningequality/kolibri/pull/11286\\r\\n*
        coach routing - handle lesson creation and deletion by @thanksameeelian in
        https://github.com/learningequality/kolibri/pull/11283\\r\\n* Set default
        value for storage limit slider by @nikkuAg in https://github.com/learningequality/kolibri/pull/11191\\r\\n*
        UI cleanup of side panel  by @ShivangRawat30 in https://github.com/learningequality/kolibri/pull/11262\\r\\n*
        Bump @babel/core from 7.22.19 to 7.22.20 by @dependabot in https://github.com/learningequality/kolibri/pull/11259\\r\\n*
