        What's Changed \\r\\n\\r\\n### Note: beta1 contains a KDS version bump to
        KDS v1.3.1-beta0\\r\\n\\r\\n### High level summary\\r\\n\\r\\nThe goal of
        the \\\"v0.15.3: Content and A11y Patch Release\\\" was to make improvements
        to the accessibility of Kolibri and to content display. Fixes include improvements
        to the focus outline that appears for keyboard navigation and fixes to notifications
        used in screen readers, as well as small improvements to content layout. \\r\\n\\r\\nThis
        release contains the reference to the corresponding KDS beta release (v1.3.1-beta0)
        for testing and comparison. This was done to help identify where bugs or regression
        might be happening, by having two version to compare, to more easily deduce
        if the change was cause by KDS or if it is a Kolibri problem. The issues that
        should be addressed specifically by this version change are listed below,
        as well as one additional bug fix. The summary of the overall changes can
        be viewed under the header \\\"beta0 Changelog\\\". \\r\\n\\r\\n### NEW for
        this release \\r\\n**Additions and Fixes: Accessibility that are NEW for this
        release**\\r\\nThese were changes made to KDS that are now available within
        this release\\r\\n* Focus outline improvements on video and audio displays
        on Content page\\r\\n* Keyboard navigation and focus outline improvements
        on dropdown menus and popovers\\r\\n\\r\\n**Additions and Fixes: Content Display
        that are NEW for this release**\\r\\n* Restrict exclude coach for to assigned
        coaches only by @rtibbles in https://github.com/learningequality/kolibri/pull/9453\\r\\n\\r\\n##
        beta0 Changelog \\r\\n**Additions and Fixes: Accessibility**\\r\\n* Update
        firefox bookmarks cards focus outline by @marcellamaki in https://github.com/learningequality/kolibri/pull/9409\\r\\n*
        Update side panel focus trapping by @marcellamaki in https://github.com/learningequality/kolibri/pull/9408\\r\\n*
        Adds aria labels to immersive toolbar buttons for back and close by @marcellamaki
        in https://github.com/learningequality/kolibri/pull/9411\\r\\n* Adds aria-live=polite
        to the global snackbar component by @marcellamaki in https://github.com/learningequality/kolibri/pull/9410\\r\\n\\r\\n**Additions
        and Fixes: Content Display**\\r\\n* Fix pagination issues for facility user
        page by @rtibbles in https://github.com/learningequality/kolibri/pull/9422\\r\\n*
        Push PDF pages rendering below full screen bar by @marcellamaki in https://github.com/learningequality/kolibri/pull/9439\\r\\n*
        Fix X-Axis display for perseus graphs by @rtibbles in https://github.com/learningequality/kolibri/pull/9446\\r\\n*
        Remove shrink ray from TopicsPage content side panel by @nucleogenesis in
        https://github.com/learningequality/kolibri/pull/9449\\r\\n* Improve icon
        size in Cagetgory selection modal by @sharifmaryam in https://github.com/learningequality/kolibri/pull/8938\\r\\n*
        Fix pagination user tables by @marcellamaki in https://github.com/learningequality/kolibri/pull/9450\\r\\n\\r\\n**Changes**\\r\\n*
        Ensure all file handlers use utf-8 encoding. by @rtibbles in https://github.com/learningequality/kolibri/pull/9401\\r\\n*
        Upgrade morango to v0.6.13 by @bjester in https://github.com/learningequality/kolibri/pull/9445\\r\\n*
        0.14 into 0.15 by @rtibbles in https://github.com/learningequality/kolibri/pull/9447\\r\\n\\r\\n##
        New Contributors\\r\\n* @sharifmaryam made their first contribution in https://github.com/learningequality/kolibri/pull/8938\\r\\n\\r\\n**Full
        Changelog**: https://github.com/learningequality/kolibri/compare/v0.15.3-alpha0...v0.15.3-beta0\",\"mentions_count\":5},{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/67397031\",\"assets_url\":\"https://api.github.com/repos/learningequality/kolibri/releases/67397031/assets\",\"upload_url\":\"https://uploads.github.com/repos/learningequality/kolibri/releases/67397031/assets{?name,label}\",\"html_url\":\"https://github.com/learningequality/kolibri/releases/tag/v0.15.3-beta0\",\"id\":67397031,\"author\":{\"login\":\"marcellamaki\",\"id\":17235236,\"node_id\":\"MDQ6VXNlcjE3MjM1MjM2\",\"avatar_url\":\"https://avatars.githubusercontent.com/u/17235236?v=4\",\"gravatar_id\":\"\",\"url\":\"https://api.github.com/users/marcellamaki\",\"html_url\":\"https://github.com/marcellamaki\",\"followers_url\":\"https://api.github.com/users/marcellamaki/followers\",\"following_url\":\"https://api.github.com/users/marcellamaki/following{/other_user}\",\"gists_url\":\"https://api.github.com/users/marcellamaki/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/marcellamaki/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/marcellamaki/subscriptions\",\"organizations_url\":\"https://api.github.com/users/marcellamaki/orgs\",\"repos_url\":\"https://api.github.com/users/marcellamaki/repos\",\"events_url\":\"https://api.github.com/users/marcellamaki/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/marcellamaki/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"node_id\":\"RE_kwDOAvqWa84EBGWn\",\"tag_name\":\"v0.15.3-beta0\",\"target_commitish\":\"release-v0.15.x\",\"name\":\"v0.15.3-beta0\",\"draft\":false,\"immutable\":false,\"prerelease\":true,\"created_at\":\"2022-05-20T14:37:01Z\",\"updated_at\":\"2022-05-20T15:51:57Z\",\"published_at\":\"2022-05-20T14:57:27Z\",\"assets\":[{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/assets