        Added\\r\\n\\r\\n- Python version is shown on the 'Device > Info' page in
        the 'Advanced' section\\r\\n- Improved help information when running `kolibri
        --help` on the command line\\r\\n\\r\\n\\r\\n# Changed or fixed\\r\\n\\r\\n-
        Various layout and UX issues, especially some specific to IE11 and Firefox\\r\\n-
        'Device > Info' page not accessible when logged in as a superuser\\r\\n- Channels
        unintentionally reordered on \u2018Device > Channels\u2019 when new content
        is imported\\r\\n- Video captions flashing in different languages when first
        opening a video\\r\\n- Changes to channels updated and republished in Studio
        not being immediately reflected in Kolibri\\r\\n- Occasional database blocking
        errors when importing large collections of content from external drives\\r\\n-
        Occasional database corruption due to connections not being closed after operations\\r\\n-
        Automatic data restoration for corrupted databases\\r\\n- Recreate cache.db
        files when starting the Kolibri server to remove database locks that may not
        have been cleanly removed in case of an abrupt shut-down.\\r\\n\\r\\n([0.13.1
