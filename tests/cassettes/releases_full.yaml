        Changed or fixed\\r\\n\\r\\n- EPUB documents with large tables are displayed
        in a single-column, scrollable format to improve their readability.\\r\\n-
        EPUB viewer now saves font and theme settings between sessions.\\r\\n- Quiz
        creation workflow only places unique questions in a quiz, removing duplicates
        that may appear in a topic tree.\\r\\n- Title and name headers are consistently
        accompanied by icons in Kolibri symbol system to help orient the user.\\r\\n\\r\\n#
        Added\\r\\n\\r\\n- Device Settings Page - The default language can now be
        changed under Device > Settings. This is the language that will be used on
        browsers that have never opened Kolibri before (but can be changed after opening
        Kolibri using the language selector).\\r\\n- Coach Reports - Users can preview
        quizzes and lessons and edit their details from their associated report, without
        having to go to the \\\"Plan\\\" sub-page.\\r\\n- Added a `kolibri manage
        deleteuser` command to remove a user from a server, as well as all other servers
        synchronized with it.\\r\\n- Added a new theming system for customizing various
        colors that appear in Kolibri.\\r\\n\\r\\n\\r\\nView all [0.12.4 changes on
        Github](https://github.com/learningequality/kolibri/issues?q=label%3Achangelog+milestone%3A0.12.4)\\r\\n\"},{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/17412049\",\"assets_url\":\"https://api.github.com/repos/learningequality/kolibri/releases/17412049/assets\",\"upload_url\":\"https://uploads.github.com/repos/learningequality/kolibri/releases/17412049/assets{?name,label}\",\"html_url\":\"https://github.com/learningequality/kolibri/releases/tag/v0.12.3\",\"id\":17412049,\"author\":{\"login\":\"lyw07\",\"id\":19424916,\"node_id\":\"MDQ6VXNlcjE5NDI0OTE2\",\"avatar_url\":\"https://avatars.githubusercontent.com/u/19424916?v=4\",\"gravatar_id\":\"\",\"url\":\"https://api.github.com/users/lyw07\",\"html_url\":\"https://github.com/lyw07\",\"followers_url\":\"https://api.github.com/users/lyw07/followers\",\"following_url\":\"https://api.github.com/users/lyw07/following{/other_user}\",\"gists_url\":\"https://api.github.com/users/lyw07/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/lyw07/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/lyw07/subscriptions\",\"organizations_url\":\"https://api.github.com/users/lyw07/orgs\",\"repos_url\":\"https://api.github.com/users/lyw07/repos\",\"events_url\":\"https://api.github.com/users/lyw07/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/lyw07/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"node_id\":\"MDc6UmVsZWFzZTE3NDEyMDQ5\",\"tag_name\":\"v0.12.3\",\"target_commitish\":\"release-v0.12.x\",\"name\":\"v0.12.3\",\"draft\":false,\"immutable\":false,\"prerelease\":false,\"created_at\":\"2019-05-17T00:17:48Z\",\"updated_at\":\"2019-05-17T02:32:42Z\",\"published_at\":\"2019-05-17T02:32:42Z\",\"assets\":[{\"url\":\"https://api.github.com/repos/learningequality/kolibri/releases/assets/12696438\",\"id\":12696438,\"node_id\":\"MDEyOlJlbGVhc2VBc3NldDEyNjk2NDM4\",\"name\":\"kolibri-0.12.3-py2.p