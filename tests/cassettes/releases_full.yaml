        charset=utf-8\",\"state\":\"uploaded\",\"size\":97876874,\"digest\":\"sha256:040e6c68f160f21052e780dfe0464aa3f20fb0faebddd3bfb06d58c2b5ab6736\",\"download_count\":4,\"created_at\":\"2026-02-06T20:01:33Z\",\"updated_at\":\"2026-02-06T20:01:38Z\",\"browser_download_url\":\"https://github.com/learningequality/kolibri/releases/download/0.19.2-alpha0/kolibri_0.19.1a0.dev0%2Bgit.99.gbfca81cd-0ubuntu1_all.deb\"}],\"tarball_url\":\"https://api.github.com/repos/learningequality/kolibri/tarball/0.19.2-alpha0\",\"zipball_url\":\"https://api.github.com/repos/learningequality/kolibri/zipball/0.19.2-alpha0\",\"body\":\"##
        Overview \\r\\n\\r\\nThis is an **UNSTABLE** pre-release for preliminary testing
        of initial workflows for a feature-flagged pilot of Courses in Kolibri. Core
        aspects of the Course experience have not yet been implemented. Some data
        is also not yet present and displayed. Please see [Product Issue: Courses
        are discoverable within downloaded channels, and coaches can preview them
        and assign them to learners](https://github.com/learningequality/kolibri/issues/13435)
        for a general overview of the scope of the workflow. \\r\\n\\r\\n## What's
        Changed\\r\\n\\r\\n### QA review list: Foundational work for Courses in Kolibri
        pilot \\r\\n\\r\\n**Course management page**\\r\\n\\r\\n- [ ] \\\"Courses\\\"
        page appears at the same level as Lessons and Quizzes in Coach navigation\\r\\n-
        [ ] Verify coaches can view all assigned courses on this page\\r\\n- [ ] Verify
        coaches can manage course visibility from this page\\r\\nNot present: Other
        columns beyond visibility toggle within Courses main page table (i.e. status,
        learners, mastery)\\r\\n\\r\\n<img width=\\\"1000\\\" alt=\\\"Screenshot 2026-02-05
        at 6 48 50\u202FPM\\\" src=\\\"https://github.com/user-attachments/assets/3cf9fcd2-2e11-49b6-994a-0aac2a8ea2e6\\\"
        />\\r\\n\\r\\n\\r\\n\\r\\n**Course assignment workflow** \\r\\n\\r\\nPreviewing/selecting
        course\\r\\n- [ ] Clicking to assign a course opens the side panel workflow
        (same pattern as lessons/quizzes)\\r\\n- [ ] Only one course can be selected
        at a time (radio buttons, no multi-select)\\r\\n- [ ] Clicking on the course
        card opens a course preview (further details below)\\r\\n- [ ] The side panel
        and cards use existing routing, focus trapping, and card a11y patterns\\r\\n\\r\\nLearner
        assignment\\r\\n- [ ] The course can be assigned in the same manner as lessons
        and quizzes: entire class, existing groups, or adhoc groups of learners\\r\\nNote:
        the assignment confirmation _via signing in as the learner_ workflow is not
        yet completed and not in scope of this alpha release\\r\\n\\r\\n<img width=\\\"1000\\\"
        alt=\\\"Screenshot 2026-02-05 at 8 08 46\u202FPM\\\" src=\\\"https://github.com/user-attachments/assets/72d6f443-8831-485e-bdbd-9cc9f3fe0a0a\\\"
        />\\r\\n<img width=\\\"1000\\\" alt=\\\"Screenshot 2026-02-05 at 8 08 56\u202FPM\\\"
        src=\\\"https://github.com/user-attachments/assets/cde470eb-63e8-40bc-850e-b2668de8eb50\\\"
        />\\r\\n\\r\\n\\r\\n**Course Preview**\\r\\n- [ ] Condensed course information
        preview displays in the sidebar using an accordion layout \\r\\n- [ ] Each
        accordion is one UNIT\\r\\n- [ ] With the accordion OPEN, the coach can preview
        the LESSONS in the unit. (note: the Figma spec is a bit misleading here. there
        will not be single resources i.e. a PDF or video at the preview level) \\r\\n-
        [ ] The Unit accordion has a title, and each lesson has a lesson icon, title,
        and the number of resources in that lesson\\r\\n- [ ] Coaches cannot preview
        pre-test or post-test questions, or specific resources from within the side
        panel\\r\\n- [ ] The header section of the course preview page has the title,
        thumbnail, description, as well as the number of units and resources\\r\\n-
        [ ] Icon buttons for \\\"expand all\\\" and \\\"collapse all\\\" units are
        functional\\r\\n\\r\\n<img width=\\\"1500\\\" height=\\\"742\\\" alt=\\\"Screenshot
        2026-02-06 at 2 43 01\u202FPM\\\" src=\\\"https://github.com/user-attachments/assets/78bad40d-f0b0-49ce-9ec3-4bc77ccb9b52\\\"
        />\\r\\n\\r\\n\\r\\nNOTE: the accordions in the course preview and in the
        learner/group selection does not match _exactly_ the Figma. I vetoed the design
        changes that Tomiwa tried to sneak in at the last moment \U0001F605\\r\\n\\r\\n\\r\\nParticular
        areas to QA and other notes:\\r\\n- I already suspect (from my own updating
        the channel just now) that we are not doing a good job handling things on
        the course list page when the course is deleted from the device via channel
        management. Can we stress-test this a bit? (learner considerations to come
        later) \\r\\n- We haven't explicitly prevented the same course from being
        added multiple times and to the same group(s) of learners or class. Yet to
        be determined if we might change this. \\r\\n- [The \\\"preview\\\" option
        in the dropdown menu on the courses list main page leads nowhere, and the
        \\\"edit\\\" should be updated to lead to recipients, not the course selection
        page. Tracked here](https://github.com/learningequality/kolibri/issues/14135)\\r\\n<img
        width=\\\"218\\\" height=\\\"214\\\" alt=\\\"Screenshot 2026-02-06 at 2 55
        20\u202FPM\\\" src=\\\"https://github.com/user-attachments/assets/9d096ac9-64ae-4948-8110-6d18806bd8fa\\\"
        />\\r\\n\\r\\n\\r\\n## PRs\\r\\n* Courses frontend setup by @AlexVelezLl in
        https://github.com/learningequality/kolibri/pull/14077\\r\\n* Add sync operations
        and filter utilities for classroom partitioning by @bjester in https://github.com/learningequality/kolibri/pull/14070\\r\\n*
        Create courses models and viewset by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/14091\\r\\n*
        Migrate from yarn to pnpm by @rtibbles in https://github.com/learningequality/kolibri/pull/14086\\r\\n*
        Fix missing dep in Coach by @nucleogenesis in https://github.com/learningequality/kolibri/pull/14098\\r\\n*
        Replace CSS Variables in favor of theme variable for css styling by @AllanOXDi
        in https://github.com/learningequality/kolibri/pull/14089\\r\\n* Add select
        courses and recipients subpages by @AlexVelezLl in https://github.com/learningequality/kolibri/pull/14103\\r\\n*
        Add Course Session Context to Progress Tracking by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/14116\\r\\n*
        Learn Course Assignments API Endpoints by @LianaHarris360 in https://github.com/learningequality/kolibri/pull/14113\\r\\n*
        Add UnitTestAssignment model for managing pre/post tests in course units by
        @AllanOXDi in https://github.com/learningequality/kolibri/pull/14115\\r\\n*
        Implement Course list data loading and display by @AllanOXDi in https://github.com/learningequality/kolibri/pull/14114\\r\\n*
        Restore frontend linting and fix issues that happened in the interim by @rtibbles
        in https://github.com/learningequality/kolibri/pull/14126\\r\\n* ResourceLayout
        component architecture for course content display by @rtibbles in https://github.com/learningequality/kolibri/pull/14109\\r\\n*
        Prevent traversal of symlinks in node_modules during egg info generation.
        by @rtibbles in https://github.com/learningequality/kolibri/pull/14127\\r\\n*
        Add API endpoints for activating/closing quizzes & returning active quiz by
