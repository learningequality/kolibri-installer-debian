name: Promote to stable GitHub Pages PPA

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      debian-repo-signing-key-id:
        description: 'Debian repo signing key ID (falls back to vars.DEBIAN_REPO_SIGNING_KEY_ID)'
        required: false
        type: string
    secrets:
      DEBIAN_REPO_SIGNING_KEY:
        required: true
      LE_BOT_APP_ID:
        required: true
      LE_BOT_PRIVATE_KEY:
        required: true

jobs:
  promote_to_stable:
    name: Promote prerelease to stable
    runs-on: ubuntu-latest
    concurrency:
      group: debian-repo-publish
      cancel-in-progress: false
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Set GPG key ID
        id: gpg
        run: |
          GPG_KEY_ID="${{ inputs.debian-repo-signing-key-id || vars.DEBIAN_REPO_SIGNING_KEY_ID }}"
          if [ -z "$GPG_KEY_ID" ]; then
            echo "::error::No signing key ID provided (set input or vars.DEBIAN_REPO_SIGNING_KEY_ID)"
            exit 1
          fi
          echo "key-id=$GPG_KEY_ID" >> "$GITHUB_OUTPUT"

      - name: Import GPG signing key into isolated keyring
        run: |
          GNUPGHOME=$(mktemp -d)
          export GNUPGHOME
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "pinentry-mode loopback" > "$GNUPGHOME/gpg.conf"
          echo "allow-loopback-pinentry" > "$GNUPGHOME/gpg-agent.conf"
          echo "${{ secrets.DEBIAN_REPO_SIGNING_KEY }}" | gpg --batch --import
          echo "${{ steps.gpg.outputs.key-id }}:6:" | gpg --batch --import-ownertrust
          gpgconf --kill gpg-agent

      - name: Generate GitHub token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.LE_BOT_APP_ID }}
          private-key: ${{ secrets.LE_BOT_PRIVATE_KEY }}
          owner: learningequality
          repositories: kolibri-installer-debian

      - name: Restore existing gh-pages repo state
        env:
          TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          git clone --branch gh-pages --single-branch --depth 1 \
            "https://x-access-token:$TOKEN@github.com/learningequality/kolibri-installer-debian.git" repo \
            || { echo "::error::No gh-pages branch found; nothing staged to promote"; exit 1; }

      - name: Recreate distributions config
        run: |
          mkdir -p repo/conf
          cat > repo/conf/distributions <<EOF
          Origin: Learning Equality
          Label: Kolibri
          Suite: stable
          Codename: stable
          Architectures: amd64 i386 arm64 armhf
          Components: main
          Description: Kolibri stable Debian repository
          SignWith: ${{ steps.gpg.outputs.key-id }}

          Origin: Learning Equality
          Label: Kolibri
          Suite: prerelease
          Codename: prerelease
          Architectures: amd64 i386 arm64 armhf
          Components: main
          Description: Kolibri prerelease Debian repository
          SignWith: ${{ steps.gpg.outputs.key-id }}
          EOF

      - name: Promote prerelease to stable
        run: |
          if ! reprepro -b repo list prerelease | grep -q kolibri; then
            echo "::error::No kolibri package in prerelease suite; publish a prerelease first"
            exit 1
          fi
          reprepro -b repo remove stable kolibri || true
          reprepro -b repo copy stable prerelease kolibri
          reprepro -b repo deleteunreferenced
          gpg --armor --export "${{ steps.gpg.outputs.key-id }}" > repo/pubkey.asc

      - name: Deploy to GitHub Pages
        env:
          TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          cd repo
          rm -rf .git
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Promote prerelease to stable in Debian repository"
          git remote add origin "https://x-access-token:$TOKEN@github.com/learningequality/kolibri-installer-debian.git"
          git push --force origin gh-pages
